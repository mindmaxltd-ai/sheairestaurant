<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SAR Blockchain — উপাদান যাচাই</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange:#E8590C; --orange-deep:#C2410C; --orange-soft:#FFE8D6;
      --yellow:#F5A623; --yellow-bright:#FFD43B; --yellow-soft:#FFF4D6;
      --pink:#E91E8C; --pink-deep:#C2185B; --pink-soft:#FFE0F0;
      --bg:#2A0E14; --ink:#fff;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #3A1208 0%, #2A0E14 100%);
      color: var(--ink);
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, var(--orange-deep) 0%, var(--orange) 45%, var(--pink) 100%);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 4px 18px rgba(233,30,140,.3);
    }
    .header h1 { font-size: 1.5rem; }
    .header a { color: var(--yellow-bright) !important; }
    .container { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(245,166,35,.25);
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .ingredient-card {
      background: linear-gradient(160deg, rgba(232,89,12,.18), rgba(233,30,140,.10));
      border: 1.5px solid rgba(245,166,35,.4);
      border-radius: 14px;
      padding: 1rem;
      cursor: pointer;
      transition: all .2s;
    }
    .ingredient-card:hover {
      border-color: var(--yellow-bright);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(232,89,12,.3);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .video-step {
      background: rgba(255,212,59,.08);
      border: 1px solid rgba(245,166,35,.2);
      border-radius: 10px;
      padding: .75rem;
      margin-bottom: .5rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .step-badge {
      background: linear-gradient(135deg, var(--orange), var(--pink));
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .btn {
      background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      border: none;
      border-radius: 9px;
      padding: .55rem 1.2rem;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: .88rem;
    }
    .search-bar {
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(245,166,35,.4);
      border-radius: 10px;
      padding: .75rem 1rem;
      color: #fff;
      width: 100%;
      max-width: 400px;
      font-family: inherit;
      font-size: .9rem;
    }
    .search-bar:focus {
      outline: none;
      border-color: var(--yellow-bright);
      box-shadow: 0 0 0 3px rgba(255,212,59,.15);
    }
    .search-bar::placeholder { color: rgba(255,255,255,.4); }
  </style>

</head>
<body>

  <div class="header">
    <div>⛓️</div>
    <div>
      <h1>SAR Blockchain — উপাদান যাচাই</h1>
      <p style="font-size:.85rem;opacity:.7">
        উৎস থেকে রান্না পর্যন্ত — প্রতিটি ধাপ স্বচ্ছ
      </p>
    </div>
    <a href="index.html" style="margin-left:auto;color:#FFD43B;text-decoration:none">
      ← ফিরে যান
    </a>
  </div>

  <div class="container">

    <!-- Search -->
    <div style="margin-bottom:1.5rem">
      <input type="text" class="search-bar"
        placeholder="🔍 উপাদান খুঁজুন..."
        oninput="filterIngredients(this.value)">
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem">
      <div class="card" style="text-align:center">
        <div style="font-size:1.8rem;font-weight:700;color:#FFD43B">১০০</div>
        <div style="font-size:.82rem;color:rgba(255,255,255,.5)">উপাদান</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:1.8rem;font-weight:700;color:#E91E8C">৫০০</div>
        <div style="font-size:.82rem;color:rgba(255,255,255,.5)">উপাদান ভিডিও</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:1.8rem;font-weight:700;color:#F5C842">১০৫</div>
        <div style="font-size:.82rem;color:rgba(255,255,255,.5)">মেনু</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:1.8rem;font-weight:700;color:#FFA94D">৮১৫</div>
        <div style="font-size:.82rem;color:rgba(255,255,255,.5)">মোট ভিডিও</div>
      </div>
    </div>

    <!-- Ingredients Grid -->
    <h2 style="margin-bottom:1rem;color:#FFD43B">🌾 উপাদানসমূহ</h2>
    <div class="grid" id="ingredientsGrid">
      <!-- JavaScript-এ load হবে -->
    </div>

    <!-- Selected Ingredient Detail -->
    <div id="ingredientDetail" style="display:none;margin-top:2rem">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h3 id="detailName" style="color:#FFD43B"></h3>
          <button onclick="closeDetail()" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:1.2rem;cursor:pointer">✕</button>
        </div>

        <div style="margin-bottom:1rem">
          <h4 style="color:#F5C842;margin-bottom:.75rem">📹 উপাদানের ৫টি ধাপ</h4>
          <div id="ingredientSteps"></div>
        </div>

        <div id="storySection" style="margin-top:1rem">
          <h4 style="color:#F5C842;margin-bottom:.5rem">📖 উৎপাদনের গল্প</h4>
          <p id="storyText" style="color:rgba(255,255,255,.85);font-size:.9rem;line-height:1.8"></p>
          <a id="storyPdfLink" href="#" target="_blank"
            style="display:inline-block;margin-top:.5rem;background:rgba(245,200,66,.15);
            border:1px solid rgba(245,200,66,.3);border-radius:8px;
            padding:.4rem .85rem;color:#F5C842;text-decoration:none;font-size:.82rem">
            📄 PDF পড়ুন
          </a>
        </div>
      </div>
    </div>

  </div>

  <script>
    const SUPA = 'https://xlkrggspepnysbouatec.supabase.co';
    const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsa3JnZ3NwZXBueXNib3VhdGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTU0OTEsImV4cCI6MjA5NTA5MTQ5MX0.dCAkAXL1EDNsxTBn8mcHcUHlXJ1xDBirwBdTgIq927U';

    const stepLabels = [
      { icon: '🌱', label: 'উৎস/সংগ্রহ' },
      { icon: '🔄', label: 'প্রস্তুতি' },
      { icon: '📦', label: 'প্যাকেজিং' },
      { icon: '🚚', label: 'পরিবহন' },
      { icon: '🏪', label: 'সংরক্ষণ' },
    ];

    let allIngredients = [];

    async function loadIngredients() {
      const grid = document.getElementById('ingredientsGrid');
      try {
        const r = await fetch(
          `${SUPA}/rest/v1/blockchain_ingredients?select=*&order=name_bn.asc`,
          { headers: { apikey: KEY, Authorization: 'Bearer ' + KEY } }
        );
        if (!r.ok) {
          const t = await r.text();
          throw new Error(r.status + ' — ' + t);
        }
        allIngredients = await r.json();
        if (!Array.isArray(allIngredients)) {
          throw new Error(JSON.stringify(allIngredients));
        }
        renderIngredients(allIngredients);
        openFromURL();   // meal-score থেকে ?ing= এলে সরাসরি ঐ উপাদান খুলি
      } catch (e) {
        console.error('Blockchain load error:', e);
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:2rem;color:#ff6b6b">
            ⚠️ ডেটা লোড করা যায়নি।<br>
            <span style="font-size:.78rem;color:rgba(255,255,255,.4)">${e.message}</span>
          </div>`;
      }
    }

    function renderIngredients(items) {
      const grid = document.getElementById('ingredientsGrid');
      if (!items || items.length === 0) {
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;
            padding:2rem;color:rgba(255,255,255,.4)">
            Admin Panel থেকে উপাদান যোগ করুন।
          </div>`;
        return;
      }
      grid.innerHTML = items.map(ing => `
        <div class="ingredient-card" onclick="showDetail('${ing.id}')">
          <div style="font-size:1.5rem;margin-bottom:.5rem">🌾</div>
          <div style="font-weight:700;color:#fff">${ing.name_bn || ''}</div>
          <div style="font-size:.78rem;color:rgba(255,255,255,.4)">${ing.name_en || ''}</div>
          <div style="margin-top:.5rem;font-size:.75rem;color:#FFD43B">
            ${[
              ing.source_video,
              ing.prep_video,
              ing.package_video,
              ing.transport_video,
              ing.storage_video
            ].filter(Boolean).length}/5 ভিডিও
          </div>
        </div>
      `).join('');
    }

    function filterIngredients(query) {
      const filtered = allIngredients.filter(i =>
        (i.name_bn || '').includes(query) ||
        (i.name_en || '').toLowerCase().includes(query.toLowerCase())
      );
      renderIngredients(filtered);
    }

    // meal-score থেকে আসা ?ing=<নাম> থাকলে মিলিয়ে detail খুলি
    function openFromURL() {
      try {
        const q = new URLSearchParams(location.search).get('ing');
        if (!q || !Array.isArray(allIngredients) || !allIngredients.length) return;
        const needle = q.trim().toLowerCase();
        const hit = allIngredients.find(i =>
          (i.name_bn || '').trim().toLowerCase() === needle ||
          (i.name_en || '').trim().toLowerCase() === needle ||
          (i.name_bn || '').toLowerCase().includes(needle) ||
          (i.name_en || '').toLowerCase().includes(needle)
        );
        if (hit) {
          showDetail(hit.id);
        } else {
          // মিল না পেলে search box-এ বসিয়ে filter করি
          const sb = document.querySelector('.search-bar');
          if (sb) { sb.value = q; filterIngredients(q); }
        }
      } catch (e) { /* ignore */ }
    }

    function showDetail(id) {
      const ing = allIngredients.find(i => i.id === id);
      if (!ing) return;

      document.getElementById('detailName').textContent =
        (ing.name_bn || '') + ' (' + (ing.name_en || '') + ')';

      const videos = [
        ing.source_video,
        ing.prep_video,
        ing.package_video,
        ing.transport_video,
        ing.storage_video
      ];

      document.getElementById('ingredientSteps').innerHTML =
        stepLabels.map((step, i) => `
          <div class="video-step">
            <div class="step-badge">${i + 1}</div>
            <div style="flex:1">
              <div style="font-size:.88rem;font-weight:700;color:#fff">
                ${step.icon} ${step.label}
              </div>
              ${videos[i] ?
                `<a href="${videos[i]}" target="_blank"
                  style="color:#FFD43B;font-size:.8rem;text-decoration:none">
                  ▶ ভিডিও দেখুন
                </a>` :
                `<span style="color:rgba(255,255,255,.3);font-size:.8rem">
                  ভিডিও যোগ করা হয়নি
                </span>`
              }
            </div>
          </div>
        `).join('');

      // গল্পের লেখা ও PDF — দুটোই আলাদাভাবে দেখাও
      const hasStoryText = !!(ing.story_text && ing.story_text.trim());
      const hasPdf = !!ing.story_pdf_url;

      document.getElementById('storyText').textContent =
        hasStoryText ? ing.story_text : '';
      document.getElementById('storyText').style.display = hasStoryText ? 'block' : 'none';

      const pdfLink = document.getElementById('storyPdfLink');
      if (hasPdf) {
        pdfLink.href = ing.story_pdf_url;
        pdfLink.style.display = 'inline-block';
      } else {
        pdfLink.style.display = 'none';
      }

      // লেখা বা PDF — যেকোনো একটা থাকলেই সেকশন দেখাও
      document.getElementById('storySection').style.display =
        (hasStoryText || hasPdf) ? 'block' : 'none';

      document.getElementById('ingredientDetail').style.display = 'block';
      document.getElementById('ingredientDetail').scrollIntoView({ behavior: 'smooth' });
    }

    function closeDetail() {
      document.getElementById('ingredientDetail').style.display = 'none';
    }

    loadIngredients();
  </script>
</body>
</html>
