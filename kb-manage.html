<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angeli Knowledge Base — তথ্য দেখুন ও মুছুন</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, 'Noto Sans Bengali', sans-serif;
    max-width: 760px; margin: 0 auto; padding: 24px;
    background: #faf7f5; color: #2c2c2a; line-height: 1.6;
  }
  h1 { color: #D4537E; font-size: 22px; }
  a { color: #D4537E; }
  .card {
    background: #fff; border: 1px solid #eee; border-radius: 12px;
    padding: 20px; margin-bottom: 18px;
  }
  .row {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    border-radius: 8px; margin-bottom: 8px; background: #fff; border: 1px solid #eee;
  }
  .row .info { flex: 1; }
  .row .ttl { font-weight: 600; font-size: 14px; }
  .row .meta { color: #888; font-size: 12px; }
  .badge {
    background: #fce8f0; color: #D4537E; border-radius: 20px;
    padding: 2px 10px; font-size: 12px; font-weight: 600;
  }
  button.del {
    background: #fff; color: #e24b4a; border: 1px solid #e24b4a;
    border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer;
  }
  button.del:hover { background: #e24b4a; color: #fff; }
  .empty { text-align: center; color: #999; padding: 30px; }
  .small { color: #888; font-size: 13px; }
  .total { font-weight: 600; color: #1d9e75; }
</style>
</head>
<body>

<div id="kbLogin" style="position:fixed;inset:0;z-index:9999;background:#faf7f5;
  display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border:1px solid #eee;border-radius:16px;padding:32px;width:320px;max-width:90vw">
    <h2 style="color:#D4537E;text-align:center;margin:0 0 4px">🔒 লগইন</h2>
    <p style="text-align:center;color:#888;font-size:13px;margin:0 0 20px">Angeli Knowledge Base — শুধু অ্যাডমিন</p>
    <input id="kbUser" type="text" placeholder="ইউজার আইডি"
      style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px;font-size:14px">
    <input id="kbPass" type="password" placeholder="পাসওয়ার্ড"
      onkeydown="if(event.key==='Enter')kbDoLogin()"
      style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px;font-size:14px">
    <p id="kbErr" style="color:#e24b4a;font-size:13px;margin:0 0 10px;display:none"></p>
    <button onclick="kbDoLogin()"
      style="width:100%;background:#D4537E;color:#fff;border:none;border-radius:8px;padding:11px;font-size:15px;font-weight:600;cursor:pointer">প্রবেশ করুন</button>
  </div>
</div>

<script>
var KB_CREDS = [
  { user:'tutul',         pass:'aimthm@2008', name:'Tutul (Super Admin)' },
  { user:'sar_dietitian', pass:'sar2024',      name:'SAR ডায়েটিশিয়ান' },
  { user:'sar_nutrition', pass:'sar2024',      name:'SAR নিউট্রিশনিস্ট' },
];
function kbDoLogin(){
  var u = (document.getElementById('kbUser').value||'').trim();
  var p = document.getElementById('kbPass').value||'';
  var err = document.getElementById('kbErr');
  var found = KB_CREDS.find(function(c){ return c.user===u && c.pass===p; });
  if(found){
    sessionStorage.setItem('sar_admin', JSON.stringify(found));
    document.getElementById('kbLogin').style.display='none';
  } else {
    err.textContent = '❌ ভুল ইউজার আইডি বা পাসওয়ার্ড।';
    err.style.display='block';
    document.getElementById('kbPass').value='';
  }
}
if(sessionStorage.getItem('sar_admin')){
  document.getElementById('kbLogin').style.display='none';
}
</script>

<h1>🌸 Angeli — Knowledge Base ব্যবস্থাপনা</h1>
<p class="small">Angeli এখন যা জানে তার তালিকা। ভুল তথ্য থাকলে এখান থেকে মুছে ফেলতে পারেন।
নতুন তথ্য যোগ করতে → <a href="/kb-upload.html">আপলোড পেজে যান</a></p>

<div class="card">
  <p id="summary" class="small">লোড হচ্ছে...</p>
  <div id="list"></div>
</div>

<script>
const API = '/.netlify/functions/angeli';
const listEl = document.getElementById('list');
const sumEl  = document.getElementById('summary');

// ── তালিকা লোড করা ─────────────────────────────────────────
async function load() {
  listEl.innerHTML = '';
  sumEl.textContent = 'লোড হচ্ছে...';
  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'kb_list' }),
    });
    const d = await r.json();
    const files = d.files || [];

    if (!files.length) {
      sumEl.textContent = '';
      listEl.innerHTML =
        '<div class="empty">এখনো কোনো তথ্য নেই।<br>' +
        '<a href="/kb-upload.html">প্রথম ফাইল আপলোড করুন</a></div>';
      return;
    }

    sumEl.innerHTML = 'মোট <span class="total">' + files.length +
      'টি ফাইল</span>, <span class="total">' + (d.total || 0) +
      'টি টুকরো</span> — Angeli এসব থেকে উত্তর দেয়।';

    for (const f of files) {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML =
        '<div class="info">' +
          '<div class="ttl">' + escapeHtml(f.title) + '</div>' +
          '<div class="meta">' + (f.source || '?') + ' · ' + (f.lang || 'bn') + '</div>' +
        '</div>' +
        '<span class="badge">' + f.chunks + ' টুকরো</span>' +
        '<button class="del">মুছুন</button>';
      row.querySelector('.del').onclick = () => del(f.title, row);
      listEl.appendChild(row);
    }
  } catch (e) {
    sumEl.textContent = 'লোড করতে সমস্যা: ' + (e.message || e);
  }
}

// ── একটি ফাইল মোছা ─────────────────────────────────────────
async function del(title, row) {
  if (!confirm('"' + title + '" এর সব তথ্য মুছে ফেলবেন? Angeli আর এটা জানবে না।')) return;
  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'kb_delete', title: title }),
    });
    if (!r.ok) throw new Error(await r.text());
    row.remove();
    load();  // তালিকা নতুন করে গুনে দেখাও
  } catch (e) {
    alert('মুছতে সমস্যা: ' + (e.message || e));
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

load();
</script>

</body>
</html>
