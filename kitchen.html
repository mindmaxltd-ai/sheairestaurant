<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAR রান্নাঘর · Kitchen Board</title>
<style>
:root{
  --bg:#11161c; --panel:#1a222c; --panel-2:#212c38; --line:#2c3a49;
  --ink:#eef3f8; --ink-2:#9fb0c0; --ink-3:#6b7c8c;
  --steam:#4aa3df; --airfry:#e8893b; --cold:#46c08a;
  --amber:#f5b73c; --green:#46c08a; --red:#e2604f; --blue:#4aa3df;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);
  font-family:"SolaimanLipi","Hind Siliguri",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.num{font-variant-numeric:tabular-nums}
header{display:flex;align-items:center;gap:1rem;padding:.8rem 1.2rem;
  background:linear-gradient(180deg,#141b22,#11161c);border-bottom:1px solid var(--line);flex:none}
.brand{display:flex;align-items:baseline;gap:.5rem}
.brand b{font-size:1.2rem}.brand span{color:var(--ink-3);font-size:.78rem}
.live{display:flex;align-items:center;gap:.4rem;font-size:.74rem;color:var(--ink-2);margin-left:.5rem}
.dot{width:.55rem;height:.55rem;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(70,192,138,.5)}70%{box-shadow:0 0 0 8px rgba(70,192,138,0)}100%{box-shadow:0 0 0 0 rgba(70,192,138,0)}}
.spacer{flex:1}
.who{font-size:.76rem;color:var(--ink-2);background:var(--panel-2);border:1px solid var(--line);
  border-radius:.5rem;padding:.35rem .7rem}
.who b{color:var(--amber)}
.hbtn{background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
  border-radius:.55rem;padding:.5rem .85rem;font-size:.82rem;cursor:pointer;font-family:inherit}
.hbtn:hover{background:#28384a}
.board{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);overflow:hidden}
.col{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.col-head{padding:.7rem 1rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.5rem;flex:none}
.col-head .ic{width:.7rem;height:.7rem;border-radius:50%}
.col-head b{font-size:.95rem}
.col-head .n{margin-left:auto;font-size:.8rem;color:var(--ink-3);background:var(--panel-2);border-radius:1rem;padding:.1rem .55rem}
.col.pending .ic{background:var(--amber)}
.col.cooking .ic{background:var(--airfry)}
.col.ready .ic{background:var(--green)}
.col-body{flex:1;overflow-y:auto;padding:.8rem;display:flex;flex-direction:column;gap:.8rem}
.col-empty{color:var(--ink-3);text-align:center;padding:2.5rem .5rem;font-size:.85rem}
.card{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:.7rem;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.22)}
.c-head{display:flex;align-items:center;gap:.5rem;padding:.6rem .8rem;background:var(--panel-2);border-bottom:1px solid var(--line);cursor:pointer}
.c-head:hover{background:#28384a}
.c-no{font-weight:700;font-size:.92rem}
.c-toggle{margin-left:auto;color:var(--ink-3);font-size:.9rem;transition:transform .2s}
.card.open .c-toggle{transform:rotate(180deg)}
.c-meta{text-align:right;font-size:.72rem;color:var(--ink-2);line-height:1.3}
.age{font-size:.7rem;padding:.12rem .45rem;border-radius:.4rem;background:#2a3543;color:var(--ink-2)}
.age.warn{background:rgba(245,183,60,.18);color:var(--amber)}
.age.late{background:rgba(226,96,79,.2);color:var(--red)}
.c-title{padding:.55rem .8rem;font-size:.9rem;font-weight:600;color:var(--ink)}
.c-title .code{color:var(--blue);font-size:.74rem}
.c-collapse{display:none;padding:0 .8rem .3rem}
.card.open .c-collapse{display:block}
.c-sum{display:flex;flex-wrap:wrap;gap:.3rem;padding:.2rem 0 .5rem}
.chip{font-size:.7rem;border:1px solid var(--line);border-radius:.4rem;padding:.1rem .45rem;color:var(--ink-2)}
.chip.kcal{color:var(--amber);border-color:rgba(245,183,60,.35)}
.claimed{font-size:.72rem;color:var(--airfry);padding:.2rem 0}
.c-foot{display:flex;gap:.5rem;padding:.6rem .8rem;border-top:1px solid var(--line)}
.act{flex:1;border:none;border-radius:.55rem;padding:.6rem;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;color:#0c1116}
.act:hover{filter:brightness(1.08)}
.act.recipe{background:var(--steam);color:#0c1116;flex:0 0 auto;padding:.6rem .8rem}
.act.cook{background:var(--airfry)}
.act.decline{background:transparent;color:var(--red);border:1px solid rgba(226,96,79,.5);flex:0 0 auto;padding:.6rem .8rem}
.act.rdy{background:var(--green)}
.act.check{background:var(--blue);color:#fff;flex:0 0 auto;padding:.6rem .8rem}
.act.deliver{background:var(--green)}
.lockmsg{flex:1;text-align:center;font-size:.78rem;color:var(--ink-3);padding:.6rem}
.overlay{position:fixed;inset:0;background:rgba(8,11,15,.7);display:none;z-index:50;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:.9rem;max-width:560px;width:100%;overflow:hidden}
.modal.mid{max-width:680px}
.m-head{display:flex;align-items:center;gap:.6rem;padding:.9rem 1.1rem;background:var(--panel-2);border-bottom:1px solid var(--line)}
.m-head b{font-size:1.05rem}
.m-close{margin-left:auto;background:none;border:none;color:var(--ink-2);font-size:1.3rem;cursor:pointer}
.m-body{padding:1rem 1.1rem;max-height:70vh;overflow-y:auto}
.course{border-top:1px dashed var(--line);padding:.7rem 0}
.course:first-child{border-top:none}
.co-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
.co-slot{width:1.5rem;height:1.5rem;border-radius:.35rem;display:grid;place-items:center;font-size:.78rem;font-weight:700;color:#0c1116;background:var(--steam)}
.co-name{font-size:.9rem;font-weight:600}
.co-kcal{margin-left:auto;font-size:.74rem;color:var(--ink-3)}
.ings{display:flex;flex-wrap:wrap;gap:.3rem;margin:.2rem 0 .45rem}
.ing{background:var(--panel-2);border:1px solid var(--line);border-radius:.4rem;padding:.12rem .45rem;font-size:.76rem}
.ing b{color:var(--steam)}
.steps{list-style:none;display:flex;flex-direction:column;gap:.28rem}
.steps li{font-size:.8rem;color:var(--ink-2);line-height:1.5;padding-left:1rem;position:relative}
.steps li:before{content:"›";position:absolute;left:0;color:var(--ink-3)}
.check-row{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;border-top:1px solid var(--line)}
.check-row input{width:1.1rem;height:1.1rem}
.check-foot{padding:1rem 1.1rem;border-top:1px solid var(--line)}
@media (max-width:760px){body{height:auto;overflow:auto}.board{grid-template-columns:1fr}.col-body{max-height:none}}
/* login */
.login-wrap{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-wrap.hidden{display:none}
.login-card{background:var(--panel);border:1px solid var(--line);border-radius:1rem;padding:2rem;max-width:380px;width:100%}
.login-card h2{font-size:1.3rem;margin-bottom:.3rem;text-align:center}
.login-card .sub{color:var(--ink-3);font-size:.82rem;text-align:center;margin-bottom:1.5rem}
.login-field{margin-bottom:1rem}
.login-field label{display:block;font-size:.78rem;color:var(--ink-2);margin-bottom:.35rem}
.login-field input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:.55rem;
  padding:.7rem .85rem;color:var(--ink);font-family:inherit;font-size:.9rem}
.login-btn{width:100%;background:var(--airfry);color:#0c1116;border:none;border-radius:.55rem;
  padding:.8rem;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:.5rem}
.login-btn:hover{filter:brightness(1.08)}
.login-err{background:rgba(226,96,79,.15);border:1px solid rgba(226,96,79,.3);color:var(--red);
  border-radius:.5rem;padding:.6rem;font-size:.8rem;margin-top:.8rem;display:none;text-align:center}
.login-err.show{display:block}
.logout-btn{background:transparent;color:var(--ink-3);border:1px solid var(--line);
  border-radius:.5rem;padding:.5rem .7rem;font-size:.78rem;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- লগইন পর্দা -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h2>🍳 SAR রান্নাঘর</h2>
    <div class="sub">স্টাফ লগইন</div>
    <div class="login-field">
      <label>ইউজার আইডি (ইমেইল বা ফোন)</label>
      <input id="loginUser" type="text" placeholder="email@example.com বা 01XXXXXXXXX"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>পাসওয়ার্ড</label>
      <input id="loginPass" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">লগইন করুন →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<header>
  <div class="brand"><b>SAR রান্নাঘর</b><span>Kitchen Board</span></div>
  <div class="live"><span class="dot"></span> লাইভ · <span id="qcount" class="num">০</span> সক্রিয়</div>
  <div class="spacer"></div>
  <span class="who" id="whoBox">স্টাফ: <b id="whoName">—</b></span>
  <button class="hbtn" onclick="load()">↻ রিফ্রেশ</button>
  <button class="logout-btn" onclick="doLogout()">লগআউট</button>
</header>

<div class="board">
  <section class="col pending">
    <div class="col-head"><span class="ic"></span><b>নতুন অর্ডার</b><span class="n num" id="n-q">০</span></div>
    <div class="col-body" id="col-queued"></div>
  </section>
  <section class="col cooking">
    <div class="col-head"><span class="ic"></span><b>রান্না হচ্ছে</b><span class="n num" id="n-p">০</span></div>
    <div class="col-body" id="col-preparing"></div>
  </section>
  <section class="col ready">
    <div class="col-head"><span class="ic"></span><b>প্রস্তুত</b><span class="n num" id="n-r">০</span></div>
    <div class="col-body" id="col-ready"></div>
  </section>
</div>

<!-- check modal (medium window) -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal mid">
    <div class="m-head"><b id="m-title">চূড়ান্ত যাচাই</b>
      <button class="m-close" onclick="closeModal()">×</button></div>
    <div class="m-body" id="m-body"></div>
    <div class="check-foot" id="m-foot"></div>
  </div>
</div>

<script>
const API='/.netlify/functions/sar';
async function api(action,body){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({action},body||{}))});
  if(!r.ok) throw new Error(action+' '+r.status);
  return r.json();
}
const bn=n=>(n==null?0:n).toLocaleString('bn-BD');
const MEAL={breakfast:'সকাল',lunch:'দুপুর',dinner:'রাত'};

// ── স্টাফ লগইন (admin এর staff টেবিল ব্যবহার করে) ──
let STAFF_NAME = localStorage.getItem('sar_kitchen_name') || '';
let STAFF_ROLE = localStorage.getItem('sar_kitchen_role') || '';
let IS_SUPER   = localStorage.getItem('sar_kitchen_super') === 'true';

async function doLogin(){
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.className = 'login-err';
  if(!user || !pass){ errEl.textContent='আইডি ও পাসওয়ার্ড দিন।'; errEl.className='login-err show'; return; }

  try{
    const res = await api('staffLogin', { user, pass });
    if(!res.ok){
      const msg = {
        notfound:'এই আইডি খুঁজে পাওয়া যায়নি।',
        wrongpass:'পাসওয়ার্ড ভুল।',
        inactive:'এই অ্যাকাউন্ট নিষ্ক্রিয়।',
        noaccess:'আপনার রান্নাঘরে ঢোকার অনুমতি নেই।',
        missing:'আইডি ও পাসওয়ার্ড দিন।'
      }[res.error] || 'লগইন ব্যর্থ।';
      errEl.textContent = msg; errEl.className='login-err show';
      return;
    }
    // সফল
    STAFF_NAME = res.staff.name;
    STAFF_ROLE = res.staff.role;
    IS_SUPER   = res.staff.is_super;
    localStorage.setItem('sar_kitchen_name', STAFF_NAME);
    localStorage.setItem('sar_kitchen_role', STAFF_ROLE);
    localStorage.setItem('sar_kitchen_super', IS_SUPER ? 'true':'false');
    showBoard();
  }catch(e){
    errEl.textContent='সংযোগ সমস্যা — sar.js এ staffLogin action আছে কিনা দেখুন।';
    errEl.className='login-err show';
  }
}

function doLogout(){
  localStorage.removeItem('sar_kitchen_name');
  localStorage.removeItem('sar_kitchen_role');
  localStorage.removeItem('sar_kitchen_super');
  STAFF_NAME=''; STAFF_ROLE=''; IS_SUPER=false;
  document.getElementById('loginWrap').classList.remove('hidden');
}

function showBoard(){
  document.getElementById('loginWrap').classList.add('hidden');
  document.getElementById('whoName').textContent = STAFF_NAME + (IS_SUPER?' 👑':'');
  load();
}

// STAFF = বোতাম-লক এ ব্যবহৃত নাম (এখন আসল লগইন নাম)
function staffName(){ return STAFF_NAME; }

let TICKETS={};
function ageOf(iso){return Math.max(0,Math.round((Date.now()-new Date(iso).getTime())/60000));}
function ageClass(m){return m>=20?'late':m>=10?'warn':'';}

function card(t){
  const age=ageOf(t.created_at);
  const courses=Array.isArray(t.selected_courses)?t.selected_courses:[];
  // collapsible summary
  const sum='<div class="c-sum">'+
    '<span class="chip kcal">'+bn(t.total_kcal||0)+' kcal</span>'+
    '<span class="chip">প্রোটিন '+bn(t.total_protein||0)+'g</span>'+
    '<span class="chip">'+bn(courses.length)+' কোর্স</span></div>';

  // column-specific footer
  let foot='';
  if(t.status==='queued'){
    foot='<button class="act recipe" onclick="event.stopPropagation();openRecipe(\''+t.id+'\')">📖 রেসিপি</button>'+
         '<button class="act cook" onclick="event.stopPropagation();claim(\''+t.id+'\')">🍳 রান্না শুরু</button>'+
         '<button class="act decline" onclick="event.stopPropagation();adv(\''+t.id+'\',\'declined\')">✕</button>';
  }else if(t.status==='preparing'){
    // বোতাম লক: যে ধরেছে শুধু সে "প্রস্তুত" দেখবে; অন্যরা লক-বার্তা
    if(t.claimed_by && t.claimed_by!==STAFF_NAME){
      foot='<button class="act recipe" onclick="event.stopPropagation();openRecipe(\''+t.id+'\')">📖 রেসিপি</button>'+
           '<span class="lockmsg">🔒 '+t.claimed_by+' রান্না করছেন</span>';
    }else{
      foot='<button class="act recipe" onclick="event.stopPropagation();openRecipe(\''+t.id+'\')">📖 রেসিপি</button>'+
           '<button class="act rdy" onclick="event.stopPropagation();adv(\''+t.id+'\',\'ready\')">✓ খাবার প্রস্তুত</button>';
    }
  }else if(t.status==='ready'){
    foot='<button class="act check" onclick="event.stopPropagation();openCheck(\''+t.id+'\')">🔍 যাচাই</button>'+
         '<button class="act deliver" onclick="event.stopPropagation();adv(\''+t.id+'\',\'served\')">🛵 ডেলিভারি</button>';
  }

  const claimedLine = (t.status==='preparing'&&t.claimed_by)
    ? '<div class="claimed">👨‍🍳 '+t.claimed_by+' ধরেছেন</div>' : '';

  return '<div class="card" data-id="'+t.id+'">'+
    '<div class="c-head" onclick="toggleCard(this)">'+
      '<span class="c-no">#'+bn(t.order_id)+'</span>'+
      '<span class="c-meta">'+(MEAL[t.meal_type]||t.meal_type||'')+' · '+(t.day||'')+
        ' <span class="age '+ageClass(age)+'">'+bn(age)+' মিন</span></span>'+
      '<span class="c-toggle">▾</span>'+
    '</div>'+
    '<div class="c-title">'+
      (t.menu_name || (courses[0]?courses[0].name_bn:'থেরাপিউটিক মিল'))+
      (t.menu_code?' <span class="code">'+t.menu_code+'</span>':'')+'</div>'+
    '<div class="c-collapse">'+sum+claimedLine+'</div>'+
    '<div class="c-foot">'+foot+'</div>'+
  '</div>';
}

function toggleCard(head){ head.parentElement.classList.toggle('open'); }

// ── রেসিপি আলাদা উইন্ডোতে ──
function openRecipe(id){
  const t=TICKETS[id]; if(!t)return;
  const courses=Array.isArray(t.selected_courses)?t.selected_courses:[];
  const body=courses.map(c=>{
    const ings=(c.ingredients||[]).map(g=>'<span class="ing">'+(g.item||g)+
      (g.grams?' <b>'+bn(g.grams)+'g</b>':'')+'</span>').join('');
    const steps=(c.steps||[]).map(s=>'<li>'+s+'</li>').join('')||
      '<li>তেলমুক্ত পদ্ধতিতে রান্না করুন (স্টিম/এয়ার-ফ্রাই)। গোলাপি লবণ ব্যবহার করুন।</li>';
    return '<div class="course"><div class="co-top">'+
      '<span class="co-slot">'+bn(c.slot||1)+'</span>'+
      '<span class="co-name">'+(c.name_bn||'কোর্স')+'</span>'+
      (c.kcal?'<span class="co-kcal">'+bn(c.kcal)+' kcal</span>':'')+'</div>'+
      '<div class="ings">'+ings+'</div><ul class="steps">'+steps+'</ul></div>';
  }).join('')||'<div class="col-empty">কোর্স তথ্য নেই</div>';

  const w=window.open('','recipe','width=620,height=720,scrollbars=yes');
  w.document.write('<!DOCTYPE html><html lang="bn"><head><meta charset="UTF-8">'+
    '<title>রেসিপি · '+(t.menu_code||'')+'</title><style>'+
    'body{font-family:"Hind Siliguri",system-ui,sans-serif;background:#11161c;color:#eef3f8;padding:1.2rem;margin:0}'+
    'h2{color:#f5b73c;margin:0 0 1rem}.course{border-top:1px dashed #2c3a49;padding:.8rem 0}'+
    '.course:first-child{border-top:none}.co-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}'+
    '.co-slot{width:1.6rem;height:1.6rem;border-radius:.35rem;background:#4aa3df;color:#0c1116;display:grid;place-items:center;font-weight:700}'+
    '.co-name{font-size:1rem;font-weight:600}.co-kcal{margin-left:auto;color:#6b7c8c;font-size:.8rem}'+
    '.ings{display:flex;flex-wrap:wrap;gap:.3rem;margin:.3rem 0 .5rem}'+
    '.ing{background:#212c38;border:1px solid #2c3a49;border-radius:.4rem;padding:.15rem .5rem;font-size:.8rem}'+
    '.ing b{color:#4aa3df}.steps{padding-left:1.2rem}.steps li{margin:.3rem 0;line-height:1.5;color:#9fb0c0}'+
    '.pbtn{background:#4aa3df;color:#0c1116;border:none;border-radius:.5rem;padding:.6rem 1.2rem;font-size:.9rem;font-weight:700;cursor:pointer;margin-bottom:1rem}'+
    '</style></head><body>'+
    '<button class="pbtn" onclick="window.print()">🖨️ প্রিন্ট</button>'+
    '<h2>📖 রেসিপি · অর্ডার #'+bn(t.order_id)+' · '+(t.menu_code||'')+'</h2>'+
    body+'</body></html>');
  w.document.close();
}

// ── রান্না শুরু (claim — বোতাম লক) ──
async function claim(id){
  if(!STAFF_NAME){ alert('আগে লগইন করুন।'); return; }
  const t=TICKETS[id]; if(!t)return;
  try{
    const res=await api('kitchenStatus',{id:t.real_order_id||id,status:'preparing',claimed_by:STAFF_NAME});
    if(res && res.locked){
      alert('🔒 এই অর্ডারটি ইতিমধ্যে '+res.by+' ধরেছেন।');
    }
  }catch(e){}
  load();
}

// ── status এগিয়ে নেওয়া ──
async function adv(id,to){
  const t=TICKETS[id];
  try{await api('kitchenStatus',{id:(t&&t.real_order_id)||id,status:to});}catch(e){}
  closeModal(); load();
}

// ── চূড়ান্ত যাচাই (মিডিয়াম উইন্ডো) ──
function openCheck(id){
  const t=TICKETS[id]; if(!t)return;
  const courses=Array.isArray(t.selected_courses)?t.selected_courses:[];
  document.getElementById('m-title').textContent='চূড়ান্ত যাচাই · অর্ডার #'+bn(t.order_id);
  document.getElementById('m-body').innerHTML=courses.map(c=>
    '<div class="check-row"><input type="checkbox"> <span>'+
    '<b>'+(c.name_bn||'কোর্স')+'</b>'+(c.kcal?' · '+bn(c.kcal)+' kcal':'')+'</span></div>'
  ).join('')||'<div class="col-empty">কোর্স নেই</div>';
  document.getElementById('m-foot').innerHTML=
    '<button class="act deliver" style="width:100%" onclick="adv(\''+t.id+'\',\'served\')">'+
    '✓ যাচাই সম্পন্ন · 🛵 ডেলিভারিতে পাঠান</button>';
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}

function fill(colId,list,nId){
  const el=document.getElementById(colId);
  document.getElementById(nId).textContent=bn(list.length);
  if(!list.length){el.innerHTML='<div class="col-empty">কোনো অর্ডার নেই</div>';return;}
  list.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  el.innerHTML=list.map(card).join('');
}

async function load(){
  try{
    const r=await api('kitchenQueue',{statuses:['queued','preparing','ready']});
    const tk=r.tickets||[]; TICKETS={};
    tk.forEach(t=>TICKETS[t.id]=t);
    fill('col-queued',  tk.filter(t=>t.status==='queued'),   'n-q');
    fill('col-preparing',tk.filter(t=>t.status==='preparing'),'n-p');
    fill('col-ready',   tk.filter(t=>t.status==='ready'),    'n-r');
    document.getElementById('qcount').textContent=bn(tk.length);
  }catch(e){
    document.getElementById('col-queued').innerHTML=
      '<div class="col-empty">কিউ লোড হয়নি।<br>sar.js এ kitchenQueue action ও kitchen-setup.sql চালানো হয়েছে কিনা দেখুন।<br><small>'+e.message+'</small></div>';
  }
}

// শুরুতে: লগইন করা থাকলে বোর্ড দেখাও, নাহলে লগইন পর্দা
if(STAFF_NAME){
  showBoard();
  setInterval(()=>{ if(STAFF_NAME) load(); },15000);
}else{
  setInterval(()=>{ if(STAFF_NAME) load(); },15000);
}
</script>
