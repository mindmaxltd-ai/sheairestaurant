<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAR রান্নাঘর · Kitchen Board</title>
<style>
/* ── SAR Kitchen Board — 3-column kanban with collapsible recipe ──
   queue (নতুন) → cooking (রান্না হচ্ছে) → ready (প্রস্তুত)
   Fire-free therapeutic kitchen; the appliance IS the method. */
:root{
  --bg:#11161c; --panel:#1a222c; --panel-2:#212c38; --line:#2c3a49;
  --ink:#eef3f8; --ink-2:#9fb0c0; --ink-3:#6b7c8c;
  --steam:#4aa3df; --airfry:#e8893b; --cold:#46c08a;
  --amber:#f5b73c; --green:#46c08a; --red:#e2604f; --blue:#4aa3df;
  --mono:"Space Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);
  font-family:"SolaimanLipi","Hind Siliguri",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.num{font-variant-numeric:tabular-nums}

/* ── simple login (admin-style, no server token) ── */
.klogin{position:fixed;inset:0;z-index:9999;background:rgba(8,11,15,.95);
  display:flex;align-items:center;justify-content:center;padding:1.2rem}
.klogin.hidden{display:none}
.klogin-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;
  padding:2rem 1.6rem;max-width:360px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.5)}
.klogin-logo{text-align:center;margin-bottom:1.4rem}
.klogin-logo .mk{width:58px;height:58px;border-radius:16px;margin:0 auto .7rem;
  display:grid;place-items:center;font-size:1.5rem;background:linear-gradient(135deg,var(--airfry),var(--green))}
.klogin-logo b{font-size:1.15rem}
.klogin-logo small{display:block;color:var(--ink-3);font-size:.74rem;margin-top:.2rem}
.klogin label{display:block;font-size:.78rem;color:var(--ink-2);margin:.8rem 0 .3rem}
.klogin input{width:100%;background:#0f141a;border:1px solid var(--line);
  border-radius:10px;padding:.7rem .9rem;color:#fff;font-family:inherit;font-size:.95rem}
.klogin input:focus{outline:none;border-color:var(--airfry)}
.klogin .kbtn-login{width:100%;margin-top:1.2rem;background:linear-gradient(135deg,var(--airfry),var(--green));
  color:#fff;border:none;border-radius:10px;padding:.8rem;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit}
.klogin .kbtn-login:hover{filter:brightness(1.08)}
.klogin .err{display:none;margin-top:.8rem;background:rgba(226,96,79,.12);
  border:1px solid rgba(226,96,79,.3);border-radius:8px;padding:.55rem .8rem;color:var(--red);font-size:.82rem;text-align:center}
.klogin .err.show{display:block}

header{display:flex;align-items:center;gap:1rem;padding:.8rem 1.2rem;
  background:linear-gradient(180deg,#141b22,#11161c);border-bottom:1px solid var(--line);flex:none}
.brand{display:flex;align-items:baseline;gap:.5rem}
.brand b{font-size:1.2rem}.brand span{color:var(--ink-3);font-size:.78rem}
.live{display:flex;align-items:center;gap:.4rem;font-size:.74rem;color:var(--ink-2);margin-left:.5rem}
.dot{width:.55rem;height:.55rem;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(70,192,138,.5)}70%{box-shadow:0 0 0 8px rgba(70,192,138,0)}100%{box-shadow:0 0 0 0 rgba(70,192,138,0)}}
.clock{font-family:var(--mono);font-size:.82rem;color:var(--ink-2)}
.spacer{flex:1}
.hbtn{background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
  border-radius:.55rem;padding:.5rem .85rem;font-size:.82rem;cursor:pointer;font-family:inherit}
.hbtn:hover{background:#28384a}

/* board: 3 columns */
.board{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);overflow:hidden}
.col{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.col-head{padding:.7rem 1rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.5rem;flex:none}
.col-head .ic{width:.7rem;height:.7rem;border-radius:50%}
.col-head b{font-size:.95rem}
.col-head .n{margin-left:auto;font-size:.8rem;color:var(--ink-3);background:var(--panel-2);border-radius:1rem;padding:.1rem .55rem}
.col.pending .ic{background:var(--amber)}
.col.cooking .ic{background:var(--airfry)}
.col.ready .ic{background:var(--green)}
.col-body{flex:1;overflow-y:auto;padding:.8rem;display:flex;flex-direction:column;gap:.8rem}
.col-empty{color:var(--ink-3);text-align:center;padding:2.5rem .5rem;font-size:.85rem}

/* card */
.card{background:var(--panel);border:1px solid var(--line);border-radius:.7rem;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.22)}
.c-head{display:flex;align-items:center;gap:.5rem;padding:.6rem .8rem;background:var(--panel-2);border-bottom:1px solid var(--line);cursor:pointer}
.c-head:hover{background:#28384a}
.c-no{font-weight:700;font-size:.92rem}
.c-cust{font-size:.72rem;color:var(--ink-2)}
.c-meta{margin-left:auto;text-align:right;font-size:.72rem;color:var(--ink-2);line-height:1.3}
.age{font-size:.7rem;padding:.12rem .45rem;border-radius:.4rem;background:#2a3543;color:var(--ink-2)}
.age.warn{background:rgba(245,183,60,.18);color:var(--amber)}
.age.late{background:rgba(226,96,79,.2);color:var(--red)}
.caret{transition:transform .2s;color:var(--ink-3);font-size:.8rem;margin-left:.3rem}
.card.open .caret{transform:rotate(90deg)}
.c-sum{padding:.55rem .8rem;display:flex;flex-wrap:wrap;gap:.3rem}
.chip{font-size:.7rem;border:1px solid var(--line);border-radius:.4rem;padding:.1rem .45rem;color:var(--ink-2)}
.chip.kcal{color:var(--amber);border-color:rgba(245,183,60,.35)}

/* collapsible recipe body */
.recipe{display:none;border-top:1px solid var(--line);padding:.7rem .8rem;background:#141b22}
.card.open .recipe{display:block}
.course{border-top:1px dashed var(--line);padding:.6rem 0}
.course:first-child{border-top:none}
.co-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
.co-slot{width:1.4rem;height:1.4rem;border-radius:.35rem;display:grid;place-items:center;font-size:.74rem;font-weight:700;color:#0c1116}
.co-name{font-size:.85rem;font-weight:600}
.ings{display:flex;flex-wrap:wrap;gap:.3rem;margin:.2rem 0 .4rem}
.ing{background:var(--panel-2);border:1px solid var(--line);border-radius:.4rem;padding:.12rem .45rem;font-size:.74rem}
.ing b{color:var(--steam)}
.ing .ex{color:var(--cold);font-size:.66rem;margin-left:.2rem}
.steps{list-style:none;display:flex;flex-direction:column;gap:.25rem;margin-top:.3rem}
.steps li{font-size:.76rem;color:var(--ink-2);line-height:1.5;padding-left:1rem;position:relative}
.steps li:before{content:"›";position:absolute;left:0;color:var(--ink-3)}
.dose{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem}
.dchip{font-size:.68rem;border-radius:.4rem;padding:.1rem .45rem;border:1px solid var(--line)}
.dchip.dis{color:var(--airfry);border-color:rgba(232,137,59,.4)}
.dchip.con{color:var(--steam);border-color:rgba(74,163,223,.4)}
.dchip.chu{color:var(--cold);border-color:rgba(70,192,138,.4)}
.method-note{margin-top:.5rem;font-size:.72rem;color:var(--cold);background:rgba(70,192,138,.08);border-radius:.4rem;padding:.4rem .6rem}

.c-foot{display:flex;gap:.5rem;padding:.6rem .8rem;border-top:1px solid var(--line)}
.act{flex:1;border:none;border-radius:.55rem;padding:.6rem;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;color:#0c1116}
.act:hover{filter:brightness(1.08)}
.act.cook{background:var(--airfry)}
.act.decline{background:transparent;color:var(--red);border:1px solid rgba(226,96,79,.5);flex:0 0 auto;padding:.6rem .8rem}
.act.rdy{background:var(--green)}
.act.deliver{background:var(--blue);color:#fff}

.toast{position:fixed;bottom:1.3rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel-2);color:var(--ink);border:1px solid var(--line);padding:.7rem 1.2rem;
  border-radius:30px;font-size:.85rem;font-weight:700;opacity:0;visibility:hidden;transition:.25s;z-index:120}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}

@media print{
  body{background:#fff;color:#000;height:auto;overflow:visible}
  header,.hbtn,.live,.c-foot,.klogin{display:none!important}
  .board{display:block}.col{display:block}
  .recipe{display:block!important}
  .card{break-inside:avoid;border:1px solid #999;margin-bottom:10px;background:#fff;color:#000}
}
@media (max-width:760px){
  body{height:auto;overflow:auto}
  .board{grid-template-columns:1fr;gap:1px}
  .col-body{max-height:none}
}
</style>
</head>
<body>

<!-- ── simple kitchen login gate (admin-style; no server token) ── -->
<div class="klogin" id="kLogin">
  <div class="klogin-card">
    <div class="klogin-logo">
      <div class="mk">🍳</div>
      <b>SAR রান্নাঘর</b>
      <small>Kitchen Board · স্টাফ প্রবেশ</small>
    </div>
    <label for="kUser">ইউজার আইডি</label>
    <input id="kUser" type="text" placeholder="user id" autocomplete="username">
    <label for="kPass">পাসওয়ার্ড</label>
    <input id="kPass" type="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')kitchenLogin()">
    <button class="kbtn-login" onclick="kitchenLogin()">প্রবেশ করুন →</button>
    <div class="err" id="kLoginErr">ভুল ইউজার আইডি বা পাসওয়ার্ড</div>
  </div>
</div>

<header>
  <div class="brand"><b>SAR রান্নাঘর</b><span>Kitchen Board · v2-board</span></div>
  <div class="live"><span class="dot"></span> লাইভ · <span id="qcount" class="num">০</span> সক্রিয়</div>
  <span class="clock" id="clock">—</span>
  <div class="spacer"></div>
  <button class="hbtn" onclick="window.print()">🖨️ প্রিন্ট</button>
  <button class="hbtn" onclick="load()">↻ রিফ্রেশ</button>
  <button class="hbtn" onclick="kitchenLogout()">🚪 লগআউট</button>
</header>

<div class="board">
  <section class="col pending">
    <div class="col-head"><span class="ic"></span><b>নতুন অর্ডার</b><span class="n num" id="n-q">০</span></div>
    <div class="col-body" id="col-queued"></div>
  </section>
  <section class="col cooking">
    <div class="col-head"><span class="ic"></span><b>রান্না হচ্ছে</b><span class="n num" id="n-p">০</span></div>
    <div class="col-body" id="col-preparing"></div>
  </section>
  <section class="col ready">
    <div class="col-head"><span class="ic"></span><b>প্রস্তুত</b><span class="n num" id="n-r">০</span></div>
    <div class="col-body" id="col-ready"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
// SAR KITCHEN BOARD — queue/cooking/ready + collapsible recipe.
// Fire-free therapeutic kitchen. Recipe (ingredients + exact
// grams + fire-free steps) is shown collapsed per card; the
// customer never sees it. Status flow mirrors order status so
// the track page shows "delivered" after the delivery button.
// Login is the simple admin-style gate (no server token).
// ════════════════════════════════════════════════════
const API='/.netlify/functions/sar';
async function api(action,body){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({action},body||{}))});
  if(!r.ok) throw new Error(action+' '+r.status);
  return r.json();
}
const bn=n=>(n==null?0:n).toLocaleString('bn-BD');

// ── login (admin-style; edit KITCHEN_CREDS to change who can enter) ──
const KITCHEN_CREDS=[
  {user:'kitchen', pass:'sar2024'},
  {user:'cook',    pass:'sar2024'},
  {user:'tutul',   pass:'aimthm@2008'},
];
function kitchenLogin(){
  const u=(document.getElementById('kUser').value||'').trim();
  const p=(document.getElementById('kPass').value||'');
  const err=document.getElementById('kLoginErr');
  const ok=KITCHEN_CREDS.find(c=>c.user===u && c.pass===p);
  if(ok){
    sessionStorage.setItem('sar_kitchen_user',JSON.stringify({user:u,at:Date.now()}));
    document.getElementById('kLogin').classList.add('hidden');
    startKitchen();
  }else{
    err.textContent='❌ ভুল ইউজার আইডি বা পাসওয়ার্ড';
    err.classList.add('show');
    document.getElementById('kPass').value='';
    setTimeout(()=>err.classList.remove('show'),4000);
  }
}
function kitchenLogout(){
  sessionStorage.removeItem('sar_kitchen_user');
  if(window._kTimer) clearInterval(window._kTimer);
  document.getElementById('kLogin').classList.remove('hidden');
}
function startKitchen(){
  tick(); setInterval(tick,1000);
  load();
  window._kTimer=setInterval(load,15000);   // auto-refresh board
}
function tick(){const d=new Date();const el=document.getElementById('clock');if(el)el.textContent=d.toLocaleTimeString('bn-BD');}

// ════════════════════════════════════════════════════
// shared therapeutic data (same source of truth as meal-score)
// ════════════════════════════════════════════════════
const MEAL_DB={
  DM:{bn:'ডায়াবেটিস',protein:'Boneless Fish',disease:['Cinnamon','Fenugreek','Gurmar']},
  OB:{bn:'স্থূলতা',protein:'Indigenous Egg',disease:['Triphala','Garcinia','Green Tea']},
  FL:{bn:'ফ্যাটি লিভার',protein:'Boneless Fish',disease:['Milk Thistle','Bhumyamalaki Powder','Turmeric']},
  IB:{bn:'IBS/গ্যাস্ট্রিক',protein:'Boneless Indigenous Chicken',disease:['Lemongrass','Licorice','Ginger']},
  PR:{bn:'গর্ভাবস্থা',protein:'Indigenous Egg',disease:['Shatavari','Moringa Powder','Amla Powder']},
};
const CONDITION_POWDERS=['Ashwagandha','Tulsi','Brahmi'];
const SEASONAL_FRUITS={
  DM:['Guava','Black Berry','Green Apple','Pear'],OB:['Water Melon','Guava','Pear'],
  FL:['Amla','Black Berry','Guava','Apple'],IB:['Banana','Papaya','Guava'],
  PR:['Mango','Jackfruit','Pineapple','Banana','Orange'],
};
const MEALS=[{key:'breakfast',bn:'সকাল',en:'BREAKFAST',ic:'🌅'},
             {key:'lunch',bn:'দুপুর',en:'LUNCH',ic:'☀️'},
             {key:'dinner',bn:'রাত',en:'DINNER',ic:'🌙'}];
const CAT_BN={DM:'ডায়াবেটিস',OB:'স্থূলতা',FL:'ফ্যাটি লিভার',IB:'IBS/গ্যাস্ট্রিক',PR:'গর্ভাবস্থা'};
const COURSE_LABEL=['থেরাপিউটিক মেইন কোর্স','প্রোটিন ও স্প্রাউট কোর্স','স্টিমড/বেকড সবজি কোর্স','ইমোশনাল চাটনি কোর্স','মৌসুমি ফল কোর্স'];
const STATION=['steam','airfry','airfry','cold','cold'];
const STCOLOR={steam:'var(--steam)',airfry:'var(--airfry)',cold:'var(--cold)'};
const SLOT_G=[ [90,70,55], [60,75,12], [80,70], [45,8,1], [120] ];

const COURSE_POOLS={
  DM:{ main:['Bitter Gourd','Bottle Gourd','Pumpkin','Ash Gourd','Ridge Gourd','Snake Gourd','Pointed Gourd'],prot:['Chickpea Sprout','Green Gram Sprout','Boneless Fish','Indigenous Egg','Black Chickpea','Field Pea','Lentil Sprout'],steam:['Broccoli','Cauliflower','Green Beans','Okra','Cabbage','Capsicum','Turnip'],leafy:['Spinach','Mustard Greens','Fenugreek Leaves','Moringa Leaves','Amaranth Leaves'],seed:['Chia Seed','Flax Seed','Pumpkin Seed','Sunflower Seed'] },
  OB:{ main:['Ash Gourd','Bottle Gourd','Cucumber','Zucchini','Ridge Gourd','Chayote','Pumpkin'],prot:['Green Gram Sprout','Indigenous Egg','Boneless Indigenous Chicken','Mung Bean','Soybean','Cowpea','Lentil Sprout'],steam:['Broccoli','Cauliflower','Cabbage','Green Beans','Capsicum','Okra','Carrot'],leafy:['Mustard Greens','Moringa Leaves','Spinach','Water Spinach','Malabar Spinach'],seed:['Pumpkin Seed','Flax Seed','Sunflower Seed','Watermelon Seed'] },
  FL:{ main:['Ridge Gourd','Bottle Gourd','Snake Gourd','Pointed Gourd','Ash Gourd','Bitter Gourd','Radish'],prot:['Lentil Sprout','Boneless Fish','Green Gram Sprout','Red Lentil','Mung Bean','Chickpea Sprout','Indigenous Egg'],steam:['Beetroot','Radish','Carrot','Broccoli','Cauliflower','Green Papaya','Turnip'],leafy:['Water Spinach','Coriander Leaves','Spinach','Amaranth Leaves','Mint Leaves'],seed:['Flax Seed','Sunflower Seed','Pumpkin Seed','Basil Seed'] },
  IB:{ main:['Snake Gourd','Bottle Gourd','Pointed Gourd','Ridge Gourd','Green Papaya','Carrot','Ash Gourd'],prot:['Green Gram Sprout','Boneless Indigenous Chicken','Mung Bean','Lentil Sprout','Indigenous Egg','Red Lentil','Boneless Fish'],steam:['Carrot','Green Papaya','Raw Banana','Sweet Potato','Turnip','Green Beans','Drumstick'],leafy:['Mint Leaves','Curry Leaves','Coriander Leaves','Spinach','Malabar Spinach'],seed:['Flax Seed','Basil Seed','Sunflower Seed','Pumpkin Seed'] },
  PR:{ main:['Pumpkin','Bottle Gourd','Drumstick','Sweet Potato','Green Papaya','Carrot','Beetroot'],prot:['Chickpea Sprout','Indigenous Egg','Boneless Fish','Almond','Lentil Sprout','Mung Bean','Black Chickpea'],steam:['Beetroot','Carrot','Broccoli','Green Beans','Drumstick','Sweet Potato','Capsicum'],leafy:['Moringa Leaves','Red Spinach','Spinach','Amaranth Leaves','Fenugreek Leaves'],seed:['Sesame Seed','Almond','Sunflower Seed','Watermelon Seed'] },
};
function conditionOffset(m){let o=0;const stress=+(m.stress_level||0),sleep=+(m.sleep_hours||m.sleep||7),mood=(m.mood||'').toString();if(stress>=7)o+=2;else if(stress>=4)o+=1;if(sleep<6)o+=1;if(/low|tired|ক্লান্ত|খারাপ/i.test(mood))o+=1;return o;}
function rotPick(pool,day,off,count){if(!pool||!pool.length)return[];const out=[],n=pool.length;for(let i=0;i<count;i++)out.push(pool[(day+off+i)%n]);return out;}
function rebuildCourses(cat,di,mealKey,m){
  const pools=COURSE_POOLS[cat]||COURSE_POOLS.DM;
  const off=conditionOffset(m||{}), mShift={breakfast:0,lunch:2,dinner:4}[mealKey]||0, seed=di+off+mShift;
  const fruits=SEASONAL_FRUITS[cat]||SEASONAL_FRUITS.DM;
  return [
    {name:'থেরাপিউটিক মেইন কোর্স',items:rotPick(pools.main,seed,0,2).concat(rotPick(pools.leafy,seed,0,1))},
    {name:'প্রোটিন ও স্প্রাউট কোর্স',items:rotPick(pools.prot,seed,0,2).concat(rotPick(pools.seed,seed,0,1))},
    {name:'স্টিমড/বেকড সবজি কোর্স',items:rotPick(pools.steam,seed,0,2)},
    {name:'ইমোশনাল চাটনি কোর্স',items:['Herb + Amla চাটনি','Lemon','Pink Salt']},
    {name:'মৌসুমি ফল কোর্স',items:[fruits[seed%fruits.length]]},
  ];
}
function methodFor(mealKey,cat){
  const db=MEAL_DB[cat]||MEAL_DB.DM, prot=db.protein;
  const base=[
    {t:'সব সবজি ধুয়ে সমান টুকরা করুন — নিচের গ্রাম অনুযায়ী ওজন মেপে নিন।'},
    {t:'<b>স্টিমার</b>-এ মেইন ও স্টিমড সবজি ৮–১০ মিনিট ভাপে সিদ্ধ করুন। তেল নিষিদ্ধ।'},
  ];
  if(/Fish/i.test(prot)) base.push({t:'<b>বোনলেস মাছ</b> হলুদ+পিংক সল্ট মাখিয়ে <b>স্টিম/বেক</b> (১৮০°C, ১২ মিনিট) — ভাজা নয়।'});
  else if(/Chicken/i.test(prot)) base.push({t:'<b>দেশি মুরগি (boneless)</b> ম্যারিনেট করে <b>এয়ার-ফ্রাই/বেক</b> (১৮০°C, ১৪ মিনিট)।'});
  else base.push({t:'<b>দেশি ডিম</b> সিদ্ধ/স্টিম করুন (তেল ছাড়া)।'});
  base.push({t:'স্প্রাউট/ডাল হালকা ভাপ; বীজ শুকনো টেলে উপরে ছড়িয়ে দিন।'});
  base.push({t:'<b>পাউডার ও চাটনি প্লেটিংয়ের ঠিক আগে যোগ করুন</b> — তাপে নয়।'});
  return base;
}
function ageOf(iso){return Math.max(0,Math.round((Date.now()-new Date(iso).getTime())/60000));}
function ageClass(m){return m>=20?'late':m>=10?'warn':'';}
function detectCatFromItem(it){return it.cat||it.disease_category||'DM';}

// ── build the collapsible recipe HTML for ALL items in an order ──
function recipeHTML(t){
  try{
  const items=Array.isArray(t.items)?t.items:[];
  if(!items.length) return '<div class="col-empty">রেসিপি তথ্য নেই</div>';
  const f=t._factor||1;
  return items.map((it,ix)=>{
    const cat=detectCatFromItem(it);
    const db=MEAL_DB[cat]||MEAL_DB.DM;
    const mealKey=it.meal||it.meal_type||'lunch';
    const meal=MEALS.find(m=>m.key===mealKey)||MEALS[1];
    const di=(it.day_index!=null?it.day_index:ix);
    const courseCount=it.courseCount||it.course_count||(it.courses?it.courses.length:3);
    let src=(it.courseDetail&&it.courseDetail.length)?it.courseDetail
          :(it.courses&&it.courses.length&&typeof it.courses[0]==='object')?it.courses
          :rebuildCourses(cat,di,mealKey,t._metrics).slice(0,courseCount);
    const courses=src.map((co,idx)=>{
      const cIdx=idx, st=STATION[cIdx]||'steam';
      const grams=SLOT_G[cIdx]||SLOT_G[0];
      const names=(co.items&&co.items.length)?co.items
                 :(co.ingredients&&co.ingredients.length)?co.ingredients.map(g=>typeof g==='string'?g:g.item)
                 :[(co.name||co.name_bn||'উপাদান')];
      const ings=names.map((nm,si)=>{
        const exempt=(cIdx===4);
        const baseG=grams[si]!=null?grams[si]:(grams[grams.length-1]||50);
        const g=exempt?baseG:Math.round(baseG*f);
        return '<span class="ing">'+nm+' <b>'+bn(g)+'g</b>'+(exempt?'<span class="ex">ফল·fixed</span>':'')+'</span>';
      }).join('');
      return '<div class="course"><div class="co-top">'+
        '<span class="co-slot" style="background:'+STCOLOR[st]+'">'+bn(cIdx+1)+'</span>'+
        '<span class="co-name">'+(co.name||co.name_bn||COURSE_LABEL[cIdx])+'</span></div>'+
        '<div class="ings">'+ings+'</div></div>';
    }).join('');
    const steps=methodFor(mealKey,cat).map(s=>'<li>'+s.t+'</li>').join('');
    const dis=(it.diseasePowders&&it.diseasePowders.length)?it.diseasePowders:db.disease;
    const con=(it.conditionPowders&&it.conditionPowders.length)?it.conditionPowders:CONDITION_POWDERS;
    const chut=it.chutney||'Stress Relief Green Chutney';
    const topping=it.topping||'Roasted Pumpkin Seed';
    return '<div style="margin-bottom:.6rem">'+
      '<div style="font-size:.8rem;font-weight:700;color:var(--ink);margin:.2rem 0 .4rem">'+
        meal.ic+' '+meal.en+' · '+(it.name||it.name_bn||db.bn+' Meal')+' <span style="color:var(--ink-3);font-weight:400">('+(CAT_BN[cat]||cat)+' · ×'+f.toFixed(2)+')</span></div>'+
      courses+
      '<div class="dose">'+
        dis.map(p=>'<span class="dchip dis">Disease: '+p+'</span>').join('')+
        con.map(p=>'<span class="dchip con">Condition: '+p+'</span>').join('')+
        '<span class="dchip chu">Chutney: '+chut+'</span>'+
        '<span class="dchip chu">Topping: '+topping+'</span>'+
      '</div>'+
      '<ul class="steps">'+steps+'</ul>'+
    '</div>';
  }).join('')+
  '<div class="method-note">❄ তেল/দুধ/চিনি/রং নিষিদ্ধ · শুধু Steam · Bake · Air-fry · লবণ = পিংক সল্ট · পরিমাণ হুবহু অনুসরণ করুন</div>';
  }catch(e){
    return '<div class="col-empty">রেসিপি দেখানো গেল না (ডেটা অসম্পূর্ণ)।<br><small>'+(e.message||'')+'</small></div>';
  }
}

// ── one board card ──
function card(t){
  try{
  const age=ageOf(t.created_at);
  const itemCount=t.item_count||(Array.isArray(t.items)?t.items.length:0);
  let foot='';
  if(['queued','claimed'].includes(t.status)){
    foot='<button class="act cook" onclick="adv(event,\''+t.id+'\',\'preparing\')">🍳 রান্না শুরু</button>'+
         '<button class="act decline" onclick="adv(event,\''+t.id+'\',\'declined\')">✕ বাতিল</button>';
  }else if(t.status==='preparing'){
    foot='<button class="act rdy" onclick="adv(event,\''+t.id+'\',\'ready\')">✓ রান্না হয়েছে</button>';
  }else if(['ready','out_for_delivery'].includes(t.status)){
    foot='<button class="act deliver" onclick="adv(event,\''+t.id+'\',\'served\')">🛵 ডেলিভারি</button>';
  }
  return '<div class="card" data-id="'+t.id+'">'+
    '<div class="c-head" onclick="toggleCard(this)">'+
      '<span class="c-no">#'+(t.order_id||t.id)+'</span>'+
      '<span class="c-cust">'+(t.customer_name||'গ্রাহক')+'</span>'+
      '<span class="c-meta"><span class="age '+ageClass(age)+'">'+bn(age)+' মিন</span></span>'+
      '<span class="caret">▶</span>'+
    '</div>'+
    '<div class="c-sum">'+
      '<span class="chip kcal">'+bn(t.total_kcal||0)+' kcal</span>'+
      '<span class="chip">প্রোটিন '+bn(t.total_protein||0)+'g</span>'+
      '<span class="chip">'+bn(itemCount)+' আইটেম</span>'+
      '<span class="chip">'+bn(t.course_count||0)+' কোর্স</span>'+
    '</div>'+
    '<div class="recipe">'+recipeHTML(t)+'</div>'+
    '<div class="c-foot">'+foot+'</div>'+
  '</div>';
  }catch(e){
    // even if something is odd, show a usable card (never a blank line)
    return '<div class="card"><div class="c-head" onclick="toggleCard(this)">'+
      '<span class="c-no">#'+((t&&(t.order_id||t.id))||'—')+'</span>'+
      '<span class="c-cust">'+((t&&t.customer_name)||'গ্রাহক')+'</span>'+
      '<span class="caret">▶</span></div>'+
      '<div class="recipe"><div class="col-empty">বিস্তারিত দেখানো গেল না।<br><small>'+(e.message||'')+'</small></div></div>'+
    '</div>';
  }
}
function toggleCard(headEl){headEl.parentElement.classList.toggle('open');}

function fill(colId,list,nId){
  const el=document.getElementById(colId);
  document.getElementById(nId).textContent=bn(list.length);
  if(!list.length){el.innerHTML='<div class="col-empty">কোনো অর্ডার নেই</div>';return;}
  list.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));   // newest first
  el.innerHTML=list.map(card).join('');
}

async function load(){
  try{
    const r=await api('kitchenBoard',{});
    const tk=r.tickets||[];
    // attach personalization factor + metrics per ticket (best-effort)
    const q=tk.filter(t=>['queued','claimed'].includes(t.status));
    const p=tk.filter(t=>t.status==='preparing');
    const rd=tk.filter(t=>['ready','out_for_delivery'].includes(t.status));
    fill('col-queued',q,'n-q'); fill('col-preparing',p,'n-p'); fill('col-ready',rd,'n-r');
    document.getElementById('qcount').textContent=bn(tk.length);
  }catch(e){
    document.getElementById('col-queued').innerHTML=
      '<div class="col-empty">কিউ লোড হয়নি। sar.js ডিপ্লয় হয়েছে কিনা দেখুন।<br><small>'+e.message+'</small></div>';
  }
}

async function adv(ev,id,to){
  if(ev){ev.stopPropagation();}
  if(to==='declined' && !confirm('এই অর্ডারটি বাতিল করবেন?')) return;
  const btn=ev&&ev.target; if(btn){btn.disabled=true;btn.textContent='⏳';}
  try{
    const r=await api('kitchenAdvance',{id,status:to,staff_name:(JSON.parse(sessionStorage.getItem('sar_kitchen_user')||'{}').user)||'kitchen'});
    if(r&&r.ok){
      toast(to==='served'?'🛵 ডেলিভারিতে পাঠানো হয়েছে — track-এ "delivered" দেখাবে':
            to==='ready'?'✓ খাবার প্রস্তুত':
            to==='preparing'?'🍳 রান্না শুরু':
            to==='declined'?'অর্ডার বাতিল হয়েছে':'আপডেট হয়েছে');
    }else{
      toast('❌ আপডেট হয়নি'); if(btn){btn.disabled=false;}
    }
  }catch(e){toast('❌ '+e.message); if(btn){btn.disabled=false;}}
  load();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2800);
}

// ── boot: show login, or restore session ──
window.addEventListener('DOMContentLoaded',()=>{
  const saved=sessionStorage.getItem('sar_kitchen_user');
  if(saved){
    document.getElementById('kLogin').classList.add('hidden');
    startKitchen();
  }else{
    const u=document.getElementById('kUser'); if(u) u.focus();
  }
});
</script>
