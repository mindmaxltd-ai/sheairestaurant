<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>লগইন — SAR She AI Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#E91E8C;--pink2:#FF6BB5;--purple:#6B21A8;--purple2:#A855F7;
  --yellow:#F59E0B;--yellow2:#FCD34D;--green:#059669;--green2:#34D399;
  --dark:#0A0A0F;--dark2:#12121A;
  --glass:rgba(255,255,255,.05);--border:rgba(255,255,255,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:#fff;font-family:'Hind Siliguri',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;overflow-x:hidden}

.bg-anim{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.13;animation:orbF 14s ease-in-out infinite}
.o1{width:600px;height:600px;background:var(--pink);top:-200px;left:-200px}
.o2{width:500px;height:500px;background:var(--purple);bottom:-150px;right:-150px;animation-delay:7s}
@keyframes orbF{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-15px)}}

.rainbow-bar{height:3px;background:linear-gradient(90deg,var(--pink),var(--yellow2),var(--green2),var(--pink));
  background-size:200%;animation:rb 4s linear infinite;position:fixed;top:0;left:0;right:0;z-index:999}
@keyframes rb{0%{background-position:0%}100%{background-position:200%}}

.login-wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:1.5rem}
.login-card{background:rgba(15,15,26,.92);backdrop-filter:blur(24px);border:1px solid rgba(233,30,140,.2);
  border-radius:24px;padding:2.25rem;box-shadow:0 24px 64px rgba(0,0,0,.4)}

.logo-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.3rem}
.logo-gem{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--pink),var(--purple));
  display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;
  font-size:1.2rem;font-weight:900;color:#fff;box-shadow:0 0 20px rgba(233,30,140,.3);flex-shrink:0}
.logo-name{font-family:'Playfair Display',serif;font-size:1.1rem;
  background:linear-gradient(90deg,var(--pink),var(--yellow2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900}
.logo-sub{font-size:.62rem;color:rgba(255,255,255,.3);font-family:'Space Mono',monospace;letter-spacing:.08em}
.card-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;margin-bottom:.3rem}
.card-sub{font-size:.82rem;color:rgba(255,255,255,.4);margin-bottom:1.75rem;line-height:1.6}

.field-wrap{margin-bottom:1rem}
.field-label{display:block;font-size:.74rem;color:rgba(255,255,255,.5);
  font-family:'Space Mono',monospace;letter-spacing:.06em;margin-bottom:.4rem}
.field-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:11px;padding:.7rem 1rem;color:#fff;font-family:'Hind Siliguri',sans-serif;
  font-size:.92rem;outline:none;transition:border-color .25s}
.field-input:focus{border-color:var(--pink)}
.field-input::placeholder{color:rgba(255,255,255,.25)}
.input-wrap{display:flex;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:11px;overflow:hidden;transition:border-color .25s}
.input-wrap:focus-within{border-color:var(--pink)}
.input-wrap input{flex:1;background:none;border:none;padding:.7rem 1rem;color:#fff;
  font-family:'Hind Siliguri',sans-serif;font-size:.92rem;outline:none}
.input-wrap input::placeholder{color:rgba(255,255,255,.25)}
.eye-btn{background:none;border:none;padding:0 .85rem;cursor:pointer;
  color:rgba(255,255,255,.35);font-size:.9rem;transition:color .2s}
.eye-btn:hover{color:var(--pink2)}

.btn-login{width:100%;background:linear-gradient(135deg,var(--pink),var(--purple));
  border:none;border-radius:13px;padding:.85rem;color:#fff;font-family:'Hind Siliguri',sans-serif;
  font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;margin-top:.25rem;
  box-shadow:0 4px 20px rgba(233,30,140,.25)}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(233,30,140,.4)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}

.msg{font-size:.82rem;padding:.55rem .85rem;border-radius:9px;margin-top:.65rem;display:none;line-height:1.5}
.msg.err{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);color:#F87171}
.msg.ok{background:rgba(5,150,105,.12);border:1px solid rgba(52,211,153,.3);color:var(--green2)}

.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:rgba(255,255,255,.2);font-size:.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}

.reg-link{text-align:center;margin-top:1.25rem;font-size:.82rem;color:rgba(255,255,255,.4)}
.reg-link a{color:var(--pink2);text-decoration:none;font-weight:600}
.reg-link a:hover{text-decoration:underline}

.loading-overlay{position:fixed;inset:0;z-index:500;background:rgba(10,10,15,.85);
  backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.loading-overlay.show{display:flex}
.spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.85rem;color:rgba(255,255,255,.5)}
</style>
</head>
<body>
<div class="bg-anim"><div class="orb o1"></div><div class="orb o2"></div></div>
<div class="rainbow-bar"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">যাচাই করা হচ্ছে...</div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo-wrap">
      <div class="logo-gem">S</div>
      <div>
        <div class="logo-name">SAR সার</div>
        <div class="logo-sub">She AI Restaurant</div>
      </div>
    </div>

    <h2 class="card-title" style="margin-top:1.25rem">লগইন করুন</h2>
    <p class="card-sub">আপনার নিবন্ধিত মোবাইল নম্বর ও পাসওয়ার্ড দিন</p>

    <div class="field-wrap">
      <label class="field-label">মোবাইল নম্বর</label>
      <input type="tel" class="field-input" id="phone" placeholder="01XXXXXXXXX" maxlength="11"
        oninput="clearMsg()" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <div class="field-wrap">
      <label class="field-label">পাসওয়ার্ড</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="আপনার পাসওয়ার্ড"
          oninput="clearMsg()" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="eye-btn" type="button" onclick="togglePwd()">👁️</button>
      </div>
    </div>

    <div class="msg" id="loginMsg"></div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      🔐 লগইন করুন
    </button>

    <div class="divider">অথবা</div>

    <div class="reg-link">
      অ্যাকাউন্ট নেই? <a href="register.html">নিবন্ধন করুন →</a>
    </div>
    <div class="reg-link" style="margin-top:.5rem">
      <a href="index.html" style="color:rgba(255,255,255,.3)">← হোমপেজ</a>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://xlkrggspepnysbouatec.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsa3JnZ3NwZXBueXNib3VhdGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTU0OTEsImV4cCI6MjA5NTA5MTQ5MX0.dCAkAXL1EDNsxTBn8mcHcUHlXJ1xDBirwBdTgIq927U';
const H = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

function showMsg(txt, type){
  const el = document.getElementById('loginMsg');
  el.textContent = txt; el.className = 'msg '+type; el.style.display = 'block';
}
function clearMsg(){ document.getElementById('loginMsg').style.display='none'; }
function togglePwd(){
  const el = document.getElementById('password');
  el.type = el.type==='password' ? 'text' : 'password';
}

async function doLogin(){
  const phone = document.getElementById('phone').value.trim();
  const pass  = document.getElementById('password').value;

  // Validate inputs
  if(!phone){ showMsg('⚠️ মোবাইল নম্বর দিন।','err'); return; }
  if(!/^01[3-9]\d{8}$/.test(phone)){ showMsg('⚠️ সঠিক মোবাইল নম্বর দিন (01 দিয়ে শুরু, ১১ সংখ্যা)।','err'); return; }
  if(!pass){ showMsg('⚠️ পাসওয়ার্ড দিন।','err'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '⏳ যাচাই হচ্ছে...';
  document.getElementById('loadingText').textContent = 'যাচাই করা হচ্ছে...';
  document.getElementById('loadingOverlay').classList.add('show');

  try {
    // Fetch customer by phone
    const res = await fetch(
      `${SUPA_URL}/rest/v1/customers?phone=eq.${encodeURIComponent(phone)}&select=*`,
      { headers: H }
    );

    if(!res.ok){
      throw new Error('Supabase error: ' + res.status + ' ' + res.statusText);
    }

    const list = await res.json();
    document.getElementById('loadingOverlay').classList.remove('show');
    btn.disabled = false; btn.textContent = '🔐 লগইন করুন';

    if(!list || list.length === 0){
      showMsg('❌ এই নম্বরে কোনো অ্যাকাউন্ট পাওয়া যায়নি। নিবন্ধন করুন।','err');
      return;
    }

    const cust = list[0];

    // Check password
    const hash = cust.password_hash;
    if(hash){
      const entered = btoa(unescape(encodeURIComponent(pass)));
      if(hash !== entered){
        showMsg('❌ পাসওয়ার্ড ভুল। আবার চেষ্টা করুন।','err');
        document.getElementById('password').value = '';
        return;
      }
    }
    // No password_hash → allow login (first time or OTP user)

    // Save full session
    localStorage.setItem('sar_customer',       JSON.stringify(cust));
    localStorage.setItem('sar_customer_id',    cust.id);
    localStorage.setItem('sar_member_id',      cust.member_id || '');
    localStorage.setItem('sar_customer_name',  cust.full_name || '');
    localStorage.setItem('sar_phone',          cust.phone || '');
    localStorage.setItem('sar_login_time',     new Date().toISOString());
    localStorage.setItem('sar_admin_approved', cust.admin_approved ? 'true' : 'false');

    showMsg('✅ স্বাগতম ' + (cust.full_name||'আপা') + '! ড্যাশবোর্ডে যাচ্ছে...','ok');
    setTimeout(() => window.location.href = 'dashboard.html', 1000);

  } catch(err){
    document.getElementById('loadingOverlay').classList.remove('show');
    btn.disabled = false; btn.textContent = '🔐 লগইন করুন';
    showMsg('❌ সংযোগ সমস্যা: ' + err.message,'err');
    console.error(err);
  }
}

// Login page loaded — ready for user input
</script>
</body>
</html>
