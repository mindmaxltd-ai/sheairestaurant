<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>পেমেন্ট পদ্ধতি — SAR She AI Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#E91E8C;--pink2:#FF6BB5;--pink3:rgba(233,30,140,.12);
  --purple:#6B21A8;--purple2:#A855F7;
  --yellow:#F59E0B;--yellow2:#FCD34D;
  --red:#DC2626;--green:#059669;--green2:#34D399;
  --dark:#0A0A0F;--dark2:#0F0F1A;--dark3:#141428;
  --glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.15);
  --muted:rgba(255,255,255,.55);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:#fff;font-family:'Hind Siliguri',sans-serif;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:24px 18px 80px}

.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.title{font-size:20px;font-weight:700}
.title small{display:block;font-size:12px;color:var(--muted);font-weight:400;margin-top:2px}
.close-x{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);
  background:var(--glass);color:#fff;font-size:18px;cursor:pointer}

.amt-pill{display:inline-flex;align-items:center;gap:6px;background:var(--pink3);
  border:1px solid rgba(233,30,140,.3);padding:8px 16px;border-radius:999px;
  font-size:14px;margin:14px 0 22px}
.amt-pill b{font-family:'Space Mono';color:var(--pink2);font-size:16px}

/* Group label */
.group-label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;
  margin:22px 0 12px}

/* Payment method grid */
.pm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pm{background:var(--glass);border:1px solid var(--border);border-radius:14px;
  padding:14px 8px;text-align:center;cursor:pointer;transition:.15s;position:relative}
.pm:hover{border-color:var(--border2);transform:translateY(-2px)}
.pm.selected{border-color:var(--pink);background:var(--pink3);
  box-shadow:0 0 0 3px var(--pink3)}
.pm .ic{font-size:24px;display:block;margin-bottom:6px}
.pm .nm{font-size:12px;font-weight:600}
.pm.selected::after{content:'✓';position:absolute;top:6px;right:8px;color:var(--pink2);font-size:13px}

/* Method detail panel */
.detail{background:var(--dark3);border:1px solid var(--border);border-radius:16px;
  padding:18px;margin-top:18px;display:none}
.detail.show{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.detail .instr{font-size:14px;color:rgba(255,255,255,.85);margin-bottom:10px}
.detail .num{font-family:'Space Mono';font-size:18px;color:var(--yellow2);
  background:var(--glass);padding:12px;border-radius:10px;text-align:center;
  letter-spacing:1px;border:1px dashed var(--border2)}
.copy-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:6px}

.field{margin-top:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.field input{width:100%;padding:13px;background:var(--glass);border:1px solid var(--border2);
  border-radius:10px;color:#fff;font-size:15px;font-family:'Space Mono'}
.field input:focus{outline:none;border-color:var(--pink)}

.confirm-btn{width:100%;padding:16px;border:none;border-radius:14px;cursor:pointer;
  background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;
  font-family:'Hind Siliguri';font-size:16px;font-weight:700;margin-top:18px;
  box-shadow:0 8px 24px rgba(233,30,140,.3);transition:.15s}
.confirm-btn:hover{transform:translateY(-2px)}
.confirm-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.status{margin-top:14px;padding:13px;border-radius:10px;font-size:14px;display:none;text-align:center}
.status.show{display:block}
.s-wait{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--yellow2)}
.s-ok{background:rgba(5,150,105,.12);border:1px solid rgba(52,211,153,.3);color:var(--green2)}
.s-err{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#F87171}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="title">পেমেন্ট পদ্ধতি বাছুন<small id="subTitle">SAR সাবস্ক্রিপশন</small></div>
    <button class="close-x" onclick="goBack()">✕</button>
  </div>

  <div class="amt-pill">পরিশোধযোগ্য: <b id="amtView">৳ 0</b></div>

  <!-- Mobile banking -->
  <div class="group-label">মোবাইল ব্যাংকিং</div>
  <div class="pm-grid">
    <div class="pm" onclick="selPM(this,'bkash')"><span class="ic">📱</span><span class="nm">bKash</span></div>
    <div class="pm" onclick="selPM(this,'nagad')"><span class="ic">📲</span><span class="nm">Nagad</span></div>
    <div class="pm" onclick="selPM(this,'rocket')"><span class="ic">🚀</span><span class="nm">Rocket</span></div>
    <div class="pm" onclick="selPM(this,'upay')"><span class="ic">💸</span><span class="nm">Upay</span></div>
  </div>

  <!-- Cards / Gateway -->
  <div class="group-label">কার্ড ও গেটওয়ে</div>
  <div class="pm-grid">
    <div class="pm" onclick="selPM(this,'sslcommerz')"><span class="ic">💳</span><span class="nm">SSLCommerz</span></div>
    <div class="pm" onclick="selPM(this,'visa')"><span class="ic">💳</span><span class="nm">Visa</span></div>
    <div class="pm" onclick="selPM(this,'mastercard')"><span class="ic">💳</span><span class="nm">Mastercard</span></div>
  </div>

  <!-- International -->
  <div class="group-label">আন্তর্জাতিক</div>
  <div class="pm-grid">
    <div class="pm" onclick="selPM(this,'paypal')"><span class="ic">🅿️</span><span class="nm">PayPal</span></div>
    <div class="pm" onclick="selPM(this,'stripe')"><span class="ic">🌐</span><span class="nm">Stripe</span></div>
    <div class="pm" onclick="selPM(this,'wise')"><span class="ic">🏦</span><span class="nm">Wise</span></div>
    <div class="pm" onclick="selPM(this,'western')"><span class="ic">📮</span><span class="nm">Western Union</span></div>
    <div class="pm" onclick="selPM(this,'cash')"><span class="ic">💵</span><span class="nm">নগদ টাকা</span></div>
  </div>

  <!-- Detail panel -->
  <div class="detail" id="detail">
    <div class="instr" id="instr"></div>
    <div class="num" id="num"></div>
    <div class="copy-hint" id="copyHint"></div>

    <div class="field" id="trxField" style="display:none">
      <label>ট্রানজেকশন আইডি (TrxID)</label>
      <input type="text" id="trxInput" placeholder="যেমন: 9AB2CD3EFG" autocomplete="off">
    </div>

    <button class="confirm-btn" id="confirmBtn" onclick="confirmPayment()">পেমেন্ট নিশ্চিত করুন</button>

    <div class="status" id="status"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — সব কল payment.js দিয়ে; কোনো key ব্রাউজারে নেই
// ═══════════════════════════════════════════════════
const FN = '/.netlify/functions/payment';
const ADMIN_NUM = '01346098892';

const params = new URLSearchParams(location.search);
const INVOICE_ID = params.get('id');
const INVOICE_NO = params.get('inv');

const _sc = JSON.parse(localStorage.getItem('sar_customer') || '{}');
const CID = _sc.id || localStorage.getItem('sar_customer_id');

let _invoice = null;
let selMethod = null;

const METHOD_INFO = {
  bkash:      {name:'bKash',         num:ADMIN_NUM, instr:'bKash অ্যাপে Send Money করুন এই নম্বরে:', trx:true,  auto:false},
  nagad:      {name:'Nagad',         num:ADMIN_NUM, instr:'Nagad অ্যাপে Send Money করুন এই নম্বরে:', trx:true,  auto:false},
  rocket:     {name:'Rocket',        num:ADMIN_NUM+'-6', instr:'Rocket অ্যাপে Send Money করুন এই নম্বরে:', trx:true, auto:false},
  upay:       {name:'Upay',          num:ADMIN_NUM, instr:'Upay অ্যাপে Send Money করুন এই নম্বরে:', trx:true,  auto:false},
  sslcommerz: {name:'SSLCommerz',    num:'', instr:'"পেমেন্ট নিশ্চিত করুন" চাপলে নিরাপদ SSLCommerz গেটওয়েতে নিয়ে যাবে।', trx:false, auto:true, redirect:true},
  visa:       {name:'Visa Card',     num:'', instr:'"পেমেন্ট নিশ্চিত করুন" চাপলে কার্ড গেটওয়েতে নিয়ে যাবে।', trx:false, auto:true, redirect:true},
  mastercard: {name:'Mastercard',    num:'', instr:'"পেমেন্ট নিশ্চিত করুন" চাপলে কার্ড গেটওয়েতে নিয়ে যাবে।', trx:false, auto:true, redirect:true},
  paypal:     {name:'PayPal',        num:'payment@sheairestaurant.com', instr:'PayPal-এ পেমেন্ট পাঠান এই ঠিকানায়:', trx:true, auto:false},
  stripe:     {name:'Stripe',        num:'https://buy.stripe.com/sar', instr:'এই Stripe লিংকে পেমেন্ট করুন:', trx:true, auto:false},
  wise:       {name:'Wise',          num:'mindmaxltd@gmail.com', instr:'Wise-এ পাঠান এই ঠিকানায়:', trx:true, auto:false},
  western:    {name:'Western Union', num:'MindMax Private Limited, Dhaka', instr:'Western Union-এ পাঠান — Receiver:', trx:true, auto:false},
  cash:       {name:'নগদ টাকা',      num:'SAR কাউন্টারে পরিশোধ করুন', instr:'ডেলিভারি বা কাউন্টারে নগদ পরিশোধ করুন।', trx:false, auto:false},
};

const $ = id => document.getElementById(id);
const taka = n => '৳ ' + Number(n||0).toLocaleString('bn-BD');

async function api(body){
  const r = await fetch(FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}

// ── Load invoice ──
async function loadInvoice(){
  if(!INVOICE_ID && !INVOICE_NO){ alert('ইনভয়েস পাওয়া যায়নি।'); goBack(); return; }
  const res = await api({action:'getInvoice', ...(INVOICE_ID?{invoice_id:INVOICE_ID}:{invoice_number:INVOICE_NO})});
  if(!res.ok){ alert('ইনভয়েস লোড হয়নি।'); goBack(); return; }
  _invoice = res.invoice;
  $('amtView').textContent = taka(_invoice.total_amount);
  const typeMap = {REGISTRATION:'রেজিস্ট্রেশন ফি', SUBSCRIPTION:'মাসিক সাবস্ক্রিপশন', MEAL_ORDER:'খাবার অর্ডার'};
  $('subTitle').textContent = _invoice.package_name || typeMap[_invoice.type] || 'SAR পেমেন্ট';
}

// ── Select method ──
function selPM(el, method){
  document.querySelectorAll('.pm').forEach(p=>p.classList.remove('selected'));
  el.classList.add('selected');
  selMethod = method;
  const info = METHOD_INFO[method] || {};
  $('detail').classList.add('show');
  $('instr').textContent = info.instr || '';
  $('num').textContent = info.num || '';
  $('num').style.display = info.num ? 'block' : 'none';
  $('copyHint').textContent = info.num ? 'উপরের তথ্য কপি করে পেমেন্ট সম্পন্ন করুন' : '';
  $('trxField').style.display = info.trx ? 'block' : 'none';
  $('confirmBtn').textContent = info.redirect ? 'গেটওয়েতে যান ও পরিশোধ করুন' : 'পেমেন্ট নিশ্চিত করুন';
  setStatus('');
  $('detail').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function setStatus(msg, cls){
  const s = $('status');
  if(!msg){ s.classList.remove('show'); return; }
  s.className = 'status show ' + (cls||'');
  s.textContent = msg;
}

// ── Confirm payment → orchestrator flow ──
async function confirmPayment(){
  if(!selMethod){ alert('একটি পেমেন্ট পদ্ধতি বাছুন।'); return; }
  const info = METHOD_INFO[selMethod];
  const btn = $('confirmBtn');

  // mobile banking: TrxID লাগবে
  let trxId = null;
  if(info.trx){
    trxId = $('trxInput').value.trim();
    if(!trxId){ alert('ট্রানজেকশন আইডি (TrxID) দিন।'); $('trxInput').focus(); return; }
  }

  btn.disabled = true;
  setStatus('⏳ পেমেন্ট প্রক্রিয়া করা হচ্ছে...', 's-wait');

  try{
    // 1. payment record তৈরি (PROCESSING)
    const pr = await api({
      action:'createPayment',
      invoice_id: _invoice.id,
      customer_id: CID,
      gateway: selMethod,
      transaction_id: trxId,   // null হলে server তৈরি করবে
    });
    if(!pr.ok){ throw new Error('পেমেন্ট রেকর্ড তৈরি হয়নি।'); }
    const txn = pr.transaction_id;

    // 2. redirect gateway হলে এখানে আসল গেটওয়েতে পাঠানো হবে
    //    (এখন stub — পরে SSLCommerz/ShurjoPay URL বসবে)
    if(info.redirect){
      setStatus('🌐 গেটওয়েতে নিয়ে যাওয়া হচ্ছে...', 's-wait');
      // উদাহরণ: location.href = gatewayUrl;  (পরে যোগ হবে)
      // আপাতত auto-verify ধরে এগোচ্ছি
    }

    // 3. verify (auto=true হলে সাথে সাথে VERIFIED; নাহলে admin যাচাই)
    const vr = await api({
      action:'verifyPayment',
      invoice_id: _invoice.id,
      transaction_id: txn,
      customer_id: CID,
      paid_amount: _invoice.total_amount,
      auto: !!info.auto,
    });

    if(vr.verified){
      // 4. finalize → receipt + customer update
      await api({action:'finalize', invoice_id:_invoice.id});
      setStatus('✅ পেমেন্ট সফল! রিসিটে নিয়ে যাওয়া হচ্ছে...', 's-ok');
      setTimeout(()=> location.href = `receipt.html?txn=${txn}`, 1400);
    } else {
      // admin যাচাই করবেন
      setStatus('✅ তথ্য জমা হয়েছে! Admin যাচাই করার পর আপনি রিসিট পাবেন। (সাধারণত কয়েক মিনিট)', 's-ok');
      btn.textContent = 'জমা হয়েছে ✓';
    }
  }catch(e){
    setStatus('❌ ' + e.message, 's-err');
    btn.disabled = false;
  }
}

function goBack(){
  if(_invoice) location.href = `invoice.html?inv=${_invoice.invoice_number}`;
  else location.href = 'payment.html';
}

loadInvoice();
</script>
</body>
</html>
