<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SAR Receipt</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#f0f0f0;margin:0;font-family:Arial,sans-serif}
.sbar{background:#880E4F;padding:8px 14px;display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:5px;position:sticky;top:0;z-index:100}
.sbar-logo{color:#FFD1E8;font-weight:700;font-size:13px}
.sbar-tag{font-size:9px;color:#FFB3D1;letter-spacing:.06em}
.sbar-acts{display:flex;gap:5px;flex-wrap:wrap}
.sa{padding:5px 12px;border-radius:4px;font-size:11.5px;font-weight:700;cursor:pointer;
  border:none;font-family:Arial;transition:opacity .2s}
.sa:hover{opacity:.85}
.sa-wa{background:#25D366;color:#fff}
.sa-em{background:#9C27B0;color:#fff}
.sa-pr{background:#fff;color:#880E4F}
.sa-bk{background:rgba(255,255,255,.15);color:#FFD1E8;border:1px solid rgba(255,255,255,.3)}
.stbar{padding:5px 14px;font-size:11px;font-weight:600;display:none;align-items:center;gap:5px}
.stbar.ok{background:#E8F5E9;color:#2E7D32;display:flex}
.stbar.sending{background:#FFF8E1;color:#F57F17;display:flex}
.stbar.err{background:#FFEBEE;color:#C62828;display:flex}
.wrap{max-width:720px;margin:14px auto;padding:0 10px 40px}
/* Loading/Error */
.loading{min-height:65vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;background:#fff;border-radius:4px;padding:40px}
.spin{width:42px;height:42px;border-radius:50%;border:3px solid #FFB3CC;
  border-top-color:#C2185B;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.errbox{min-height:65vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;background:#fff;padding:40px;text-align:center}
/* ══════════════════════════════════════
   ECR PAPER — White, Pink/Green/Red text
   ══════════════════════════════════════ */
.ecr{background:#fff;font-family:Arial,'Hind Siliguri',sans-serif;font-size:10.5px;
  color:#111;line-height:1.35;padding:14px 18px;
  border:1px solid #ddd;border-top:4px solid #C2185B}
/* ECR header */
.ecr-hd{text-align:center;border-bottom:2px solid #C2185B;padding-bottom:8px;margin-bottom:8px}
.ecr-hd-t{font-size:15px;font-weight:700;color:#C2185B;letter-spacing:.04em}
.ecr-hd-s{font-size:8.5px;color:#AD1457;letter-spacing:.1em;margin:2px 0}
.ecr-hd-g{font-size:8px;color:#555}
.ecr-num{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;margin-top:4px}
/* Seps */
.sep2{border:none;border-top:2px double #C2185B;margin:6px 0}
.sep1{border:none;border-top:1px solid #ddd;margin:5px 0}
.sepd{border:none;border-top:1px dashed #ccc;margin:4px 0}
.sepst{text-align:center;color:#C2185B;font-size:10px;margin:4px 0;letter-spacing:4px}
/* Section head */
.sh{font-size:8.5px;font-weight:700;color:#C2185B;text-transform:uppercase;
  letter-spacing:.14em;margin:6px 0 3px;display:flex;align-items:center;gap:5px}
.sh::before,.sh::after{content:'';flex:1;height:1px;background:#C2185B;opacity:.3}
/* Info table */
.itbl{width:100%;border-collapse:collapse;margin-bottom:6px}
.itbl td{padding:1.5px 0;vertical-align:top}
.ik{color:#555;font-size:9.5px;width:33%;white-space:nowrap}
.iv{font-weight:600;font-size:10.5px}
/* Item block */
.iblk{border:1px solid #FFD0E8;border-radius:4px;margin-bottom:6px;overflow:hidden}
.iblk-hd{background:#FCE4EC;padding:4px 8px;display:flex;justify-content:space-between;align-items:baseline}
.iblk-name{font-size:11px;font-weight:700;color:#880E4F;flex:1}
.iblk-qty{color:#555;font-size:10px;margin:0 5px}
.iblk-price{color:#C2185B;font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.iblk-bd{padding:5px 8px}
.nutr{font-size:9.5px;border-left:2px solid #C2185B;padding:2px 5px;margin-bottom:3px;
  font-family:'Space Mono',monospace;color:#333}
.nutr-dv{color:#C2185B;font-size:8.5px}
.ben{font-size:9.5px;color:#1B5E20;padding:1px 0;font-weight:600}
.note{font-size:9px;color:#1565C0;font-style:italic;padding:1px 0}
.ingline{font-size:9px;color:#4A148C;padding:1px 0;line-height:1.5}
.bca{font-size:8.5px;color:#1565C0;background:#E3F2FD;padding:0 3px;
  border-radius:2px;border:1px solid #BBDEFB;text-decoration:none;margin-left:2px}
.herbline{font-size:9px;color:#2E7D32;padding:1px 0}
/* Total */
.ttbl{width:100%;border-collapse:collapse;margin:4px 0}
.ttbl td{padding:2px 0;font-size:10.5px}
.ttbl .tk{color:#555}.ttbl .tv{text-align:right;font-family:'Space Mono',monospace;font-weight:700}
.ttbl .tttl td{font-size:13px;font-weight:700;color:#C2185B;border-top:2px solid #C2185B;padding-top:4px}
/* AI + Messages */
.aib{border:1px solid #1B5E20;border-left:3px solid #1B5E20;padding:4px 8px;
  margin:5px 0;font-size:9.5px;color:#1B5E20;line-height:1.45}
.ait{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.psg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:4px 0}
.psb{border:1px solid;padding:3px 7px;border-radius:3px;font-size:9px}
.psr{border-color:#FFCDD2;background:#FFF5F5;color:#C62828}
.psg1{border-color:#C5E1A5;background:#F1F8E9;color:#2E7D32}
.pst{font-weight:700;margin-bottom:2px}
.msg{border-left:3px solid;padding:3px 8px;margin:3px 0;font-size:9.5px;line-height:1.4}
.msg-r{border-color:#C62828;background:#FFF5F5}.msg-r .mt{color:#C62828}
.msg-g{border-color:#388E3C;background:#F1F8E9}.msg-g .mt{color:#2E7D32}
.msg-p{border-color:#AD1457;background:#FCE4EC}.msg-p .mt{color:#AD1457}
.msg-v{border-color:#6A1B9A;background:#F3E5F5}.msg-v .mt{color:#6A1B9A}
.mt{font-weight:700;font-size:9px;margin-bottom:1px}
/* Package box (subscription) */
.pkgbox{border:1px solid #C2185B;border-left:4px solid #C2185B;
  padding:7px 11px;margin:8px 0;border-radius:0 5px 5px 0}
.pkgname{font-size:13px;font-weight:700;color:#C2185B;margin-bottom:3px}
.pkgrow{display:flex;justify-content:space-between;font-size:10px;color:#555;margin-bottom:2px}
.pkgtot{display:flex;justify-content:space-between;font-size:14px;font-weight:700;
  color:#C2185B;border-top:1px solid #C2185B;padding-top:5px;margin-top:5px;
  font-family:'Space Mono',monospace}
.benrow{font-size:9.5px;color:#1B5E20;padding:1px 0}
.nxtrow{font-size:9.5px;padding:2px 0;border-bottom:1px dotted #FFB3CC}
.nxtrow:last-child{border:none}
/* QR row */
.qrrow{display:flex;align-items:center;gap:10px;margin:6px 0}
.qrbox{width:54px;height:54px;border:2px solid #C2185B;border-radius:4px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:8px;color:#C2185B;text-align:center;font-weight:700;line-height:1.2}
/* Survey */
.survey{border:1px solid #F48FB1;padding:6px 10px;margin:6px 0}
.survey-q{font-size:10px;font-weight:700;color:#880E4F;margin-bottom:5px}
.sl{display:block;border:none;border-bottom:1px solid #FFB3CC;width:100%;margin-bottom:5px;height:12px;background:transparent}
/* BC notice */
.bcn{border:1px solid #1565C0;border-left:3px solid #1565C0;padding:4px 8px;margin:5px 0;font-size:9px;color:#1565C0}
/* Footer */
.ecr-ft{text-align:center;font-size:8.5px;color:#555;padding-top:6px;
  border-top:2px double #C2185B;line-height:1.6;margin-top:6px}
.ecr-ft b{color:#C2185B}
/* Print */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;margin:0}
  .sbar,.stbar,.wrap>*:not(.ecr){display:none!important}
  .wrap{padding:0;margin:0;max-width:100%}
  .ecr{border:none;padding:6px 10px}
  .pgbrk{page-break-before:always;margin-top:0}
  @page{size:A4;margin:6mm 8mm}
}

/* 3 courses in receipt items */
.crs{display:flex;gap:4px;font-size:9.5px;margin:2px 0;line-height:1.4}
.cn{color:#C2185B;font-weight:700;min-width:15px;font-family:'Space Mono',monospace;flex-shrink:0}
.pwr{font-size:9px;color:#E65100;padding:2px 6px;background:rgba(230,81,0,.07);border-left:2px solid #FF8F00;margin:3px 0;border-radius:0 3px 3px 0}

</style>
</head>

function getMD(n,id){
  if(!n&&!id)return null;
  // Try exact id match
  if(id&&MDATA[id])return MDATA[id];
  // Try exact name match
  if(n&&MDATA[n])return MDATA[n];
  if(!n)return null;
  const lc=n.toLowerCase();
  // Try partial name match
  for(const[k,v]of Object.entries(MDATA)){
    const kl=k.toLowerCase();
    if(kl.includes(lc.slice(0,4))||lc.includes(kl.slice(0,4)))return v;
  }
  return null;
}
function pct(v,r){return v&&r?Math.min(99,Math.round(v/r*100)):0;}
function fmt(v,d=0){return parseFloat(v||0).toFixed(d);}

window.addEventListener('DOMContentLoaded',async()=>{
  const P=new URLSearchParams(window.location.search);
  const txn=P.get('txn'),oid=P.get('oid'),rid=P.get('rid');
  setLoad('তথ্য লোড হচ্ছে...');
  try{
    if(txn){
      // PAYMENT RECEIPT
      document.getElementById('sbarLogo').textContent='💎 SAR — সদস্যতা রিসিট';
      document.getElementById('sbarTag').textContent='SUBSCRIPTION / REGISTRATION RECEIPT';
      let rcpRow=null;
      if(rid){const r=await fetch(`${SUPA}/rest/v1/payment_receipts?id=eq.${rid}&select=*`,{headers:H});const d=await r.json();rcpRow=d?.[0];}
      else{const r=await fetch(`${SUPA}/rest/v1/payment_receipts?transaction_id=eq.${txn}&select=*`,{headers:H});const d=await r.json();rcpRow=d?.[0];}
      if(rcpRow?.receipt_html){
        // Show stored HTML
        document.getElementById('rcpTypeBadge').textContent='💎 SUBSCRIPTION / REGISTRATION RECEIPT';
        document.getElementById('rcpTypeBadge').style.color='#7B1FA2';
        document.getElementById('rcpNumEl').textContent='Receipt #'+(rcpRow.receipt_number||txn);
        document.getElementById('rcpBody').innerHTML=rcpRow.receipt_html;
        show();G={type:'payment',rcpRow};
        setTimeout(()=>autoSend(rcpRow),1800);
      } else {
        // Fallback: build from customer data
        const [cArr,aiArr]=await Promise.all([
          CID?fetch(`${SUPA}/rest/v1/customers?id=eq.${CID}&select=*`,{headers:H}).then(r=>r.json()):[_sc],
          CID?fetch(`${SUPA}/rest/v1/ai_analysis?customer_id=eq.${CID}&order=created_at.desc&limit=1`,{headers:H}).then(r=>r.json()):[{}],
        ]);
        buildPaymentReceiptFallback(txn,cArr?.[0]||_sc,aiArr?.[0]||{});
      }
    } else if(oid){
      // ORDER RECEIPT
      document.getElementById('sbarLogo').textContent='🛒 SAR — অর্ডার রিসিট';
      document.getElementById('sbarTag').textContent='FOOD ORDER RECEIPT';
      let orArr=null;
      // Try order_receipts first
      const orR=await fetch(`${SUPA}/rest/v1/order_receipts?order_id=eq.${oid}&select=*`,{headers:H});
      const orD=await orR.json();
      const orRow=orD?.[0];
      if(orRow?.receipt_html){
        document.getElementById('rcpTypeBadge').textContent='🛒 FOOD ORDER RECEIPT';
        document.getElementById('rcpTypeBadge').style.color='#1B5E20';
        document.getElementById('rcpNumEl').textContent='Receipt #'+(orRow.receipt_number||oid);
        document.getElementById('rcpBody').innerHTML=orRow.receipt_html;
        show();G={type:'order',orRow};
        setTimeout(()=>autoSend(orRow),1800);
      } else {
        // Build from orders table
        const [oArr,cArr,aiArr,logArr,prevArr]=await Promise.all([
          fetch(`${SUPA}/rest/v1/orders?id=eq.${oid}&select=*`,{headers:H}).then(r=>r.json()),
          CID?fetch(`${SUPA}/rest/v1/customers?id=eq.${CID}&select=*`,{headers:H}).then(r=>r.json()):[_sc],
          CID?fetch(`${SUPA}/rest/v1/ai_analysis?customer_id=eq.${CID}&order=created_at.desc&limit=1`,{headers:H}).then(r=>r.json()):[{}],
          CID?fetch(`${SUPA}/rest/v1/daily_health_log?customer_id=eq.${CID}&order=log_date.desc&limit=1`,{headers:H}).then(r=>r.json()):[{}],
          CID?fetch(`${SUPA}/rest/v1/orders?customer_id=eq.${CID}&order=created_at.desc&limit=4&select=order_number,items_json,total_amount,status,created_at`,{headers:H}).then(r=>r.json()):[],
        ]);
        const ord=oArr?.[0];
        if(!ord){const saved=JSON.parse(localStorage.getItem('sar_last_order_items')||'[]');if(!saved.length){showErr('অর্ডার পাওয়া যায়নি।');return;}
          buildOrderReceipt({order_number:localStorage.getItem('sar_last_order_num')||'—',items_json:saved,created_at:new Date().toISOString()},cArr?.[0]||_sc,aiArr?.[0]||{},logArr?.[0]||{},(prevArr||[]).slice(1,4));
        } else {
          ord.items_json=ord.items_json||JSON.parse(localStorage.getItem('sar_last_order_items')||'[]');
          buildOrderReceipt(ord,cArr?.[0]||_sc,aiArr?.[0]||{},logArr?.[0]||{},(prevArr||[]).filter(o=>o.id!==oid).slice(0,3));
        }
      }
    } else showErr('URL-এ কোনো receipt ID নেই।');
  }catch(e){showErr('লোড ব্যর্থ: '+e.message);}
});

function buildOrderReceipt(ord,cust,ai,log,prev){

  const del=ord.delivery_fee||0,vat=ord.tax||Math.round(sub*.05),grand=ord.total_amount||(sub+del+vat);
  const otype={delivery:'ডেলিভারি',dine_in:'ডাইন-ইন',takeaway:'টেকঅ্যাওয়ে'}[ord.order_type]||'—';
  const eta={delivery:'৪৫ মিনিট',dine_in:'২৫ মিনিট',takeaway:'২০ মিনিট'}[ord.order_type]||'—';
  const ds=cust.created_at?Math.floor((Date.now()-new Date(cust.created_at))/86400000):0;
  document.getElementById('rcpTypeBadge').textContent='🛒 FOOD ORDER RECEIPT';
  document.getElementById('rcpTypeBadge').style.color='#1B5E20';

// ══ PERSONALIZED MESSAGES ══
function buildMsgs(cust,ai,log,prev,ds){
  const msgs=[],cat=cust.sar_category||'DM',catL=CAT[cat]||cat;
  const hba1c=parseFloat(ai.hba1c||cust.hba1c||0);
  const aiSc=parseInt(ai.health_score||cust.health_score||0);
  const pcos=(ai.pcos_status||cust.pcos_status||'');
  const wt=parseFloat(cust.weight||0),ht=parseFloat(cust.height||0);
  const bmi=ht>0?+(wt/(ht/100)**2).toFixed(1):0;
  const h=new Date().getHours();
  const nm=cust.full_name?.split(' ')[0]||'আপা';

  // 1. Time-based greeting
  const greet=h<12?'সুপ্রভাত':h<17?'শুভ অপরাহ্ন':'শুভ সন্ধ্যা';
  msgs.push({t:'p',pr:10,title:`🌸 ${greet}, ${nm}!`,
    body:`SAR-এর থেরাপিউটিক খাবার আপনার শরীরে পৌঁছে দেওয়া হচ্ছে। আল্লাহর রহমতে সুস্থ থাকুন।`});

  // 2. First/returning visit
  if(ds<1)msgs.push({t:'g',pr:9,title:'💫 প্রথম অর্ডার — ধন্যবাদ!',
    body:`SAR-এ স্বাগতম! আপনার ${catL} থেরাপিউটিক যাত্রা শুরু হলো। ৩০ দিন নিয়মিত খেলে পার্থক্য বুঝবেন।`});
  else if(ds<30)msgs.push({t:'g',pr:6,title:`🌱 ${ds} দিনের যাত্রা`,
    body:`চমৎকার! প্রথম মাস সবচেয়ে গুরুত্বপূর্ণ। ${catL} রুটিন চালিয়ে যান।`});
  else if(ds>=90)msgs.push({t:'g',pr:7,title:`⭐ ${ds} দিনের নিষ্ঠা`,
    body:`আপনি SAR-এর অনুগত সদস্য। আপনার স্বাস্থ্যের উন্নতি হচ্ছে। ধন্যবাদ।`});
  else msgs.push({t:'g',pr:4,title:'😊 নিয়মিত সদস্য',
    body:`SAR পরিবারের সাথে থাকার জন্য ধন্যবাদ। আজকের থেরাপিউটিক মেনু উপভোগ করুন।`});

  // 3. Disease-specific magic
  if(cat==='DM'){
    if(hba1c>7.5)msgs.push({t:'r',pr:9,title:`🩸 HbA1c ${hba1c}% — সতর্কতা!`,
      body:`আপনার HbA1c বেশি। করলা গুঁড়া + মেথি রুটিন মিস করবেন না। ডাক্তারের সাথে দেখা করুন।`});
    else if(hba1c>0)msgs.push({t:'g',pr:7,title:`💚 HbA1c ${hba1c}% — ভালো!`,
      body:`আপনার রক্তে শর্করা নিয়ন্ত্রণে আছে। SAR মেনু + করলা রুটিন চালিয়ে যান।`});
    else msgs.push({t:'g',pr:5,title:'💚 ডায়াবেটিস থেরাপিউটিক',
      body:`আজকের Low-GI মেনু রক্তে শর্করা স্থিতিশীল রাখবে। মেথি গুঁড়া খেতে ভুলবেন না।`});
  } else if(cat==='OB'){
    if(bmi>25)msgs.push({t:'r',pr:8,title:`⚖️ BMI ${bmi} — ওজন নিয়ন্ত্রণ`,
      body:`আজকের Low-calorie মেনু আপনার জন্য। ত্রিফলা ও সবুজ চা রুটিন মেনে চলুন।`});
    else msgs.push({t:'g',pr:5,title:'✨ ওজন নিয়ন্ত্রণ থেরাপি',
      body:`SAR Low-calorie থেরাপিউটিক মেনু আপনার মেটাবলিজম সক্রিয় রাখে।`});
  } else if(cat==='FL'){
    msgs.push({t:'v',pr:7,title:'🫀 লিভার ডিটক্স সেশন',
      body:`আজকের হেপাটোপ্রোটেক্টিভ মেনু আপনার লিভার পরিষ্কার করছে। ভৃঙ্গরাজ রুটিন চালিয়ে যান।`});
  } else if(cat==='IB'){
    msgs.push({t:'g',pr:7,title:'🌿 গাট হিলিং সেশন',
      body:`আজকের Low-FODMAP মেনু আপনার অন্ত্র প্রশমিত করবে। স্লিপারি এলম + পুদিনা রুটিন মেনে চলুন।`});
  } else if(cat==='PR'){
    msgs.push({t:'p',pr:9,title:'🤱 মা ও শিশুর পুষ্টি',
      body:`আজকের মেনুতে প্রচুর ফোলেট, আয়রন, ক্যালসিয়াম। আপনার শিশু সুস্থভাবে বেড়ে উঠছে।`});
  }

  // 4. Special status
  if(pcos&&pcos!=='না')msgs.push({t:'r',pr:8,title:'⚠️ PCOS সচেতনতা',
    body:`PCOS নিয়ন্ত্রণে ইনসুলিন ব্যবস্থাপনা জরুরি। SAR Low-GI + হরমোন ব্যালেন্সিং মেনু সাহায্য করবে।`});
  if(log&&log.period_today)msgs.push({t:'p',pr:9,title:'🌸 আজ মাসিক — আয়রন দরকার',
    body:`পালং-ডাল বাটি বা PR আয়রন বাউল অর্ডার করুন। আদা-হলুদ চা ব্যথা কমাবে।`});
  if(log&&log.fever)msgs.push({t:'r',pr:9,title:'🌡️ জ্বরে হালকা খাবার',
    body:`আজ Healing Broth বা Gut Healing Kichuri অর্ডার করুন। প্রচুর পানি পান করুন।`});

  // 5. Health score magic
  if(aiSc>=80)msgs.push({t:'g',pr:6,title:`🏆 স্বাস্থ্য স্কোর ${aiSc}/100!`,
    body:`চমৎকার! আপনার স্বাস্থ্য স্কোর অনেক ভালো। SAR থেরাপিউটিক রুটিন সফল হচ্ছে।`});
  else if(aiSc>0)msgs.push({t:'g',pr:3,title:`📊 স্বাস্থ্য স্কোর ${aiSc}/100`,
    body:`নিয়মিত থেরাপিউটিক মেনু ও AI বিশ্লেষণ চালিয়ে যান। ৯০ দিনে ৮০+ হবে।`});

  // 6. Always: SAR credibility
  msgs.push({t:'g',pr:2,title:'⭐ SAR Blockchain Verified',
    body:`আপনার প্রতিটি উপাদান Blockchain-এ রেকর্ড। ১,০০০+ নারী SAR বেছে নিয়েছেন।`});

  return msgs.sort((a,b)=>b.pr-a.pr).slice(0,5);
}

  const typeL=G.type==='order'?'অর্ডার':'সদস্যতা';
  const msg=`🌸 SAR-SHE AI RESTAURANT\n\n${typeL} রিসিট\nনাম: ${cust.full_name||CNAME}\nরিসিট: ${row.receipt_number||'—'}\nমোট: ৳${row.amount||row.total_amount||G.grand||0}\n\n✅ রিসিট দেখুন:\n${url}\n\nSAR · 01346098892`;
  let done=[];
  if(phone){const cl=phone.replace(/\D/g,''),il=cl.startsWith('0')?'88'+cl:cl;window._waUrl=`https://wa.me/${il}?text=${encodeURIComponent(msg)}`;try{window.open(window._waUrl,'_blank');done.push('WhatsApp');}catch(e){}}
  if(email){try{await fetch('/.netlify/functions/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:`SAR receipt for ${email}: ${row.receipt_number||'—'}`})});done.push('Email');}catch(e){}}
  showSt(done.length?`✅ পাঠানো: ${done.join(' + ')}`:'ℹ️ ফোন/ইমেইল নেই।','ok');
}
function doWA(){if(window._waUrl)window.open(window._waUrl,'_blank');}
async function doEmail(){const c=G.cust||JSON.parse(localStorage.getItem('sar_customer')||'{}');if(!c.email){alert('ইমেইল নেই।');return;}showSt('📧 পাঠানো হচ্ছে...','sending');try{await fetch('/.netlify/functions/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:`Receipt ${G.rcpN||'—'} for ${c.email}`})});showSt(`✅ ${c.email}`,'ok');}catch(e){showSt('❌ ব্যর্থ','err');}}
function setLoad(t){document.getElementById('loadTxt').textContent=t;}
function show(){document.getElementById('loadBox').style.display='none';document.getElementById('ecr').style.display='block';}
function showErr(m){document.getElementById('loadBox').style.display='none';document.getElementById('errBox').style.display='flex';document.getElementById('errMsg').textContent=m;}
function showSt(m,t='ok'){const b=document.getElementById('stbar');b.querySelector('#stmsg').textContent=m;b.className='stbar '+t;if(t==='ok')setTimeout(()=>b.className='stbar',4000);}
</script>
