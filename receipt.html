<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>রিসিট — SAR She AI Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#E91E8C;--rose2:#FF6BB5;--plum:#880E4F;--plum2:#C2185B;
  --purple:#6B21A8;--purple2:#A855F7;--green:#006A4E;--green2:#00A878;
  --gold:#F5C842;--blue:#005BAA;--blue-bg:#E3F2FD;
  --ink:#241018;--ink2:#7A6068;--paper:#FFF4FA;--paper2:#FFEAF4;
  --line:#F6C9DF;--line2:#EBA9C6;--rule:#E7B7CF;
  --red:#C30B2E;--red2:#E11D48;--inkgreen:#147A3A;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hind Siliguri',sans-serif;background:#15101A;color:#fff;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:1.1rem .8rem 3rem;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(600px 400px at 12% -5%,rgba(233,30,140,.10),transparent 60%),
             radial-gradient(500px 380px at 92% 8%,rgba(107,33,168,.10),transparent 55%)}

/* top toolbar (screen only) */
.bar{position:relative;z-index:5;width:100%;max-width:200mm;display:flex;justify-content:space-between;
  align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.brand{display:flex;align-items:center;gap:.55rem;text-decoration:none}
.brand-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--rose),var(--purple));
  display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:.85rem}
.brand-txt{font-family:'Playfair Display',serif;font-size:1rem;
  background:linear-gradient(90deg,var(--rose2),var(--purple2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-txt small{display:block;font-family:'Hind Siliguri';font-size:.56rem;letter-spacing:.14em;
  color:rgba(255,255,255,.4);text-transform:uppercase}
.actions{display:flex;gap:.45rem;flex-wrap:wrap}
.act{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;
  font-family:inherit;font-size:.78rem;font-weight:600;padding:.45rem .9rem;border-radius:30px;cursor:pointer;
  text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;transition:all .2s}
.act:hover{background:rgba(255,255,255,.12)}
.act-print{background:linear-gradient(135deg,var(--rose),var(--purple));border:none}
.act-wa{background:#25D366;border:none;color:#063}
.act-mail{background:#5B6CFF;border:none}

/* ───────── A4 ECR RECEIPT PAPER ───────── */
.sheet{position:relative;z-index:5;width:200mm;max-width:100%;min-height:auto;
  background:var(--paper);color:var(--ink);border-radius:10px;overflow:hidden;
  box-shadow:0 24px 70px rgba(0,0,0,.5);font-size:11px;line-height:1.45}
.pad{padding:9mm 11mm 8mm}

/* receipt header — centered ECR style */
.rhead{text-align:center;border-bottom:2px dashed var(--rule);padding-bottom:6px;margin-bottom:7px}
.rhead .logo{font-family:'Playfair Display',serif;font-weight:900;font-size:22px;letter-spacing:.04em;color:var(--plum)}
.rhead .sub{font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--plum2);margin-top:1px}
.rhead .addr{font-size:9.5px;color:var(--ink2);margin-top:3px;line-height:1.5}
.rhead .tags{margin-top:4px;font-size:8.5px;color:var(--inkgreen);font-weight:700;letter-spacing:.02em}

/* dotted divider with optional centered label */
.dline{border:0;border-top:1.5px dashed var(--rule);margin:6px 0}
.dlabel{text-align:center;font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:var(--plum);margin:7px 0 4px;position:relative}
.dlabel::before,.dlabel::after{content:'';position:absolute;top:50%;width:24%;height:0;border-top:1.5px dashed var(--rule)}
.dlabel::before{left:0}.dlabel::after{right:0}

/* meta two-col compact */
.meta2{display:grid;grid-template-columns:1fr 1fr;gap:1px 14px;font-size:10px}
.mrow{display:flex;justify-content:space-between;gap:6px;padding:1.5px 0}
.mrow .k{color:var(--ink2)}
.mrow .v{font-weight:700;text-align:right}
.mono{font-family:'Space Mono',monospace}

/* item lines — ECR ticket style */
.lines{margin:2px 0}
.li{padding:4px 0;border-bottom:1px dotted var(--rule)}
.li:last-child{border-bottom:0}
.li-h{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.li-n{font-weight:700;font-size:11.5px;color:var(--ink);flex:1}
.li-n .meal{font-weight:400;font-size:9px;color:var(--green)}
.li-amt{font-family:'Space Mono',monospace;font-weight:700;font-size:11px;color:var(--plum);white-space:nowrap}
.li-sub{font-size:9.5px;color:#6b5560;margin:1px 0 0}
.li-sub .qx{color:var(--ink2)}
.crs{font-size:9.5px;color:#5a4750;margin-top:2px;line-height:1.5}
.crs b{color:var(--plum)}
.crs .ig{color:#897680}
.chips{margin-top:2px;line-height:1.7}
.chip{display:inline-block;font-size:8px;color:var(--blue);background:var(--blue-bg);border:.5px solid #BBDEFB;
  border-radius:3px;padding:0 4px;margin:0 2px 1px 0;text-decoration:none}
.nut{font-size:9px;color:var(--ink2);margin-top:2px}
.nut b{color:var(--plum);font-family:'Space Mono',monospace}
.med2{font-size:9px;color:var(--purple);margin-top:1px}
.ben{font-size:9px;color:var(--inkgreen);margin-top:1px}
.bc1{font-size:8.5px;color:var(--blue);text-decoration:none}

/* totals — right aligned ECR */
.tot{margin-top:4px}
.trow{display:flex;justify-content:space-between;font-size:10.5px;padding:1.5px 0}
.trow .num{font-family:'Space Mono',monospace}
.trow.grand{font-size:14px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--plum),var(--purple));
  border-radius:6px;padding:5px 9px;margin-top:4px}
.trow.nutri{color:var(--inkgreen);font-size:9.5px;margin-top:3px;border-top:1px dotted var(--rule);padding-top:3px}

/* ✦ MAGICAL MESSAGE — the emotional AI marketing centerpiece */
.magic{background:linear-gradient(135deg,#FFFFFF,#FFF0F7);border:1px solid var(--line2);
  border-radius:8px;padding:9px 11px;margin:6px 0;position:relative;overflow:hidden}
.magic::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--red),var(--rose),var(--inkgreen))}
.magic .mh{font-size:10px;font-weight:800;color:var(--plum);margin-bottom:3px;letter-spacing:.02em;
  display:flex;align-items:center;gap:4px}
.magic .mb{font-size:11px;color:#3a2630;line-height:1.7;font-style:italic}
.magic .mb .hi{font-style:normal;font-weight:800;color:var(--red)}
.magic .mb .go{font-style:normal;font-weight:800;color:var(--inkgreen)}
.magic .by{font-size:8px;color:var(--ink2);margin-top:4px;text-align:right;letter-spacing:.04em}

.advice2{background:#F2F9EC;border:1px solid #C9E2AE;border-left:3px solid #3E8E2E;border-radius:6px;
  padding:7px 10px;margin:5px 0;font-size:10px;color:#33402c;line-height:1.6}
.advice2 b{color:#2E7D32}

/* persuasive engagement — red + green ink, tight */
.persuade{border:1px dashed var(--line2);border-radius:8px;padding:8px 10px;margin:5px 0;background:var(--paper2)}
.persuade .ph{font-size:9.5px;font-weight:800;color:var(--red);margin-bottom:3px;letter-spacing:.02em}
.pmsg{font-size:10px;line-height:1.6;margin:3px 0}
.pmsg.red{color:var(--red)}.pmsg.green{color:var(--inkgreen)}
.pmsg b{font-weight:800}.pmsg .em{font-style:italic}
.recap{font-size:9.5px;color:#5a4750;line-height:1.55;margin:3px 0;padding:4px 7px;background:#fff;border:.5px dotted var(--line2);border-radius:5px}
.recap .rh{font-weight:800;color:var(--plum);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase}
.ask{font-size:10px;color:#3a2630;margin:4px 0;line-height:1.55}
.ask b{font-weight:800}
.fbrow{display:flex;gap:6px;margin:4px 0}
.fb{flex:1;text-align:center;border:1px solid var(--line2);border-radius:5px;padding:3px;font-size:9px;background:#fff}
.fb.happy{border-color:var(--inkgreen);color:var(--inkgreen)}
.fb.advice{border-color:var(--red);color:var(--red)}
.sign{border-bottom:1px dotted var(--rule);height:14px;margin:3px 0}

/* instructions — compact */
.instr{font-size:9.5px;color:#4a3a44;margin:5px 0;line-height:1.55}
.instr .ih{font-size:9.5px;font-weight:800;color:var(--plum);margin-bottom:2px}
.instr ul{list-style:none}
.instr li{padding-left:11px;position:relative}
.instr li::before{content:'•';position:absolute;left:2px;color:var(--rose)}

/* QR row — two small codes + audit */
.qrrow{display:flex;gap:12px;justify-content:center;align-items:flex-start;margin:5px 0}
.qrb{text-align:center}
.qrb > div:first-child{display:inline-block}
.qrb canvas,.qrb img{width:84px!important;height:84px!important}
.qrb .qt{font-size:8.5px;font-weight:800;color:var(--plum);margin-top:2px}
.qrb .qs{font-size:7.5px;color:var(--ink2)}
.audit{font-size:8.5px;color:var(--ink2);text-align:center;margin-top:4px;line-height:1.5}
.audit .badge{display:inline-block;background:#E8F5E9;color:var(--inkgreen);border:.5px solid #A5D6A7;
  border-radius:20px;padding:0 6px;font-weight:700}

/* footer */
.rfoot{text-align:center;font-size:8.5px;color:var(--plum);line-height:1.7;margin-top:6px;
  border-top:2px dashed var(--rule);padding-top:6px}
.rfoot .b{font-weight:800}
.rfoot .thanks{font-family:'Playfair Display',serif;font-size:13px;color:var(--plum2);margin-bottom:2px}

/* ── staff scanner (screen only) ── */
.scanner{position:relative;z-index:5;width:200mm;max-width:100%;margin-top:1rem;
  background:rgba(20,16,26,.92);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:1rem 1.2rem}
.scanner h3{font-size:.92rem;color:#fff;margin-bottom:.25rem;display:flex;align-items:center;gap:.4rem}
.scanner .ssub{font-size:.74rem;color:rgba(255,255,255,.45);margin-bottom:.7rem}
.scan-input-row{display:flex;gap:.45rem;flex-wrap:wrap}
.scan-input{flex:1;min-width:200px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  border-radius:9px;padding:.6rem .85rem;color:#fff;font-family:'Space Mono',monospace;font-size:.88rem;outline:none}
.scan-input:focus{border-color:var(--rose)}
.scan-btn{background:linear-gradient(135deg,var(--rose),var(--purple));border:none;color:#fff;
  font-family:inherit;font-weight:700;font-size:.82rem;padding:.6rem 1.1rem;border-radius:9px;cursor:pointer}
.scan-cam-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;
  font-family:inherit;font-size:.82rem;padding:.6rem .95rem;border-radius:9px;cursor:pointer}
#scanVideo{width:100%;max-width:320px;border-radius:10px;margin-top:.6rem;display:none;background:#000}
.scan-result{margin-top:.6rem;font-size:.8rem;color:rgba(255,255,255,.8);min-height:1.1rem}
.scan-result.ok{color:#34D399}.scan-result.err{color:#F87171}
.scan-match{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:9px;
  padding:.6rem .85rem;margin-top:.5rem;display:none}
.scan-match .mn{font-weight:700;color:#fff;font-size:.88rem}
.scan-match .mm{font-size:.74rem;color:rgba(255,255,255,.5);margin:.18rem 0 .45rem}
.scan-place{background:#25D366;border:none;color:#063;font-family:inherit;font-weight:700;
  padding:.45rem 1rem;border-radius:7px;cursor:pointer;font-size:.8rem}

.loading{position:fixed;inset:0;z-index:50;background:#15101A;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;text-align:center}
.loading.hide{display:none}
.spin{width:42px;height:42px;border:3px solid rgba(233,30,140,.2);border-top-color:var(--rose);
  border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading p{color:rgba(255,255,255,.6);font-size:.9rem}

/* ───────── PRINT / PDF : exact A4, no page breaks inside ───────── */
@page{size:A4 portrait;margin:0}
@media print{
  html,body{background:#fff!important;padding:0!important;margin:0!important}
  .bar,.loading,.scanner{display:none!important}
  body::before{display:none}
  .sheet{width:210mm!important;max-width:210mm!important;box-shadow:none!important;border-radius:0!important;
    margin:0 auto!important}
  .pad{padding:8mm 12mm!important}
  /* never split these blocks across pages */
  .magic,.persuade,.advice2,.instr,.qrrow,.rhead,.rfoot,.li,.tot,.meta2{break-inside:avoid;page-break-inside:avoid}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
@media(max-width:560px){
  .sheet{width:100%;font-size:11px}.pad{padding:5mm 5mm}
  .meta2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spin"></div>
  <p id="loadTxt">রিসিট তৈরি হচ্ছে…</p>
</div>

<div class="bar">
  <a class="brand" href="dashboard.html">
    <span class="brand-mark">SAR</span>
    <span class="brand-txt">She AI Restaurant<small>Women-Led · For Women</small></span>
  </a>
  <div class="actions">
    <button class="act act-print" onclick="window.print()">🖨️ প্রিন্ট / PDF</button>
    <button class="act act-wa" onclick="sendWA()">💬 WhatsApp</button>
    <button class="act act-mail" onclick="sendEmail()">✉️ ইমেইল</button>
    <a class="act" href="order.html">← নতুন অর্ডার</a>
  </div>
</div>

<div class="sheet" id="sheet"><!-- filled by JS --></div>

<!-- ═══ STAFF: scan food QR / barcode to place an order for this customer ═══ -->
<div class="scanner" id="scanner">
  <h3>🔎 স্টাফ স্ক্যানার — খাবারের QR/বারকোড স্ক্যান করে অর্ডার</h3>
  <div class="sub">USB বারকোড স্ক্যানার দিয়ে স্ক্যান করুন (কোড টাইপ হয়ে Enter চাপবে), অথবা ক্যামেরা চালু করুন। মিল পেলে Enter/OK চেপে অর্ডার বসান।</div>
  <div class="scan-input-row">
    <input class="scan-input" id="scanInput" placeholder="QR / বারকোড এখানে স্ক্যান বা টাইপ করুন…" autocomplete="off">
    <button class="scan-btn" onclick="resolveScan(document.getElementById('scanInput').value)">খুঁজুন / OK</button>
    <button class="scan-cam-btn" id="camBtn" onclick="toggleCamera()">📷 ক্যামেরা</button>
  </div>
  <video id="scanVideo" playsinline></video>
  <div class="scan-result" id="scanResult"></div>
  <div class="scan-match" id="scanMatch">
    <div class="mn" id="matchName"></div>
    <div class="mm" id="matchMeta"></div>
    <button class="scan-place" id="placeBtn">✓ অর্ডার বসান (Enter)</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// SAR RECEIPT  —  reads order by ?oid= (Supabase) or
// falls back to the locally-saved last order. Renders the
// FULL structured menu detail handed over by meal-score →
// cart → order: every course, ingredient (blockchain-linked),
// nutrition + %DV, daily-requirement coverage, benefits,
// general instructions, and the AI "magical message" produced
// by the 6:00 AM daily analysis (ai_analysis table).
// ════════════════════════════════════════════════════
const SUPA = 'https://xlkrggspepnysbouatec.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsa3JnZ3NwZXBueXNib3VhdGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTU0OTEsImV4cCI6MjA5NTA5MTQ5MX0.dCAkAXL1EDNsxTBn8mcHcUHlXJ1xDBirwBdTgIq927U';
const H = {apikey:KEY, Authorization:'Bearer '+KEY};

const DAILY = {kcal:2000, protein:50, carb:260, fat:65, fiber:25, iron:18};
const MEAL_BN = {breakfast:'সকাল', lunch:'দুপুর', dinner:'রাত'};
const CAT_BN  = {DM:'ডায়াবেটিস', OB:'স্থূলতা', FL:'ফ্যাটি লিভার', IB:'IBS/গ্যাস্ট্রিক', PR:'গর্ভাবস্থা'};
const CAT_EMO = {DM:'🩸', OB:'⚖️', FL:'🫀', IB:'🌿', PR:'🤱'};

// rotating magical-message pool (used when AI has no message yet for today)
const MAGIC_FALLBACK = [
  'আপনি যা খান, তা-ই আপনি হয়ে ওঠেন — আজকের প্রতিটি কোর্স আপনার ভেতরের আরোগ্যকে জাগিয়ে তুলছে। 🌸',
  'নিজের যত্ন নেওয়া স্বার্থপরতা নয়, এটি শক্তি। আজ এক প্লেট ভালোবাসা নিজেকে উপহার দিলেন। ✨',
  'প্রতিটি বীজ, প্রতিটি পাতা — প্রকৃতির হাতে গড়া আপনার সুস্থতার গল্প। আজ সেই গল্পের একটি অধ্যায় লিখলেন। 🌿',
  'আজকের খাবার শুধু শরীর নয়, মনকেও পুষ্টি দিচ্ছে। ধীরে খান, কৃতজ্ঞ থাকুন, ভালো থাকুন। 💗',
  'ছোট ছোট সুস্থ পছন্দই একদিন বড় পরিবর্তন আনে। আজকের প্লেট সেই যাত্রার আরেকটি সাহসী পদক্ষেপ। 🌼'
];
function pickMagic(){
  const d = new Date(); const idx = d.getDate() % MAGIC_FALLBACK.length;
  return MAGIC_FALLBACK[idx];
}

// ── read a metric value across several likely column names (250-metric set
//    has no single fixed schema, so we look defensively and only USE a value
//    when it is actually present & meaningful) ──
function metricVal(m, keys){
  for(const k of keys){
    if(m && m[k] != null && String(m[k]).trim() !== '' &&
       !['না','no','none','nil','n/a','০','0'].includes(String(m[k]).trim().toLowerCase())){
      return m[k];
    }
  }
  return null;
}
function truthyMetric(v){
  if(v == null) return false;
  const s = String(v).trim().toLowerCase();
  return !['না','no','none','nil','n/a','false','০','0',''].includes(s);
}

// Disease label for the "how are you going with your ___" check-in
const DISEASE_CHECKIN = {
  DM:'ডায়াবেটিস', OB:'ওজন নিয়ন্ত্রণ', FL:'ফ্যাটি লিভার',
  IB:'গ্যাস্ট্রিক/IBS', PR:'গর্ভকালীন যত্ন'
};

// ── Build the personalized, persuasive engagement block from REAL data.
//    Tone: supportive, women-to-women, never alarming or shaming. We prompt
//    check-ups and self-care; we never assert a diagnosis. ──
function buildEngagement(ctx){
  const {metrics:m, prevOrder, cat, weather, name} = ctx;
  const red = (t)=>`<div class="pmsg red">${t}</div>`;
  const grn = (t)=>`<div class="pmsg green">${t}</div>`;
  let html = '';

  // 1) previous-order short 3-sentence recap
  if(prevOrder && prevOrder.summary){
    html += `<div class="recap"><div class="rh">🧾 আপনার আগের অর্ডার</div>${prevOrder.summary}</div>`;
  }

  // 2) satisfaction + advice ask (green = positive, red = "tell us")
  html += `<div class="ask">😊 SAR-এর খাবার ও সেবায় <b>আপনি কি সন্তুষ্ট</b>, ${name||'আপা'}? SAR-কে আরও ভালো করতে আপনার <b>পরামর্শ</b> আমাদের কাছে অমূল্য।</div>`;
  html += `<div class="fbrow">
    <span class="fb happy">💚 হ্যাঁ, আমি খুশি</span>
    <span class="fb advice">✍️ আমার পরামর্শ আছে</span>
  </div><div class="sign"></div>`;

  // 3) disease check-in — uses HER real category
  const dl = DISEASE_CHECKIN[cat] || 'স্বাস্থ্য';
  html += grn(`<b>${dl}</b> নিয়ে আপনি এখন কেমন আছেন? নিয়মিত SAR থেরাপিউটিক মিল আপনার যাত্রাকে সহজ করছে — চালিয়ে যান, পরিবর্তন আসবেই। 🌿`);

  // 4) weather-tied symptom check-in (only if both weather hint AND the metric exist)
  const hot = weather && /গরম|উষ্ণ|hot|heat|৩[০-৯]|3[0-9]°/i.test(weather);
  const groin = metricVal(m, ['groin_itching','groin_itch','intertrigo','skin_itching_groin','fungal_groin','groin']);
  if(hot && truthyMetric(groin)){
    html += red(`গতকাল আবহাওয়া বেশ <b>গরম</b> ছিল — এই সময়ে ভাঁজে চুলকানি/র‍্যাশ বেড়ে যায়। আপনার <b>গ্রোয়িন চুলকানির</b> অবস্থা এখন কেমন? প্রয়োজনে SAR-এর অ্যান্টি-ফাঙ্গাল আয়ুর্বেদিক কন্ডিশন পাউডার যোগ করতে পারি।`);
  } else if(truthyMetric(groin)){
    html += red(`আপনার <b>গ্রোয়িন চুলকানির</b> অবস্থা এখন কেমন? গরমে এটি বাড়তে পারে — SAR-এর কুলিং আয়ুর্বেদিক লেয়ার সাহায্য করতে পারে।`);
  }

  // 5) PCOS awareness — educational, check-up prompt (shown for weight/DM/age-relevant,
  //    or when an explicit pcos metric exists). Framed as awareness, not diagnosis.
  const pcos = metricVal(m, ['pcos','pcod','polycystic','pcos_status','menstrual_irregular','irregular_period']);
  if(truthyMetric(pcos) || cat==='OB' || cat==='DM'){
    html += red(`<span class="em">আপনি কি কখনও <b>PCOS</b> (পলিসিস্টিক ওভারি সিনড্রোম) পরীক্ষা করিয়েছেন?</span> জানেন কি — এটি জরায়ুর একটি সাধারণ হরমোনজনিত সমস্যা, যা থেকে ওজন বৃদ্ধি, ব্রণ ও অনিয়মিত মাসিক হতে পারে। SAR-এর তেল-চিনি-মুক্ত আয়ুর্বেদিক মিল PCOS ব্যবস্থাপনায় সহায়ক। একবার ডাক্তারের সাথে কথা বলে দেখুন — সচেতনতাই প্রথম যত্ন। 💗`);
  }

  // 6) family care — only if metrics indicate a sick spouse/child. Soft, free outreach.
  const spouseIll = metricVal(m, ['husband_illness','spouse_illness','husband_health','spouse_sick','husband_condition']);
  const childIll  = metricVal(m, ['child_illness','children_illness','child_health','child_sick','kids_health']);
  if(truthyMetric(spouseIll) || truthyMetric(childIll)){
    const who = truthyMetric(spouseIll) && truthyMetric(childIll) ? 'আপনার স্বামী ও সন্তানের'
              : truthyMetric(spouseIll) ? 'আপনার স্বামীর' : 'আপনার সন্তানের';
    html += grn(`আপনার যত্নে পরিবারও সুস্থ থাকুক — <b>${who} শরীর এখন কেমন আছে?</b> চাইলে SAR থেকে তাঁদের জন্যও স্বাস্থ্যকর খাবারের পরামর্শ নিতে পারেন। 🤍`);
  }

  // 7) closing credibility line
  html += grn(`✦ <b>৫,০০০+ নারী</b> SAR-এর সাথে তাঁদের সুস্থতার যাত্রা শুরু করেছেন। আপনি একা নন — আমরা প্রতিদিন আপনার পাশে আছি।`);

  return html;
}

// ── Build a ≤3-sentence recap of the customer's previous order ──
function summarizePrevOrder(o){
  if(!o) return null;
  let items = [];
  try{ items = Array.isArray(o.items_json) ? o.items_json : []; }catch(e){}
  const names = items.map(i => i.name || i.name_bn).filter(Boolean).slice(0,3);
  const date = o.created_at ? new Date(o.created_at).toLocaleDateString('bn-BD') : '';
  const kcal = items.reduce((s,i)=> s + (parseInt(i.kcal||i.calories||0)||0)*(i.qty||1), 0);
  if(!names.length) return null;
  const s1 = `${date?date+'-এ ':''}আপনি অর্ডার করেছিলেন ${names.join(', ')}${items.length>3?' সহ আরও':''}।`;
  const s2 = `মোট প্রায় ${bn(kcal)} kcal পুষ্টি, সম্পূর্ণ তেল-চিনি-লবণ-মুক্ত ও আয়ুর্বেদিক।`;
  const s3 = `সেই ধারাবাহিকতাই আজও বজায় রাখলেন — অসাধারণ! 🌸`;

function drawQRFallback(el, text){
  el.innerHTML = `<div style="width:84px;height:84px;display:flex;align-items:center;
    justify-content:center;border:1.5px dashed #C2185B;border-radius:6px;font-size:.5rem;
    color:#880E4F;text-align:center;padding:4px;word-break:break-all">${text.slice(0,32)}</div>`;
}
function makeQR(el, text){
  try{
    el.innerHTML = '';
    if(window.QRCode){ new QRCode(el, {text, width:84, height:84, colorDark:'#880E4F', colorLight:'#ffffff'}); }
    else drawQRFallback(el, text);
  }catch(e){ drawQRFallback(el, text); }
}

const bn = n => String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);

// ── normalize a stored item (handles both rich & db-json shapes) ──
function norm(i){
  i = i || {};
  const courseDetail = Array.isArray(i.course_detail) ? i.course_detail
    : Array.isArray(i.courseDetail) ? i.courseDetail
    : (Array.isArray(i.courses) ? i.courses.map(c => typeof c==='string'?{name:c,items:[]}:c) : []);
  const ingredients = Array.isArray(i.ingredients) ? i.ingredients
    : [].concat(...courseDetail.map(c => Array.isArray(c.items)?c.items:[])).filter((v,k,a)=>v&&a.indexOf(v)===k);
  return {
    name: i.name || i.name_bn || 'SAR মেনু',
    meal: i.meal || 'lunch',
    mealBn: i.meal_bn || i.mealBn || MEAL_BN[i.meal] || '',
    cat: i.cat || 'DM',
    day: i.day || '',
    code: i.code || i.blockchain_code || i.menu_item_id || i.name,
    qty: i.qty || i.quantity || 1,
    price: i.unit_price || i.price || 0,
    courseCount: i.course_count || i.courseCount || courseDetail.length || 1,
    courseDetail, ingredients,
    diseasePowders: i.disease_powders || i.diseasePowders || [],
    conditionPowders: i.condition_powders || i.conditionPowders || [],
    chutney: i.chutney || '',
    topping: i.topping || '',
    mix: !!i.mix,
    benefits: Array.isArray(i.benefits) ? i.benefits.join(' · ') : (i.benefits || ''),
    kcal: parseInt(i.kcal||i.calories||0)||0,
    protein: parseFloat(i.protein||0)||0,
    fiber: parseFloat(i.fiber||0)||0,
    fat: parseFloat(i.fat||0)||0,
    carb: parseFloat(i.carb||0)||0
  };
}

async function load(){
  const params = new URLSearchParams(location.search);
  const oid = params.get('oid');
  let order = null, items = [], cust = {};

  // customer (for name/phone/category)
  try { cust = JSON.parse(localStorage.getItem('sar_customer') || '{}'); } catch(e){}

  if(oid){
    try{
      const r = await fetch(`${SUPA}/rest/v1/orders?id=eq.${oid}&select=*`, {headers:H});
      const arr = await r.json();
      order = arr && arr[0];
    }catch(e){}
  }

  // items: from order.items_json, else order_items rows, else local snapshot
  if(order && Array.isArray(order.items_json) && order.items_json.length){
    items = order.items_json;
  } else if(order){
    try{
      const r = await fetch(`${SUPA}/rest/v1/order_items?order_id=eq.${order.id}&select=*`, {headers:H});
      const rows = await r.json();
      items = (rows||[]).map(row => Object.assign(
        {name:row.menu_name_bn, qty:row.quantity, unit_price:row.unit_price, note:row.special_note},
        row.nutrition_json || {}
      ));
    }catch(e){}
  }
  if(!items.length){
    try{ items = JSON.parse(localStorage.getItem('sar_last_order_items') || '[]'); }catch(e){ items=[]; }
  }

  const norms = items.map(norm);

  // AI magical message + advice + weather (the 6 AM daily analysis row)
  let magic = '', advice = '', weather = '', analysisRow = null;
  const cid = cust.id || localStorage.getItem('sar_customer_id');
  if(cid){
    try{
      const r = await fetch(`${SUPA}/rest/v1/ai_analysis?customer_id=eq.${cid}&order=created_at.desc&limit=1`, {headers:H});
      const a = await r.json();
      if(a && a[0]){
        analysisRow = a[0];
        const rj = a[0].result_json || {};
        magic   = a[0].magical_message || rj.magical_message || rj.magic || '';
        advice  = a[0].analysis_bn || a[0].recommendations || rj.note || a[0].focus || '';
        weather = rj.weather || a[0].weather || '';
      }
    }catch(e){}
  }
  if(!magic){
    try{ const ls = JSON.parse(localStorage.getItem('sar_last_analysis')||'{}');
      magic = ls.magical_message || ''; weather = weather || ls.weather || ''; }catch(e){}
  }

  // customer 250-metrics (for personalized AI + persuasive engagement)
  let metrics = {};
  if(cid){
    try{
      const r = await fetch(`${SUPA}/rest/v1/customer_metrics?customer_id=eq.${cid}&select=*&limit=1`, {headers:H});
      const d = await r.json(); metrics = (d && d[0]) || {};
    }catch(e){}
  }

  // previous order (the one BEFORE this receipt's order) for the recap + AI context
  let prevOrder = null, prevRaw = null;
  if(cid){
    try{
      const excl = (order && order.id) ? `&id=neq.${order.id}` : '';
      const r = await fetch(`${SUPA}/rest/v1/orders?customer_id=eq.${cid}${excl}&order=created_at.desc&limit=1&select=*`, {headers:H});
      const d = await r.json();
      prevRaw = d && d[0];
      prevOrder = summarizePrevOrder(prevRaw);
    }catch(e){}
  }

  const cat = (cust.sar_category) || (norms[0] && norms[0].cat) || metrics.disease_category || 'DM';

  // ── AI MAGICAL MESSAGE ──
  // Priority: (1) message already AI-generated & stored at 6AM in ai_analysis;
  //           (2) live AI call to the SAR worker using ALL her data (best effort);
  //           (3) rich local persuasive generator from real metrics + order.
  if(!magic){
    magic = await generateMagicMessage({cust, metrics, items:norms, prevOrder, cat, weather, grandHint:order});
  }
  if(!magic) magic = localMagic({cust, metrics, items:norms, prevOrder, cat, weather});

  render(order, norms, cust, {magic, advice, weather}, oid, {metrics, prevOrder, cat});

  // ── store payment-receipt details in Supabase for 1 month (audit/verification) ──
  storeReceiptAudit(order, norms, cust, oid);

  document.getElementById('loading').classList.add('hide');
}

// ── Live AI generation of the emotional, persuasive magical message,
//    grounded in ALL the customer's data. Uses the SAR worker's `analyze`
//    action (same Claude proxy meal-score uses). Returns '' on any failure
//    so the caller can fall back to the local generator. ──
const SAR_API = '/.netlify/functions/sar';
async function generateMagicMessage(ctx){
  try{
    const prompt = buildMagicPrompt(ctx);
    const r = await fetch(SAR_API, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'analyze', prompt})
    });
    if(!r.ok) return '';
    const d = await r.json();
    if(!d || !d.ai) return '';
    // worker returns a JSON string; expect {"magic":"..."}
    let obj; try{ obj = JSON.parse(d.ai); }catch(e){ obj = null; }
    let msg = obj ? (obj.magic || obj.magical_message || obj.message || '') : '';
    if(!msg && typeof d.ai === 'string' && d.ai.length < 600 && d.ai.indexOf('{')<0) msg = d.ai;
    return (msg||'').trim();
  }catch(e){ return ''; }
}

function buildMagicPrompt(ctx){
  const {cust, metrics:m, items, prevOrder, cat, weather} = ctx;
  const name = (cust.full_name||'আপা');
  const itemNames = (items||[]).map(i=>i.name).filter(Boolean).join(', ');
  const data = {
    নাম:name, বিভাগ:(CAT_BN[cat]||cat),
    BMI:m.bmi, স্ট্রেস:m.stress_level, ঘুম:m.sleep_hours, মুড:m.mood,
    কার্যকলাপ:m.activity_level, গর্ভাবস্থা:m.pregnancy_status,
    ডায়াবেটিস:m.diabetes_type, ফ্যাটিলিভার:m.fatty_liver_grade, IBS:m.ibs_type,
    আবহাওয়া:weather, আজকের_অর্ডার:itemNames,
    আগের_অর্ডার:(prevOrder&&prevOrder.names?prevOrder.names.join(', '):'')
  };
  // keep only present fields
  const present = Object.entries(data).filter(([k,v])=> v!=null && String(v).trim()!=='' && String(v).trim()!=='না')
    .map(([k,v])=>`${k}: ${v}`).join(' | ');
  return [
    'তুমি SAR (She AI Restaurant)-এর আবেগময় ও প্রেরণাদায়ী মার্কেটিং কপিরাইটার, যিনি একজন বাংলাদেশি নারীকে তাঁর সুস্থতার যাত্রায় উৎসাহ দেন।',
    'নিচের তথ্য বিশ্লেষণ করে আজকের রিসিটের জন্য একটি "জাদুকরী বার্তা" লেখো:',
    present,
    'নিয়ম: (১) বাংলায়, উষ্ণ, ব্যক্তিগত ও আবেগময়; নাম ধরে সম্বোধন করো। (২) তার বিভাগ/কন্ডিশন ও আজকের অর্ডারকে স্পর্শ করো। (৩) ২–৩ বাক্য, সর্বোচ্চ ৬০ শব্দ। (৪) ভয় নয়, ভরসা ও গর্ব জাগাও; নিজের যত্নের জন্য তাকে প্রশংসা করো। (৫) ১টি উপযুক্ত ইমোজি দিয়ে শেষ করো। (৬) কোনো রোগ-নির্ণয় বা মিথ্যা প্রতিশ্রুতি নয়।',
    'শুধু একটি JSON অবজেক্ট দাও, অন্য কিছু নয়: {"magic":"<বার্তা>"}'
  ].join('\n');
}

// ── Rich local persuasive generator (fallback) — composes an emotional,
//    data-aware Bengali message from her real metrics + order. ──
function localMagic(ctx){
  const {cust, metrics:m, items, prevOrder, cat} = ctx;
  const first = (cust.full_name||'আপা').split(' ')[0];
  const dl = (CAT_BN[cat]||'সুস্থতা');
  const todays = (items||[]).map(i=>i.name).filter(Boolean)[0] || 'আজকের থেরাপিউটিক মিল';
  const stress = +(''+(m.stress_level||'')).replace(/[^0-9.]/g,'') || null;
  const repeat = prevOrder && prevOrder.names && prevOrder.names.length;

  const openers = [
    `${first}, আজও নিজের জন্য সঠিক পছন্দটাই করলেন।`,
    `${first} আপা, এই এক প্লেট যত্ন আপনার ভেতরের শক্তিরই প্রতিচ্ছবি।`,
    `${first}, সুস্থতার পথে আপনার প্রতিটি পদক্ষেপ আমাদের গর্বিত করে।`
  ];
  const opener = openers[(new Date().getDate())%openers.length];

  let mid;
  if(stress!=null && stress>=7) mid = `জানি দিনগুলো চাপের, তবু "${todays}" বেছে নিয়ে আপনি নিজের মন ও শরীর দুটোকেই ভালোবাসা দিলেন।`;
  else if(repeat) mid = `"${todays}" দিয়ে আপনি ${dl} ব্যবস্থাপনার ধারাবাহিকতা ধরে রাখলেন — এই অধ্যবসায়ই আসল পরিবর্তন আনে।`;
  else mid = `"${todays}" — সম্পূর্ণ তেল-চিনি-লবণ-মুক্ত, আয়ুর্বেদিক; ${dl}-এর যত্নে প্রকৃতির হাতে গড়া।`;

  const closer = `চালিয়ে যান, আমরা প্রতিদিন আপনার পাশে আছি। 🌸`;
  return `${opener} ${mid} ${closer}`;
}

// Write a 1-month-retained audit record of this receipt (non-blocking)
async function storeReceiptAudit(order, items, cust, oid){
  try{
    const cid = cust.id || localStorage.getItem('sar_customer_id');
    const now = new Date();
    const expires = new Date(now.getTime() + 31*24*60*60*1000); // ~1 month
    const row = {
      order_id: (order && order.id) || oid || null,
      customer_id: cid || null,
      customer_name: cust.full_name || localStorage.getItem('sar_customer_name') || null,
      receipt_number: (window._rcp && window._rcp.rcpNum) || null,
      order_number: (order && order.order_number) || localStorage.getItem('sar_last_order_num') || null,
      payment_method: (order && order.payment_method) || null,
      payment_status: (order && order.payment_status) || null,
      total_amount: (order && order.total_amount) || null,
      items_json: items,
      generated_at: now.toISOString(),
      retain_until: expires.toISOString(),
      purpose: 'audit_verification_1month'
    };
    await fetch(`${SUPA}/rest/v1/receipt_audit`, {
      method:'POST',
      headers:{...H, 'Content-Type':'application/json', Prefer:'return=minimal'},
      body: JSON.stringify(row)
    });
  }catch(e){ /* audit is best-effort, never blocks the receipt */ }
}

// ════════════════════════════════════════════════════
// STAFF SCANNER — scan a food QR/barcode to place an
// order on behalf of the customer. Works with:
//  • USB barcode scanners (act as keyboards: type code + Enter)
//  • phone/laptop camera via BarcodeDetector API
//  • manual typing + "খুঁজুন/OK" button or Enter
// A matched code → shows the item → Enter or OK places the order.
// ════════════════════════════════════════════════════
let _menuCache = [], _pendingMatch = null, _camStream = null, _camLoop = null;

async function getMenu(){
  if(_menuCache.length) return _menuCache;
  try{
    const r = await fetch(`${SUPA}/rest/v1/menu_items?is_available=eq.true&select=*&order=menu_code`, {headers:H});
    _menuCache = await r.json() || [];
  }catch(e){ _menuCache = []; }
  return _menuCache;
}

function normCode(s){ return String(s||'').trim().toLowerCase().replace(/^sar-(menu|item|food)[:|-]?/,''); }

async function resolveScan(raw){
  const code = normCode(raw);
  const resEl = document.getElementById('scanResult');
  const matchEl = document.getElementById('scanMatch');
  if(!code){ resEl.className='scan-result err'; resEl.textContent='কোনো কোড পাওয়া যায়নি।'; return; }
  resEl.className='scan-result'; resEl.textContent='খুঁজছি…';
  const menu = await getMenu();
  // match on menu_code, id, barcode, qr_code, or name
  const hit = menu.find(m =>
    normCode(m.menu_code)===code || normCode(m.id)===code ||
    normCode(m.barcode)===code || normCode(m.qr_code)===code ||
    (m.name_bn && normCode(m.name_bn)===code) || (m.name_en && normCode(m.name_en)===code)
  );
  if(!hit){
    resEl.className='scan-result err';
    resEl.textContent=`❌ "${raw.trim()}" — কোনো মিল পাওয়া যায়নি। আবার স্ক্যান করুন।`;
    matchEl.style.display='none'; _pendingMatch=null; return;
  }
  _pendingMatch = hit;
  resEl.className='scan-result ok';
  resEl.textContent='✓ মিল পাওয়া গেছে — Enter বা OK চেপে অর্ডার বসান।';
  document.getElementById('matchName').textContent = (hit.name_bn || hit.name_en || hit.menu_code);
  document.getElementById('matchMeta').textContent =
    `${hit.menu_code||''} · ${hit.calories||'—'} kcal · ${hit.disease_category||''} · ৳${hit.price||(hit.course_count?hit.course_count*200:200)}`;
  matchEl.style.display='block';
}

async function placeScannedOrder(){
  const hit = _pendingMatch;
  const resEl = document.getElementById('scanResult');
  if(!hit){ resEl.className='scan-result err'; resEl.textContent='আগে একটি কোড স্ক্যান করুন।'; return; }
  const d = window._rcp || {};
  const cid = d.cid || localStorage.getItem('sar_customer_id');
  if(!cid){ resEl.className='scan-result err'; resEl.textContent='গ্রাহক শনাক্ত করা যায়নি।'; return; }
  const price = hit.price || (hit.course_count ? hit.course_count*200 : 200);
  const orderNum = 'ORD-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-' + Math.floor(1000+Math.random()*9000);
  const itemJson = [{
    id: hit.id, code: hit.menu_code, name: hit.name_bn || hit.name_en, name_bn: hit.name_bn,
    cat: hit.disease_category, meal: hit.meal_type, qty: 1, unit_price: price,
    courses: [hit.course_1_bn, hit.course_2_bn, hit.course_3_bn].filter(Boolean),
    kcal: hit.calories, protein: hit.protein_g, fiber: hit.fiber_g, benefits: hit.benefits, scanned: true
  }];
  resEl.className='scan-result'; resEl.textContent='অর্ডার বসানো হচ্ছে…';
  try{
    const r = await fetch(`${SUPA}/rest/v1/orders`, {
      method:'POST',
      headers:{...H, 'Content-Type':'application/json', Prefer:'return=representation'},
      body: JSON.stringify({
        order_number: orderNum, customer_id: cid, order_type:'dine_in', status:'confirmed',
        items_json: itemJson, subtotal: price, tax: Math.round(price*0.05),
        total_amount: price + Math.round(price*0.05), payment_method:'cash',
        payment_status:'pending', is_voice_order:false,
        special_instructions:'স্টাফ স্ক্যান অর্ডার (QR/বারকোড)'
      })
    });
    if(!r.ok){ const e=await r.json(); throw new Error(e.message||'order failed'); }
    const arr = await r.json(); const ord = arr[0];
    resEl.className='scan-result ok';
    resEl.innerHTML = `✅ অর্ডার বসানো হয়েছে — <b>${orderNum}</b>। <a href="receipt.html?oid=${ord.id}" style="color:#34D399">নতুন রিসিট →</a>`;
    document.getElementById('scanMatch').style.display='none';
    document.getElementById('scanInput').value='';
    _pendingMatch=null;
  }catch(e){
    resEl.className='scan-result err'; resEl.textContent='❌ অর্ডার ব্যর্থ: '+e.message;
  }
}

// USB barcode scanners type fast then send Enter; also handle manual Enter/OK.
function initScannerInput(){
  const input = document.getElementById('scanInput');
  input.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      e.preventDefault();
      if(_pendingMatch && normCode(input.value)===normCode(_pendingMatch.menu_code)) placeScannedOrder();
      else resolveScan(input.value);
    }
  });
  document.getElementById('placeBtn').addEventListener('click', placeScannedOrder);
  // global Enter places a pending match even if focus left the input (OK press)
  document.addEventListener('keydown', e => {
    if(e.key==='Enter' && _pendingMatch && document.activeElement!==input){ placeScannedOrder(); }
  });
}

async function toggleCamera(){
  const video = document.getElementById('scanVideo');
  const btn = document.getElementById('camBtn');
  const resEl = document.getElementById('scanResult');
  if(_camStream){ stopCamera(); btn.textContent='📷 ক্যামেরা'; return; }
  if(!('BarcodeDetector' in window)){
    resEl.className='scan-result err';
    resEl.textContent='এই ব্রাউজারে ক্যামেরা-স্ক্যান নেই — USB স্ক্যানার বা টাইপ করুন।';
    return;
  }
  try{
    _camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject = _camStream; video.style.display='block'; await video.play();
    btn.textContent='⏹ বন্ধ করুন';
    const detector = new BarcodeDetector({formats:['qr_code','code_128','ean_13','ean_8','code_39','upc_a']});
    _camLoop = setInterval(async ()=>{
      try{
        const codes = await detector.detect(video);
        if(codes && codes.length){
          const val = codes[0].rawValue;
          stopCamera(); btn.textContent='📷 ক্যামেরা';
          document.getElementById('scanInput').value = val;
          resolveScan(val);
        }
      }catch(e){}
    }, 500);
  }catch(e){
    resEl.className='scan-result err'; resEl.textContent='ক্যামেরা চালু করা যায়নি: '+e.message;
  }
}
function stopCamera(){
  if(_camLoop){ clearInterval(_camLoop); _camLoop=null; }
  if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; }
  const v=document.getElementById('scanVideo'); v.style.display='none'; v.srcObject=null;
}

initScannerInput();
load();
</script>
