<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SAR Receipt</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── SCREEN UI ── */
:root{--pink:#E91E8C;--purple:#6B21A8;--green:#059669;--dark:#0A0A0F;--border:rgba(255,255,255,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:#fff;font-family:'Hind Siliguri',sans-serif;min-height:100vh}
.screen-nav{display:flex;justify-content:space-between;align-items:center;
  padding:.75rem 1.5rem;background:rgba(10,10,20,.8);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:.5rem;text-decoration:none}
.nav-logo-icon{width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#E91E8C,#6B21A8);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9rem}
.nav-logo-txt{font-family:'Georgia',serif;font-size:1rem;
  background:linear-gradient(90deg,#E91E8C,#A855F7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.nav-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.nav-btn{padding:.45rem 1rem;border-radius:20px;font-size:.78rem;font-weight:700;
  cursor:pointer;border:none;font-family:'Hind Siliguri',sans-serif;
  transition:all .25s;display:flex;align-items:center;gap:.3rem}
.nb-print{background:#fff;color:#880E4F}
.nb-wa{background:#25D366;color:#fff}
.nb-email{background:rgba(107,33,168,.25);border:1px solid rgba(107,33,168,.4);color:#A855F7}
.nb-back{background:rgba(255,255,255,.08);border:1px solid var(--border);color:rgba(255,255,255,.6)}
.nav-btn:hover{transform:translateY(-1px);opacity:.9}

/* Status bar */
.status-bar{background:rgba(5,150,105,.1);border-bottom:1px solid rgba(52,211,153,.2);
  padding:.4rem 1.5rem;font-size:.78rem;color:#34D399;display:flex;align-items:center;gap:.5rem}
.status-bar.sending{background:rgba(245,158,11,.1);border-color:rgba(245,200,66,.2);color:#FCD34D}
.status-bar.err{background:rgba(220,38,38,.1);border-color:rgba(248,113,113,.2);color:#F87171}

/* Loader */
.page-loader{min-height:60vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1rem;padding:3rem}
.pl-spin{width:48px;height:48px;border-radius:50%;
  border:3px solid rgba(233,30,140,.2);border-top-color:#E91E8C;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.pl-txt{font-size:.88rem;color:rgba(255,255,255,.45)}
.page-error{min-height:60vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:.75rem;text-align:center;padding:2rem}
.pe-icon{font-size:3rem}.pe-title{font-size:1.2rem;color:#F87171;font-family:'Georgia',serif}
.pe-desc{font-size:.85rem;color:rgba(255,255,255,.45);max-width:400px;line-height:1.7}
.pe-btn{padding:.65rem 1.5rem;border-radius:50px;background:linear-gradient(135deg,#E91E8C,#6B21A8);
  color:#fff;text-decoration:none;font-size:.85rem;font-weight:700;margin-top:.5rem}

/* Receipt wrapper on screen */
.receipt-page-wrap{max-width:760px;margin:1.5rem auto;padding:0 1rem 3rem}

/* ══════════════════════════════════════════════════
   PINK A4 RECEIPT — COMPACT WORLD CLASS POS STYLE
   ══════════════════════════════════════════════════ */
.rcp{
  background:linear-gradient(175deg,#FFF0F5 0%,#FDEEF4 20%,#FFF8FC 60%,#FFF0F5 100%);
  font-family:Arial,sans-serif;color:#1a1a1a;
  border-radius:4px;position:relative;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.5),5px 0 0 #FFB3D9,-5px 0 0 #FFB3D9;
}
/* Watermark */
.rcp::before{content:'SAR';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-35deg);
  font-size:140px;font-weight:900;color:rgba(233,30,140,.04);
  pointer-events:none;z-index:0;letter-spacing:.15em}

/* ── HEADER ── */
.rcp-hd{background:linear-gradient(135deg,#880E4F,#C2185B,#AD1457);
  padding:12px 18px 10px;text-align:center;position:relative;z-index:1}
.rcp-hd-logo{font-family:Georgia,serif;font-size:18px;font-weight:700;
  color:#fff;letter-spacing:.05em;text-shadow:0 2px 6px rgba(0,0,0,.3)}
.rcp-hd-logo span{color:#FFD1E8}
.rcp-hd-tag{font-size:9px;color:#FFB3D1;letter-spacing:.14em;margin:2px 0}
.rcp-hd-num{font-size:11px;font-weight:700;color:#fff;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);
  border-radius:14px;padding:3px 14px;display:inline-block;margin-top:5px}
.rcp-hd-ord{font-size:9.5px;color:#FFD1E8;margin-top:3px}

/* ── SUCCESS STRIP ── */
.rcp-ok{background:#E8F5E9;border-bottom:2px solid #A5D6A7;
  padding:7px 16px;display:flex;align-items:center;gap:9px;position:relative;z-index:1}
.rcp-ok-icon{font-size:20px;flex-shrink:0}
.rcp-ok-title{color:#2E7D32;font-weight:700;font-size:12px}
.rcp-ok-desc{color:#558B2F;font-size:10px}

/* ── BODY ── */
.rcp-body{padding:10px 16px;position:relative;z-index:1}

/* Info grid — compact 3-col */
.rcp-info{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:9px}
.rcp-ic{background:rgba(255,255,255,.65);border:1px solid #FFB3CC;border-radius:5px;padding:5px 8px}
.rcp-ic-k{font-size:8.5px;color:#AD1457;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.rcp-ic-v{font-size:11px;color:#111;font-weight:600;line-height:1.2}
.rcp-ic.wide{grid-column:1/-1}
.rcp-ic.two{grid-column:span 2}

/* Total stripe */
.rcp-total{background:linear-gradient(135deg,#880E4F,#C2185B);border-radius:7px;
  padding:8px 14px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}
.rcp-total-k{color:#FFD1E8;font-size:11px}
.rcp-total-v{color:#fff;font-size:17px;font-weight:700;font-family:'Space Mono',Arial}

/* Section heading */
.rcp-sh{font-size:8.5px;font-weight:700;color:#880E4F;text-transform:uppercase;
  letter-spacing:.12em;margin:8px 0 4px;display:flex;align-items:center;gap:6px}
.rcp-sh::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#FFB3CC,transparent)}

/* ── ITEM BLOCK (POS style) ── */
.rcp-item{border:1px solid #FFD0E8;border-radius:6px;margin-bottom:7px;overflow:hidden}
.rcp-item-head{background:#FCE4EC;padding:5px 9px;display:flex;justify-content:space-between;align-items:center}
.rcp-item-name{font-size:11px;font-weight:700;color:#880E4F}
.rcp-item-price{font-size:11px;font-weight:700;color:#880E4F;font-family:'Space Mono',Arial;white-space:nowrap;margin-left:8px}
.rcp-item-body{padding:6px 9px;background:rgba(255,255,255,.55)}

/* Nutrition compact row */
.rcp-nutr{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;
  background:#FFF0F5;border-radius:4px;padding:4px 6px}
.rcp-nutr-cell{text-align:center;min-width:44px}
.rcp-nutr-val{font-size:10.5px;font-weight:700;color:#880E4F;font-family:'Space Mono',Arial;line-height:1.1}
.rcp-nutr-lbl{font-size:8px;color:#888;letter-spacing:.04em}
.rcp-nutr-dv{font-size:8px;color:#C2185B;font-weight:700}
.rcp-nutr-sep{width:1px;background:#FFB3CC;align-self:stretch;margin:0 2px}

/* Ingredients compact */
.rcp-ings{margin-bottom:4px}
.rcp-ings-title{font-size:8.5px;color:#6A1B9A;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:3px}
.rcp-ing-row{display:flex;align-items:center;gap:4px;padding:2px 0;
  border-bottom:1px dotted #FFD0E8;font-size:9.5px;color:#333}
.rcp-ing-row:last-child{border-bottom:none}
.rcp-ing-name{flex:1;font-weight:600}
.rcp-ing-qty{color:#666;font-size:9px;white-space:nowrap}
.rcp-bc{font-size:8.5px;color:#1565C0;background:#E3F2FD;padding:1px 5px;
  border-radius:3px;border:1px solid #BBDEFB;text-decoration:none;white-space:nowrap}

/* Benefits */
.rcp-benefit{font-size:9.5px;color:#2E7D32;background:#E8F5E9;border-left:3px solid #4CAF50;
  padding:3px 7px;border-radius:0 4px 4px 0;margin-top:4px;line-height:1.4}

/* Herbs */
.rcp-herbs{font-size:9px;color:#7B1FA2;margin-top:3px}
.rcp-herb-chip{display:inline-block;background:#F3E5F5;border:1px solid #CE93D8;
  border-radius:10px;padding:1px 6px;margin:1px 2px 1px 0;font-size:8.5px}

/* Total nutrition summary */
.rcp-nutr-total{background:#FCE4EC;border-radius:5px;padding:5px 9px;margin:7px 0;
  font-size:10px;color:#880E4F;font-weight:700}

/* Divider */
.rcp-div{border:none;border-top:2px dashed #FFB3CC;margin:10px 0;position:relative}
.rcp-div-label{position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#E91E8C,#6B21A8);color:#fff;
  font-size:8px;padding:1px 10px;border-radius:8px;white-space:nowrap;letter-spacing:.06em}

/* Blockchain notice */
.rcp-bc-notice{background:#E3F2FD;border:1px solid #BBDEFB;border-radius:5px;
  padding:5px 9px;margin:7px 0;font-size:9px;color:#1565C0;line-height:1.5}

/* Disclaimer */
.rcp-disc{background:#FFF3E0;border:1px solid #FFCC80;border-radius:5px;
  padding:5px 9px;margin:6px 0;font-size:9px;color:#E65100;line-height:1.5}

/* ── SIDE B ── */
/* AI advice */
.rcp-ai{background:#F3E5F5;border:1px solid #CE93D8;border-left:3px solid #7B1FA2;
  border-radius:0 5px 5px 0;padding:6px 10px;margin-bottom:6px}
.rcp-ai-title{font-size:9px;font-weight:700;color:#6A1B9A;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:2px}
.rcp-ai-body{font-size:10px;color:#333;line-height:1.45}

/* Personalized messages */
.rcp-msg{border-radius:5px;padding:6px 9px;margin-bottom:5px;position:relative;padding-left:12px}
.rcp-msg::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:5px 0 0 5px}
.rcp-msg-r{background:#FFF5F5;border:1px solid #FFCDD2}.rcp-msg-r::before{background:#D32F2F}
.rcp-msg-g{background:#F1F8E9;border:1px solid #C5E1A5}.rcp-msg-g::before{background:#388E3C}
.rcp-msg-p{background:#FCE4EC;border:1px solid #F48FB1}.rcp-msg-p::before{background:#C2185B}
.rcp-msg-v{background:#F3E5F5;border:1px solid #CE93D8}.rcp-msg-v::before{background:#7B1FA2}
.rcp-msg-title{font-size:10px;font-weight:700;margin-bottom:2px}
.rcp-msg-r .rcp-msg-title{color:#C62828}
.rcp-msg-g .rcp-msg-title{color:#2E7D32}
.rcp-msg-p .rcp-msg-title{color:#AD1457}
.rcp-msg-v .rcp-msg-title{color:#6A1B9A}
.rcp-msg-body{font-size:9.5px;color:#333;line-height:1.45}

/* Survey */
.rcp-survey{background:#FFF8FC;border:1px solid #FFB3CC;border-radius:5px;padding:7px 10px;margin-top:8px}
.rcp-survey-q{font-size:10px;font-weight:700;color:#880E4F;margin-bottom:5px}
.rcp-survey-line{border:none;border-bottom:1px solid #FFB3CC;background:transparent;
  width:100%;margin-bottom:5px;height:1px;display:block}

/* Footer */
.rcp-footer{text-align:center;padding:8px 0 4px;font-size:8.5px;color:#AD1457;line-height:1.7;border-top:1px solid #FFB3CC;margin-top:8px}

/* ══════════════════════════════════════════════════
   PRINT STYLES — A4, Both sides, Compact
   ══════════════════════════════════════════════════ */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  body{background:#FFF0F5!important;margin:0;padding:0}
  .screen-nav,.status-bar,.nav-actions,.page-loader,.page-error{display:none!important}
  .receipt-page-wrap{max-width:100%;margin:0;padding:0}
  .rcp{box-shadow:none;border-radius:0;max-width:210mm;margin:0 auto}
  .rcp-div{page-break-before:always;margin-top:0}
  @page{size:A4;margin:8mm 6mm}
  @page:right{margin:8mm 6mm 8mm 12mm}
  @page:left {margin:8mm 12mm 8mm 6mm}
}
</style>
</head>

// Lookup function — exact or partial match
function getMenuData(name) {
  if (!name) return null;
  // Exact match
  if (MENU_DB[name]) return MENU_DB[name];
  // Partial match
  const lc = name.toLowerCase();
  for (const [k,v] of Object.entries(MENU_DB)) {
    if (k.toLowerCase().includes(lc) || lc.includes(k.toLowerCase().split(' ')[0])) return v;
  }
  return null;
}

// INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  const params  = new URLSearchParams(window.location.search);
  const orderId = params.get('oid') || params.get('order_id') || '';
  if (!orderId) { showError('URL-এ Order ID নেই। order.html → রিসিট বাটন থেকে আসুন।'); return; }

  setLoader('অর্ডার তথ্য লোড হচ্ছে...');

  try {
    const [oArr, cArr, mArr, aiArr, logArr, prevArr] = await Promise.all([
      fetch(`${SUPA}/rest/v1/orders?id=eq.${orderId}&select=*`,{headers:H}).then(r=>r.json()),
      CID ? fetch(`${SUPA}/rest/v1/customers?id=eq.${CID}&select=*`,{headers:H}).then(r=>r.json()) : [_sc],
      CID ? fetch(`${SUPA}/rest/v1/customer-metrics?customer_id=eq.${CID}&limit=1`,{headers:H}).then(r=>r.json()) : [{}],
      CID ? fetch(`${SUPA}/rest/v1/ai_analysis?customer_id=eq.${CID}&order=created_at.desc&limit=1`,{headers:H}).then(r=>r.json()) : [{}],
      CID ? fetch(`${SUPA}/rest/v1/daily_health_log?customer_id=eq.${CID}&order=log_date.desc&limit=1`,{headers:H}).then(r=>r.json()) : [{}],
      CID ? fetch(`${SUPA}/rest/v1/orders?customer_id=eq.${CID}&order=created_at.desc&limit=4&select=order_number,items_json,total_amount,status,created_at`,{headers:H}).then(r=>r.json()) : [],
    ]);

    const order   = oArr?.[0];
    const cust    = cArr?.[0] || _sc || {};
    const metrics = mArr?.[0] || {};
    const ai      = aiArr?.[0] || {};
    const log     = logArr?.[0] || {};
    const prev    = (prevArr||[]).filter(o=>o.id!==orderId).slice(0,3);

    if (!order) {
      // Fallback to localStorage
      const saved = JSON.parse(localStorage.getItem('sar_last_order_items')||'[]');
      if (!saved.length) { showError('অর্ডার পাওয়া যায়নি।'); return; }
      buildReceipt({order_number:localStorage.getItem('sar_last_order_num')||'—',items_json:saved,total_amount:0,payment_method:'—',order_type:'—',created_at:new Date().toISOString()}, cust, metrics, ai, log, prev);
    } else {
      const items = order.items_json || JSON.parse(localStorage.getItem('sar_last_order_items')||'[]');
      order.items_json = items;
      buildReceipt(order, cust, metrics, ai, log, prev);
    }

  } catch(e) { showError('লোড ব্যর্থ: '+e.message); }
});

// BUILD RECEIPT
// ═══════════════════════════════════════════════════════════
function buildReceipt(order, cust, metrics, ai, log, prev) {
  const items   = order.items_json || [];
  const cat     = cust.sar_category || 'DM';
  const today   = new Date(order.created_at||Date.now());
  const rcpNum  = 'RCP-'+today.toISOString().slice(0,10).replace(/-/g,'') + '-' + Math.floor(1000+Math.random()*9000);
  const sub     = items.reduce((s,i)=>s+(i.price||i.unit_price||0)*(i.qty||i.quantity||1),0);
  const del     = order.delivery_fee||0;
  const vat     = order.tax||Math.round(sub*.05);
  const grand   = order.total_amount||(sub+del+vat);
  const otype   = {delivery:'ডেলিভারি',dine_in:'ডাইন-ইন',takeaway:'টেকঅ্যাওয়ে'}[order.order_type]||order.order_type||'—';
  const eta     = {delivery:'৪৫ মিনিট',dine_in:'২৫ মিনিট',takeaway:'২০ মিনিট'}[order.order_type]||'—';
  const expDate = cust.monthly_sub_expiry_date ? new Date(cust.monthly_sub_expiry_date).toLocaleDateString('bn-BD') : '—';
  const daysSince = cust.created_at ? Math.floor((Date.now()-new Date(cust.created_at))/86400000) : 0;

  G = {rcpNum, order, cust, ai, grand};

  // ── Header ──
  document.getElementById('rcpNum').textContent = 'Receipt #'+rcpNum;
  document.getElementById('rcpOrd').textContent = 'Order: '+(order.order_number||'—');
  document.getElementById('rcpOkDesc').textContent = `অর্ডার ${order.order_number||'—'} — ETA: ${eta}`;

  // ── Nutrition totals ──
  let totKcal=0, totProt=0, totCarb=0, totFat=0;
  const itemBlocks = items.map(item=>{
    const name   = item.name_bn||item.menu_name_bn||item.name||'—';
    const qty    = item.qty||item.quantity||1;
    const price  = (item.price||item.unit_price||0)*qty;
    const md     = getMenuData(name) || {};
    const kcal   = parseInt(item.kcal||md.kcal||0);
    const prot   = parseFloat(item.protein||md.protein||Math.round(kcal*.15/4));
    const carb   = parseFloat(item.carb||md.carb||Math.round(kcal*.5/4));
    const fat    = parseFloat(item.fat||md.fat||Math.round(kcal*.3/9));
    const fiber  = parseFloat(item.fiber||md.fiber||3);
    const iron   = parseFloat(md.iron||0);
    const calcium= parseFloat(md.calcium||0);
    totKcal+=kcal*qty; totProt+=prot*qty; totCarb+=carb*qty; totFat+=fat*qty;

    const pKcal = kcal  ? Math.min(99,Math.round(kcal/DAILY.kcal*100)):0;
    const pProt = prot  ? Math.min(99,Math.round(prot/DAILY.protein*100)):0;
    const pCarb = carb  ? Math.min(99,Math.round(carb/DAILY.carb*100)):0;
    const pFat  = fat   ? Math.min(99,Math.round(fat/DAILY.fat*100)):0;
    const pFib  = fiber ? Math.min(99,Math.round(fiber/DAILY.fiber*100)):0;
    const pIron = iron  ? Math.min(99,Math.round(iron/DAILY.iron*100)):0;
    const pCa   = calcium? Math.min(99,Math.round(calcium/DAILY.calcium*100)):0;

    const benefit = (md.benefits||{})[cat] || (item.benefits||'থেরাপিউটিক ফুড');
    const herbs   = md.herbs || item.herbs || [];
    const ings    = md.ingredients || [];
    const note    = md.note || '';

  if (aiMenu) {

    aiBlock += `<div style="background:#FFF0F5;border:1px solid #FFB3CC;border-radius:5px;padding:6px 9px;margin-bottom:6px">
      <div style="font-size:8.5px;font-weight:700;color:#880E4F;margin-bottom:4px">🥗 AI-এর আগামীকালের মেনু পরামর্শ</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px">
      ${meals.map(m=>{const ml=aiMenu[m.k];if(!ml)return '';return `<div style="background:rgba(255,255,255,.7);border:1px solid #FFB3CC;border-radius:4px;padding:4px 5px;text-align:center"><div style="font-size:8.5px;color:#880E4F">${m.i}${m.l}</div><div style="font-size:9px;font-weight:600;color:#111;line-height:1.2">${ml.name_bn||ml.name||m.l}</div><div style="font-size:8.5px;color:#AD1457">${ml.calories||ml.kcal||0}kcal</div>${ml.benefits?`<div style="font-size:8px;color:#2E7D32;font-style:italic">${ml.benefits}</div>`:''}</div>`;}).join('')}
      </div>
    </div>`;
  }
  if (!aiGreeting && !aiAdvice) {
    aiBlock = `<div class="rcp-ai">
      <div class="rcp-ai-title">🤖 AI স্বাস্থ্য পরামর্শ</div>
      <div class="rcp-ai-body">প্রতিদিন সকাল ৬টায় AI আপনার মেট্রিক্স বিশ্লেষণ করে পরামর্শ দেয়।

    </div>`;
  }

  // ── Personalized messages ──
  const msgs = buildMsgs(cust, metrics, log, ai, prev, daysSince);
  const msgsHtml = msgs.map(m=>`
    <div class="rcp-msg rcp-msg-${m.t}">
      <div class="rcp-msg-title">${m.title}</div>
      <div class="rcp-msg-body">${m.body}</div>
    </div>`).join('');

  // ── Previous orders ──
  const prevHtml = prev.length
    ? prev.map((o,i)=>`<div style="font-size:9.5px;color:#333;border-bottom:1px dotted #FFB3CC;padding:2px 0">

    : '<div style="font-size:9.5px;color:#888">প্রথম অর্ডার!</div>';

  // ── Customer info ──
  const custHtml = `

      <div class="rcp-ic"><div class="rcp-ic-k">সদস্য আইডি</div><div class="rcp-ic-v" style="color:#C2185B">${cust.member_id||'—'}</div></div>
      <div class="rcp-ic"><div class="rcp-ic-k">ফোন</div><div class="rcp-ic-v">${cust.phone||'—'}</div></div>
      <div class="rcp-ic"><div class="rcp-ic-k">বিভাগ</div><div class="rcp-ic-v">${CAT_MAP[cat]||cat}</div></div>
      <div class="rcp-ic"><div class="rcp-ic-k">অর্ডার ধরন</div><div class="rcp-ic-v">${otype}</div></div>
      <div class="rcp-ic"><div class="rcp-ic-k">পেমেন্ট</div><div class="rcp-ic-v">${(order.payment_method||'—').toUpperCase()}</div></div>
      ${order.delivery_address?`<div class="rcp-ic wide"><div class="rcp-ic-k">ডেলিভারি ঠিকানা</div><div class="rcp-ic-v" style="font-size:10px">${order.delivery_address}</div></div>`:''}
      ${order.table_number?`<div class="rcp-ic"><div class="rcp-ic-k">টেবিল</div><div class="rcp-ic-v">${order.table_number}</div></div>`:''}
    </div>`;

  // ── Assemble ──
  document.getElementById('rcpBody').innerHTML = `
    <!-- SIDE A -->
    ${custHtml}
    <div class="rcp-total">
      <div><div class="rcp-total-k">মোট পরিশোধযোগ্য · ETA: ${eta}</div></div>
      <div class="rcp-total-v">৳ ${grand.toLocaleString()}</div>
    </div>
    <div class="rcp-sh">📦 সর্বশেষ অর্ডার</div>
    <div style="background:rgba(255,255,255,.6);border:1px solid #FFB3CC;border-radius:5px;padding:6px 9px;margin-bottom:7px">${prevHtml}</div>
    <div class="rcp-sh">🥗 অর্ডার + পুষ্টিমান + উপাদান + Blockchain</div>

    ${totalsHtml}
    ${bcNotice}
    ${discHtml}

    <!-- SIDE B -->

    ${aiBlock}
    <div class="rcp-sh">💌 আপনার জন্য বিশেষ বার্তা</div>

      <div class="rcp-survey-q">😊 SAR কেমন লাগছে? আপনার পরামর্শ লিখুন:</div>

  // Show receipt
  document.getElementById('pageLoader').style.display = 'none';

  // Auto send after 2 seconds
  setTimeout(() => autoSend(cust, rcpNum, grand, order.order_number||'—'), 2000);

// ═══════════════════════════════════════════════════════════
// PERSONALIZED MESSAGES — guaranteed 4 messages
// ═══════════════════════════════════════════════════════════
function buildMsgs(cust, m, log, ai, prev, daysSince) {
  const msgs = [];
  const cat  = cust.sar_category || 'DM';
  const catLabel = CAT_MAP[cat]||cat;
  const tier = cust.membership_tier||'Basic';

  // 1. Happiness / engagement
  if (daysSince < 30) {
    msgs.push({t:'g',priority:5,title:'🌸 SAR পরিবারে স্বাগতম!',
      body:`মাত্র ${daysSince} দিন হলো আপনি SAR-এর সাথে আছেন। আজকের থেরাপিউটিক খাবার কেমন লাগলো? ৯০ দিনের মধ্যে পার্থক্য অনুভব করবেন।`});
  } else if (prev.length && prev[0]) {
    const lastItem = prev[0].items_json?.[0]?.name_bn||prev[0].items_json?.[0]?.name||'আগের খাবার';
    const daysAgo = Math.floor((Date.now()-new Date(prev[0].created_at))/86400000);
    if (daysAgo>7) msgs.push({t:'p',priority:6,title:'💭 আমরা আপনাকে মিস করছি!',
      body:`${daysAgo} দিন হলো অর্ডার নেই। "${lastItem}" আবার খেতে চান? SAR সবসময় আপনার জন্য প্রস্তুত।`});
    else msgs.push({t:'g',priority:4,title:'😊 SAR কি ভালো লাগছে?',
      body:`"${lastItem}" কেমন ছিল? স্বাদ, পুষ্টি, ডেলিভারি — সব নিয়ে জানান। আপনার মতামতে SAR আরও ভালো হয়।`});
  } else {
    msgs.push({t:'g',priority:4,title:'😊 আজকের খাবার কেমন লাগলো?',
      body:`SAR-এর থেরাপিউটিক মেনু নিয়মিত খান। প্রতিদিনের সঠিক পুষ্টি আপনার সেরা ওষুধ।`});
  }

  // 2. Disease-specific
  const hba1c  = parseFloat(m.hba1c)||0;
  const wt     = parseFloat(m.weight_kg||cust.weight_kg)||0;
  const tgtWt  = parseFloat(m.target_weight_kg)||0;
  const coffee = parseInt(log.coffee_cups)||0;
  const alt    = parseFloat(m.alt_sgpt)||0;

  if (cat==='DM') {
    if (hba1c>7.5) msgs.push({t:'r',priority:9,title:`🩸 ডায়াবেটিস সতর্কতা — HbA1c ${hba1c}%`,
      body:`আপনার HbA1c ${hba1c}% — উচ্চ মাত্রায়। SAR-এর মেথি-করলা রুটিন প্রতিদিন মিস করবেন না। আজই ডাক্তার দেখান।`});
    else if (coffee>=3) msgs.push({t:'r',priority:7,title:'☕ কফি ও ডায়াবেটিস',
      body:`গতকাল ${coffee} কাপ কফি — ডায়াবেটিসে ক্ষতিকর। সর্বোচ্চ ১-২ কাপ রাখুন। সবুজ চা বিকল্প হিসেবে ভালো।`});
    else msgs.push({t:'g',priority:5,title:'💚 ডায়াবেটিস ম্যানেজমেন্ট',
      body:`SAR-এর গ্লাইসেমিক-নিয়ন্ত্রিত মেনু আপনার রক্তে শর্করা স্থিতিশীল রাখে। সপ্তাহে একবার FBG পরীক্ষা করুন।`});
  } else if (cat==='OB' && wt>0 && tgtWt>0) {
    msgs.push({t:'g',priority:6,title:`⚖️ লক্ষ্য: ${tgtWt}কেজি — বর্তমান: ${wt}কেজি`,
      body:`আর ${(wt-tgtWt).toFixed(1)}কেজি কমাতে হবে। SAR-এর low-calorie মেনু + দিনে ৩০ মিনিট হাঁটুন। সঠিক পথে আছেন!`});
  } else if (cat==='FL') {
    msgs.push({t:'g',priority:6,title:`🫀 ফ্যাটি লিভার ${alt>40?`— ALT ${alt} U/L ⚠️`:'আপডেট'}`,
      body:`${alt>40?`ALT ${alt} U/L উচ্চ। তৈলাক্ত খাবার বাদ দিন।`:'লিভার সুস্থ রাখতে'} SAR-এর হলুদ-আদা ডিটক্স মেনু নিয়মিত খান।`});
  } else if (cat==='IB' && log.stomach_upset) {
    msgs.push({t:'r',priority:8,title:'🌿 গতকাল পেট খারাপ ছিল!',
      body:`আজ শুধু হালকা খাবার। SAR-এর Gut Healing কিচরি অর্ডার করুন। মশলাদার ও তেলে ভাজা সম্পূর্ণ বাদ।`});
  } else if (cat==='PR') {
    msgs.push({t:'p',priority:7,title:'🤱 গর্ভাবস্থার পুষ্টি',
      body:`ফোলেট, আয়রন ও ক্যালসিয়াম আপনার সবচেয়ে বেশি প্রয়োজন। SAR-এর Pregnancy মেনু মা ও শিশুর সম্পূর্ণ পুষ্টি দেয়।`});
  }

  // 3. PCOS (only if applicable)
  const pcos = m.pcos_status;
  if (pcos && pcos!=='না') {
    if (pcos==='সন্দেহজনক') msgs.push({t:'r',priority:8,title:'⚠️ PCOS সম্পর্কে জানেন?',
      body:`PCOS হলে অনিচ্ছাকৃতভাবে মোটা হওয়া, পিম্পল, অনিয়মিত মাসিক, চুল পড়া হতে পারে। SAR-এর PCOS মেনু বিশেষ কার্যকর।`});
    else msgs.push({t:'v',priority:7,title:'🌿 PCOS ম্যানেজমেন্ট',
      body:`মেথি ও দারচিনি ইনসুলিন sensitivity বাড়ায় — PCOS-এর জন্য অপরিহার্য। SAR-এ প্রতিটি মেনুতে এগুলো আছে।`});
  }

  // 4. Daily log special
  if (log.period_today) msgs.push({t:'p',priority:9,title:'🌸 মাসিকে আয়রন দরকার',
    body:`আজ মাসিক হয়েছে। পালং-ডাল বাটি + আমলকি চাটনি অর্ডার করুন। ভিটামিন C + আয়রন একসাথে ৩গুণ শোষণ বাড়ায়।`});
  if (log.fever) msgs.push({t:'r',priority:9,title:'🌡️ জ্বরে হালকা খাবার',
    body:`জ্বরে ভারী খাবার নয়। SAR-এর Healing Broth + তুলসি-আদা স্যুপ অর্ডার করুন। প্রচুর তরল পান করুন।`});

  // 5. Credibility / SAR story
  const aiScore = ai.health_score||0;
  if (aiScore>0) msgs.push({t:'g',priority:3,title:`📊 স্বাস্থ্য স্কোর ${aiScore}/100`,
    body:`${daysSince} দিনের SAR যাত্রায় স্কোর ${aiScore>70?'ভালো ✅':aiScore>40?'উন্নতি হচ্ছে ⚠️':'মনোযোগ দরকার 🔴'}। নিয়মিত মেনু ও AI বিশ্লেষণ চালিয়ে যান।`});
  else msgs.push({t:'g',priority:2,title:'✦ ১,০০০+ নারী SAR বেছে নিয়েছেন',
    body:`Blockchain-verified ingredients। Oil-free, Sugar-free, Organic। AI-powered personal health menu। আপনি সঠিক সিদ্ধান্ত নিয়েছেন।`});

  // 6. Family
  const kids = parseInt(m.number_of_children)||0;
  if (kids>0) msgs.push({t:'p',priority:4,title:'👨‍👩‍👧 পরিবারের স্বাস্থ্য',
    body:`আপনার ${kids}জন সন্তান আছে। তাদের পুষ্টি ঠিক আছে? SAR Family Pack-এ সবার জন্য সুষম থেরাপিউটিক খাবার।`});

  return msgs.sort((a,b)=>b.priority-a.priority).slice(0,4);
}

// AUTO SEND — WhatsApp + Email automatically
// ═══════════════════════════════════════════════════════════
async function autoSend(cust, rcpNum, grand, orderNum) {
  const phone = cust.phone||'';
  const email = cust.email||'';
  if (!phone && !email) return;

  showStatus('📤 রিসিট পাঠানো হচ্ছে...','sending');

  let done = [];

  // Auto WhatsApp
  if (phone) {
    const clean  = phone.replace(/\D/g,'');
    const intlPh = clean.startsWith('0') ? '88'+clean : clean;
    const msg    = `🌸 SAR থেরাপিউটিক খাবারের রিসিট\n\nনাম: ${cust.full_name||CNAME}\nঅর্ডার: ${orderNum}\nরিসিট: ${rcpNum}\nমোট: ৳${grand}\n\n✅ অর্ডার নিশ্চিত\n\n📊 পুষ্টি + Blockchain + স্বাস্থ্য পরামর্শ দেখুন:\nsheairestaurant.com/receipt.html?oid=${new URLSearchParams(window.location.search).get('oid')||''}\n\n🌸 SAR She AI Restaurant\n📞 01346098892`;
    // Store URL for button
    window._waUrl = `https://wa.me/${intlPh}?text=${encodeURIComponent(msg)}`;
    // Auto-open WhatsApp
    try { window.open(window._waUrl,'_blank'); done.push('WhatsApp'); } catch(e){}
  }

  // Auto Email via Netlify
  if (email) {
    try {
      const r = await fetch('/.netlify/functions/analyze', {
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt:`SAR receipt email: To: ${email}, Name: ${cust.full_name||CNAME}, Order: ${orderNum}, Receipt: ${rcpNum}, Total: ৳${grand}. Please confirm receipt delivery.`})
      });
      if (r.ok) done.push('Email');
    } catch(e){}
  }

  if (done.length) showStatus(`✅ রিসিট পাঠানো হয়েছে: ${done.join(' + ')}`,'ok');
  else showStatus('ℹ️ ফোন/ইমেইল নেই — Manual send করুন।','ok');
}

// ── Manual send functions ──
function sendWA() {
  if (window._waUrl) { window.open(window._waUrl,'_blank'); return; }
  const cust = G.cust;
  const phone = cust.phone||'';
  if (!phone) { alert('গ্রাহকের ফোন নম্বর নেই।'); return; }
  const clean = phone.replace(/\D/g,'');
  const intl  = clean.startsWith('0') ? '88'+clean : clean;
  const msg   = `🌸 SAR রিসিট: ${G.rcpNum} · অর্ডার মোট: ৳${G.grand} · sheairestaurant.com/receipt.html?oid=${new URLSearchParams(window.location.search).get('oid')||''}`;
  window.open(`https://wa.me/${intl}?text=${encodeURIComponent(msg)}`,'_blank');
}
async function sendEmail() {
  const cust = G.cust;
  if (!cust.email) { alert('গ্রাহকের ইমেইল নেই।'); return; }
  showStatus('📧 Email পাঠানো হচ্ছে...','sending');
  try {
    await fetch('/.netlify/functions/analyze',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:`SAR receipt for ${cust.email}: ${G.rcpNum} ৳${G.grand}`})});
    showStatus(`✅ Email পাঠানো হয়েছে: ${cust.email}`,'ok');
  } catch(e){ showStatus('❌ Email ব্যর্থ।','err'); }
}

// ── Utils ──
function setLoader(t){
  document.getElementById('pageLoader').style.display='flex';
  document.getElementById('loaderTxt').textContent=t;
}
function showError(msg){
  document.getElementById('pageLoader').style.display='none';
  document.getElementById('pageError').style.display='flex';
  document.getElementById('errorDesc').textContent=msg;
}
function showStatus(msg,type='ok'){
  const bar=document.getElementById('statusBar');
  bar.style.display='flex';
  bar.className='status-bar '+(type==='ok'?'':type);
  document.getElementById('statusMsg').textContent=msg;
  if(type==='ok') setTimeout(()=>bar.style.display='none',4000);
}
