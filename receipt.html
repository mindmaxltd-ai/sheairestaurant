<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SAR Receipt</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── SCREEN ── */
body{background:#f0f0f0;margin:0;font-family:Arial,sans-serif}
.screen-bar{background:#880E4F;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:100}
.sb-logo{color:#FFD1E8;font-weight:700;font-size:14px;letter-spacing:.04em}
.sb-actions{display:flex;gap:6px;flex-wrap:wrap}
.sb-btn{padding:5px 14px;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:Arial;transition:opacity .2s}
.sb-btn:hover{opacity:.85}
.sb-wa{background:#25D366;color:#fff}
.sb-em{background:#9C27B0;color:#fff}
.sb-pr{background:#fff;color:#880E4F}
.sb-bk{background:rgba(255,255,255,.15);color:#FFD1E8;border:1px solid rgba(255,255,255,.3)}
.status{padding:5px 16px;font-size:11px;font-weight:600;display:none}
.status.ok{background:#E8F5E9;color:#2E7D32;display:block}
.status.sending{background:#FFF8E1;color:#F57F17;display:block}
.status.err{background:#FFEBEE;color:#C62828;display:block}
.page-wrap{max-width:780px;margin:16px auto;padding:0 12px 32px}
/* Loading */
.loading{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#fff;border-radius:4px;padding:40px}
.spin{width:40px;height:40px;border-radius:50%;border:3px solid #FFB3CC;border-top-color:#C2185B;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.error-box{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#fff;border-radius:4px;padding:40px;text-align:center}

/* ══════════════════════════════════════════════
   ECR RECEIPT — White paper, colored text
   ══════════════════════════════════════════════ */
.ecr{
  background:#ffffff;
  font-family:Arial,'Hind Siliguri',sans-serif;
  font-size:10.5px;color:#111;line-height:1.35;
  padding:14px 18px;
  max-width:720px;margin:0 auto;
  border:1px solid #ddd;
}
/* Color roles */
.c-pink{color:#C2185B}   /* SAR brand, headers, amounts */
.c-green{color:#1B5E20}  /* health benefits, AI advice, positives */
.c-red{color:#B71C1C}    /* warnings, alerts, urgent */
.c-purple{color:#4A148C} /* therapeutic, herbs, blockchain */
.c-gray{color:#555}      /* secondary text */
.c-dim{color:#888}       /* labels, units */
/* ECR header */
.ecr-hd{text-align:center;border-bottom:2px solid #C2185B;padding-bottom:8px;margin-bottom:8px}
.ecr-hd-title{font-size:16px;font-weight:700;color:#C2185B;letter-spacing:.04em;line-height:1.2}
.ecr-hd-sub{font-size:9px;color:#AD1457;letter-spacing:.1em;margin:2px 0}
.ecr-hd-tag{font-size:8.5px;color:#555;letter-spacing:.06em}
.ecr-num{font-family:'Space Mono',Courier New;font-size:11px;font-weight:700;color:#C2185B;margin-top:5px}
.ecr-ord{font-family:'Space Mono',Courier New;font-size:10px;color:#555}
/* Separator lines */
.sep-double{border:none;border-top:2px double #C2185B;margin:6px 0}
.sep-single{border:none;border-top:1px solid #ddd;margin:5px 0}
.sep-dash{border:none;border-top:1px dashed #ccc;margin:4px 0}
.sep-star{text-align:center;color:#C2185B;font-size:10px;margin:4px 0;letter-spacing:4px}
/* Info row */
.info-tbl{width:100%;border-collapse:collapse;margin-bottom:6px}
.info-tbl td{padding:1.5px 0;vertical-align:top}
.info-k{color:#555;font-size:9.5px;width:30%;white-space:nowrap}
.info-v{font-weight:600;font-size:10.5px}
/* Section heading */
.sec-h{font-size:9px;font-weight:700;color:#C2185B;text-transform:uppercase;letter-spacing:.14em;margin:6px 0 3px;display:flex;align-items:center;gap:6px}
.sec-h::before,.sec-h::after{content:'';flex:1;height:1px;background:#C2185B;opacity:.3}
/* Item block */
.ecr-item{margin-bottom:6px}
.ecr-item-head{display:flex;justify-content:space-between;align-items:baseline;font-weight:700;font-size:11px;border-bottom:1px solid #F8BBD0;padding-bottom:2px;margin-bottom:3px}
.ecr-item-name{color:#111;flex:1}
.ecr-item-qty{color:#555;font-size:10px;margin:0 6px;white-space:nowrap}
.ecr-item-price{color:#C2185B;font-family:'Space Mono',Courier New;white-space:nowrap}
/* Nutrition compact */
.nutr-line{font-size:9.5px;color:#333;border-left:2px solid #C2185B;padding:1px 5px;margin:2px 0;line-height:1.4;font-family:'Space Mono',Courier New}
.nutr-val{font-weight:700}
.nutr-dv{color:#C2185B;font-size:8.5px}
/* Benefit */
.benefit-line{font-size:9.5px;color:#1B5E20;padding:1px 0;font-weight:600}
.note-line{font-size:9px;color:#1565C0;font-style:italic;padding:1px 0}
/* Ingredients */
.ing-line{font-size:9px;color:#4A148C;padding:1px 0;line-height:1.5}
.bc-chip{color:#1565C0;font-size:8.5px;text-decoration:none;background:#E3F2FD;padding:0 3px;border-radius:2px;margin-left:2px}
/* Herbs */
.herb-line{font-size:9px;color:#2E7D32;padding:1px 0}
/* Totals table */
.tot-tbl{width:100%;border-collapse:collapse;margin:4px 0}
.tot-tbl td{padding:2px 0;font-size:10.5px}
.tot-tbl .tot-k{color:#555}
.tot-tbl .tot-v{text-align:right;font-family:'Space Mono',Courier New;font-weight:700}
.tot-total td{font-size:12px;font-weight:700;color:#C2185B;border-top:2px solid #C2185B;padding-top:4px}
/* BC notice */
.bc-box{border:1px solid #1565C0;border-left:3px solid #1565C0;padding:4px 8px;margin:6px 0;font-size:9px;color:#1565C0;line-height:1.5}
/* Disc */
.disc-box{border:1px solid #E65100;border-left:3px solid #E65100;padding:3px 8px;margin:5px 0;font-size:8.5px;color:#BF360C;line-height:1.4}
/* AI section */
.ai-block{border:1px solid #1B5E20;border-left:3px solid #1B5E20;padding:4px 8px;margin:4px 0;font-size:9.5px;color:#1B5E20;line-height:1.45}
.ai-title{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
/* Problems/solutions grid */
.ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:4px 0}
.ps-box{border:1px solid;padding:3px 7px;border-radius:3px;font-size:9px}
.ps-box-r{border-color:#FFCDD2;background:#FFF5F5;color:#C62828}
.ps-box-g{border-color:#C5E1A5;background:#F1F8E9;color:#2E7D32}
.ps-title{font-weight:700;margin-bottom:2px}
/* Messages */
.msg-block{border-left:3px solid;padding:3px 8px;margin:3px 0;font-size:9.5px;line-height:1.4}
.msg-r{border-color:#C62828;background:#FFF5F5}.msg-r .msg-t{color:#C62828}
.msg-g{border-color:#388E3C;background:#F1F8E9}.msg-g .msg-t{color:#2E7D32}
.msg-p{border-color:#AD1457;background:#FCE4EC}.msg-p .msg-t{color:#AD1457}
.msg-v{border-color:#6A1B9A;background:#F3E5F5}.msg-v .msg-t{color:#6A1B9A}
.msg-t{font-weight:700;font-size:9px;margin-bottom:1px}
/* AI menu tomorrow */
.menu-tmr{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin:4px 0}
.menu-tmr-cell{border:1px solid #F48FB1;border-radius:3px;padding:3px 5px;text-align:center;background:#FFF0F5;font-size:8.5px}
.menu-tmr-time{color:#C2185B;font-size:8px}
.menu-tmr-name{color:#111;font-weight:600;line-height:1.2;margin:1px 0}
.menu-tmr-kcal{color:#AD1457;font-size:8px}
.menu-tmr-ben{color:#2E7D32;font-size:7.5px;font-style:italic}
/* Survey */
.survey{border:1px solid #F48FB1;padding:6px 10px;margin:6px 0}
.survey-q{font-size:9.5px;font-weight:700;color:#880E4F;margin-bottom:5px}
.survey-line{display:block;border:none;border-bottom:1px solid #FFB3CC;width:100%;margin-bottom:5px;height:12px;background:transparent}
/* Footer */
.ecr-foot{text-align:center;font-size:8.5px;color:#555;padding-top:6px;border-top:2px double #C2185B;line-height:1.6;margin-top:6px}
.ecr-foot b{color:#C2185B}

/* PRINT CSS */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;margin:0;padding:0}
  .screen-bar,.status,.page-wrap>*:not(.ecr){display:none!important}
  .page-wrap{padding:0;margin:0;max-width:100%}
  .ecr{border:none;padding:6px 10px;max-width:210mm;margin:0 auto}
  .sep-double,.sep-single,.sep-dash{page-break-inside:avoid}
  @page{size:A4;margin:6mm 8mm}
  @page:first{margin-top:6mm}
}
@media(max-width:600px){
  .ps-grid{grid-template-columns:1fr}
  .menu-tmr{grid-template-columns:1fr}
}
</style>
</head>

function getMD(name){
  if(!name) return null;
  if(MDATA[name]) return MDATA[name];
  const lc=name.toLowerCase();
  for(const [k,v] of Object.entries(MDATA)){
    if(k.toLowerCase().includes(lc.split(' ')[0])||lc.includes(k.toLowerCase().split(' ')[0])) return v;
  }
  return null;
}
function pct(v,ref){return v&&ref?Math.min(99,Math.round(v/ref*100)):0}
function fmt(v,d=1){return parseFloat(v||0).toFixed(d)}

  try{
    const [oA,cA,mA,aiA,lA,pA]=await Promise.all([
      fetch(`${SUPA}/rest/v1/orders?id=eq.${oid}&select=*`,{headers:H}).then(r=>r.json()),
      CID?fetch(`${SUPA}/rest/v1/customers?id=eq.${CID}&select=*`,{headers:H}).then(r=>r.json()):[_sc],
      CID?fetch(`${SUPA}/rest/v1/customer-metrics?customer_id=eq.${CID}&limit=1`,{headers:H}).then(r=>r.json()):[{}],
      CID?fetch(`${SUPA}/rest/v1/ai_analysis?customer_id=eq.${CID}&order=created_at.desc&limit=1`,{headers:H}).then(r=>r.json()):[{}],
      CID?fetch(`${SUPA}/rest/v1/daily_health_log?customer_id=eq.${CID}&order=log_date.desc&limit=1`,{headers:H}).then(r=>r.json()):[{}],
      CID?fetch(`${SUPA}/rest/v1/orders?customer_id=eq.${CID}&order=created_at.desc&limit=4&select=order_number,items_json,total_amount,status,created_at`,{headers:H}).then(r=>r.json()):[],
    ]);
    const ord=oA?.[0],cust=cA?.[0]||_sc||{},met=mA?.[0]||{},ai=aiA?.[0]||{},log=lA?.[0]||{},prev=(pA||[]).filter(o=>o.id!==oid).slice(0,3);
    if(!ord){
      const saved=JSON.parse(localStorage.getItem('sar_last_order_items')||'[]');
      if(!saved.length){showErr('অর্ডার পাওয়া যায়নি।');return;}
      buildECR({order_number:localStorage.getItem('sar_last_order_num')||'—',items_json:saved,total_amount:0,payment_method:'—',order_type:'dine_in',created_at:new Date().toISOString()},cust,met,ai,log,prev);
    } else {
      ord.items_json=ord.items_json||JSON.parse(localStorage.getItem('sar_last_order_items')||'[]');
      buildECR(ord,cust,met,ai,log,prev);
    }
  }catch(e){showErr('লোড ব্যর্থ: '+e.message);}
});

  if(!aiGr&&!aiAd) aiHtml=`<div class="ai-block"><div class="ai-title">🤖 AI HEALTH ANALYSIS</div><div>প্রতিদিন সকাল ৬টায় AI আপনার মেট্রিক্স বিশ্লেষণ করে। ড্যাশবোর্ড → AI বিশ্লেষণ শুরু করুন।</div></div>`;

  // ── Personalized messages ──
  const msgs=buildMsgs(cust,met,log,ai,prev,daysSince);
  const msgsHtml=msgs.map(m=>`<div class="msg-block msg-${m.t}"><div class="msg-t">${m.title}</div>${m.body}</div>`).join('');

  // ── Assemble ──
  document.getElementById('ecrBody').innerHTML=`
<table class="info-tbl">
  <tr><td class="info-k">গ্রাহক</td><td class="info-v c-pink">${cust.full_name||CNAME}</td></tr>

// ═══════════════════════════════════════════════════════════
// PERSONALIZED MESSAGES
// ═══════════════════════════════════════════════════════════
function buildMsgs(cust,m,log,ai,prev,ds){
  const msgs=[],cat=cust.sar_category||'DM',catL=CAT[cat]||cat;
  const hba1c=parseFloat(m.hba1c)||0,wt=parseFloat(m.weight_kg||cust.weight_kg)||0,tgtWt=parseFloat(m.target_weight_kg)||0;
  const coffee=parseInt(log.coffee_cups)||0,alt=parseFloat(m.alt_sgpt)||0,pcos=m.pcos_status,kids=parseInt(m.number_of_children)||0;
  const aiSc=ai.health_score||0;

  // Happiness
  if(ds<30) msgs.push({t:'g',pr:5,title:'🌸 SAR পরিবারে স্বাগতম!',body:`মাত্র ${ds} দিন হলো। আজকের খাবার কেমন লাগলো? ৯০ দিনে পার্থক্য অনুভব করবেন।`});
  else if(prev.length&&Math.floor((Date.now()-new Date(prev[0].created_at))/86400000)>7)
    msgs.push({t:'p',pr:6,title:'💭 আমরা আপনাকে মিস করছি!',body:`${Math.floor((Date.now()-new Date(prev[0].created_at))/86400000)} দিন হলো অর্ডার নেই। SAR সবসময় আপনার জন্য প্রস্তুত।`});
  else msgs.push({t:'g',pr:4,title:'😊 খাবার কেমন লাগলো?',body:`SAR-এর থেরাপিউটিক মেনু সম্পর্কে আপনার মতামত জানান।`});

  // Disease
  if(cat==='DM'){if(hba1c>7.5)msgs.push({t:'r',pr:9,title:`🩸 HbA1c ${hba1c}% সতর্কতা`,body:`HbA1c উচ্চ মাত্রায়। SAR মেথি-করলা রুটিন প্রতিদিন মিস করবেন না। আজই ডাক্তার দেখান।`});
  else if(coffee>=3)msgs.push({t:'r',pr:7,title:'☕ কফি সতর্কতা',body:`${coffee} কাপ কফি ডায়াবেটিসে ক্ষতিকর। সর্বোচ্চ ১-২ কাপ। সবুজ চা বিকল্প হিসেবে ভালো।`});
  else msgs.push({t:'g',pr:5,title:'💚 ডায়াবেটিস ম্যানেজমেন্ট',body:`SAR-এর গ্লাইসেমিক-নিয়ন্ত্রিত মেনু রক্তে শর্করা স্থিতিশীল রাখে। সপ্তাহে FBG পরীক্ষা করুন।`});}
  else if(cat==='OB'&&wt>0&&tgtWt>0)msgs.push({t:'g',pr:6,title:`⚖️ লক্ষ্য ${tgtWt}কেজি, বর্তমান ${wt}কেজি`,body:`আর ${(wt-tgtWt).toFixed(1)}কেজি। SAR মেনু + ৩০ মিনিট হাঁটুন। সঠিক পথে!`});
  else if(cat==='FL')msgs.push({t:'g',pr:6,title:`🫀 ফ্যাটি লিভার${alt>40?` — ALT ${alt}⚠️`:''}`,body:`${alt>40?`ALT ${alt} উচ্চ। তৈলাক্ত খাবার বাদ দিন।`:'লিভার ভালো রাখতে'} SAR ডিটক্স মেনু নিয়মিত খান।`});
  else if(cat==='IB'&&log.stomach_upset)msgs.push({t:'r',pr:8,title:'🌿 গতকাল পেট খারাপ',body:`আজ হালকা খাবার। SAR Gut Healing কিচরি অর্ডার করুন। মশলাদার খাবার বাদ।`});
  else if(cat==='PR')msgs.push({t:'p',pr:7,title:'🤱 গর্ভাবস্থার পুষ্টি',body:`ফোলেট, আয়রন, ক্যালসিয়াম আপনার সবচেয়ে বেশি দরকার। SAR Pregnancy মেনু মা ও শিশুর পুষ্টি দেয়।`});

  // PCOS
  if(pcos&&pcos!=='না')msgs.push(pcos==='সন্দেহজনক'?
    {t:'r',pr:8,title:'⚠️ PCOS সম্পর্কে জানেন?',body:`PCOS হলে মোটা হওয়া, পিম্পল, অনিয়মিত মাসিক হতে পারে। SAR PCOS মেনু বিশেষ কার্যকর।`}:
    {t:'v',pr:7,title:'🌿 PCOS — মেথি ও দারচিনি',body:`ইনসুলিন sensitivity বাড়ায় — PCOS-এ অপরিহার্য। SAR প্রতিটি মেনুতে এগুলো আছে।`});

  // Period/Fever
  if(log.period_today)msgs.push({t:'p',pr:9,title:'🌸 মাসিকে আয়রন দরকার',body:`পালং-ডাল বাটি + আমলকি চাটনি নিন। ভিটামিন C + আয়রন একসাথে শোষণ ৩গুণ বাড়ে।`});
  if(log.fever)msgs.push({t:'r',pr:9,title:'🌡️ জ্বরে হালকা খাবার',body:`SAR Healing Broth অর্ডার করুন। প্রচুর তরল পান করুন।`});

  // Credibility
  msgs.push(aiSc>0?{t:'g',pr:3,title:`📊 স্বাস্থ্য স্কোর ${aiSc}/100`,body:`${ds} দিনের SAR যাত্রা। ${aiSc>70?'ভালো ✅':aiSc>40?'উন্নতি হচ্ছে':''} নিয়মিত চালিয়ে যান।`}:
    {t:'g',pr:2,title:'✦ ১,০০০+ নারী SAR বেছে নিয়েছেন',body:`Blockchain-verified · Oil-free · Sugar-free · Organic · AI-powered`});

  if(kids>0)msgs.push({t:'p',pr:4,title:'👨‍👩‍👧 পরিবারের স্বাস্থ্য',body:`${kids}জন সন্তানের পুষ্টি ঠিক আছে? SAR Family Pack-এ সবার জন্য সুষম খাবার।`});

  return msgs.sort((a,b)=>b.pr-a.pr).slice(0,4);
}

// ═══════════════════════════════════════════════════════════
// AUTO SEND
// ═══════════════════════════════════════════════════════════
async function autoSend(cust,rcpN,grand,orderNum){
  const phone=cust.phone||'',email=cust.email||'';
  if(!phone&&!email)return;
  showSt('📤 রিসিট পাঠানো হচ্ছে...','sending');
  const clean=phone.replace(/\D/g,'');
  const intl=clean.startsWith('0')?'88'+clean:clean;
  const msg=`🌸 SAR-SHE AI RESTAURANT\n\nঅর্ডার রিসিট\nনাম: ${cust.full_name||CNAME}\nঅর্ডার: ${orderNum}\nরিসিট: ${rcpN}\nমোট: ৳${grand}\n✅ অর্ডার নিশ্চিত\n\nপুষ্টি ও স্বাস্থ্য তথ্য:\nsheairestaurant.com/receipt.html?oid=${G.oid||''}\n\nSAR · 01346098892`;
  window._waUrl=`https://wa.me/${intl}?text=${encodeURIComponent(msg)}`;
  let done=[];
  if(phone){try{window.open(window._waUrl,'_blank');done.push('WhatsApp');}catch(e){}}
  if(email){try{await fetch('/.netlify/functions/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:`SAR receipt email ${email}: ${rcpN} ৳${grand}`})});done.push('Email');}catch(e){}}
  showSt(done.length?`✅ পাঠানো হয়েছে: ${done.join(' + ')}`:'ℹ️ ফোন/ইমেইল পাওয়া যায়নি।','ok');
}
function sendWA(){if(window._waUrl)window.open(window._waUrl,'_blank');else alert('প্রথমে রিসিট লোড হতে দিন।');}
async function sendEmail(){const cust=G.cust||{};if(!cust.email){alert('ইমেইল নেই।');return;}showSt('📧 পাঠানো হচ্ছে...','sending');try{await fetch('/.netlify/functions/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:`Receipt ${G.rcpN} for ${cust.email}`})});showSt(`✅ ${cust.email}`,'ok');}catch(e){showSt('❌ ব্যর্থ','err');}}

function setLoad(t){document.getElementById('loadTxt').textContent=t;}
function showErr(m){document.getElementById('loadBox').style.display='none';document.getElementById('errBox').style.display='flex';document.getElementById('errMsg').textContent=m;}
function showSt(m,t='ok'){const b=document.getElementById('statusBar');b.textContent=m;b.className='status '+t;if(t==='ok')setTimeout(()=>b.className='status',4000);}
</script>
