<style>
:root{--gold:#F5C842;--gold2:#FFE082;--green:#2ECC71;--green2:#A8E6CF;--pink:#E91E8C;--pink2:#FF6BB5;--dark:#060608;--dark2:#0A0A10;--dark3:#111118;--glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.08);--border:rgba(245,200,66,.15);--border2:rgba(245,200,66,.25)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:#fff;font-family:'Hind Siliguri',sans-serif;min-height:100vh}
.rainbow-bar{height:3px;background:linear-gradient(90deg,var(--gold),var(--green),var(--pink),var(--gold));background-size:200%;animation:rb 4s linear infinite;position:fixed;top:0;left:0;right:0;z-index:999}

.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(245,200,66,.025)1px,transparent 1px),linear-gradient(90deg,rgba(245,200,66,.025)1px,transparent 1px);background-size:60px 60px;pointer-events:none}

nav{position:fixed;top:3px;left:0;right:0;z-index:100;background:rgba(6,6,8,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:.8rem 2rem;display:flex;align-items:center;justify-content:space-between}
.nav-back{display:flex;align-items:center;gap:.5rem;color:rgba(255,255,255,.5);text-decoration:none;font-size:.82rem;padding:.35rem .8rem;border-radius:8px;border:1px solid var(--border);background:var(--glass);transition:all .25s}
.nav-back:hover{color:var(--gold);border-color:var(--border2)}
.nav-title{font-family:'Cinzel',serif;font-size:1rem;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.admin-post-btn{background:linear-gradient(135deg,var(--gold),#F59E0B);border:none;border-radius:10px;padding:.4rem 1rem;color:#000;font-family:'Hind Siliguri',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;display:none}
.admin-post-btn.show{display:block}

.main{position:relative;z-index:10;padding:6rem 2rem 4rem;max-width:1000px;margin:0 auto}
.page-hero{text-align:center;padding:2rem 0 3rem}
.page-eyebrow{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.2em;color:var(--gold);margin-bottom:.75rem}
.page-title{font-family:'Cinzel',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--green2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.75rem}
.page-sub{font-size:1rem;color:rgba(255,255,255,.45);max-width:600px;margin:0 auto}

/* ARTICLES GRID */
.articles-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem}
.article-card{background:rgba(10,10,16,.8);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all .3s;text-decoration:none;display:block;cursor:pointer}
.article-card:hover{transform:translateY(-6px);border-color:var(--border2);box-shadow:0 20px 40px rgba(245,200,66,.08)}
.article-img{height:180px;display:flex;align-items:center;justify-content:center;font-size:4rem;position:relative}
.article-img.a1{background:linear-gradient(135deg,rgba(245,200,66,.12),rgba(46,204,113,.08))}
.article-img.a2{background:linear-gradient(135deg,rgba(233,30,140,.12),rgba(107,33,168,.08))}
.article-img.a3{background:linear-gradient(135deg,rgba(46,204,113,.12),rgba(45,212,191,.08))}
.article-img.a4{background:linear-gradient(135deg,rgba(107,33,168,.12),rgba(245,200,66,.08))}
.a-date{position:absolute;bottom:.6rem;left:.75rem;font-family:'Space Mono',monospace;font-size:.62rem;color:rgba(255,255,255,.35)}
.article-body{padding:1.25rem 1.4rem}
.a-tag{font-size:.62rem;color:var(--gold);font-family:'Space Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.45rem}
.a-title{font-family:'Cinzel',serif;font-size:1.1rem;color:#fff;line-height:1.4;margin-bottom:.6rem;font-weight:700}
.a-excerpt{font-size:.82rem;color:rgba(255,255,255,.45);line-height:1.65;margin-bottom:.75rem}
.a-meta{display:flex;align-items:center;justify-content:space-between;font-size:.72rem;color:rgba(255,255,255,.3)}
.a-read{color:var(--gold);font-weight:600;font-family:'Space Mono',monospace;font-size:.68rem}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:2rem}
.modal-overlay.open{display:flex}
.modal{background:var(--dark2);border:1px solid var(--border2);border-radius:24px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:2.5rem}

.modal-date{font-family:'Space Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.3);margin-bottom:1.5rem}
.modal-content{font-size:.92rem;color:rgba(255,255,255,.65);line-height:1.9}

/* ADMIN FORM */
.admin-form{background:rgba(10,10,16,.9);border:1px solid var(--border2);border-radius:20px;padding:2rem;margin-bottom:2rem;display:none}
.admin-form.show{display:block}
.af-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);margin-bottom:1.25rem}
.af-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:.85rem}
.af-field label{display:block;font-size:.72rem;color:rgba(255,255,255,.4);font-family:'Space Mono',monospace;letter-spacing:.05em;margin-bottom:.35rem}
.af-input,.af-select,.af-textarea{width:100%;background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:.65rem .9rem;color:#fff;font-family:'Hind Siliguri',sans-serif;font-size:.88rem;outline:none;transition:border-color .25s}
.af-input:focus,.af-select:focus,.af-textarea:focus{border-color:var(--gold)}
.af-select option{background:#111}
.af-textarea{resize:vertical;min-height:120px}
.af-submit{background:linear-gradient(135deg,var(--gold),#F59E0B);border:none;border-radius:12px;padding:.75rem 2rem;color:#000;font-family:'Hind Siliguri',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:opacity .25s}
.af-submit:hover{opacity:.85}
.af-field.full{grid-column:1/-1}

.empty-state{text-align:center;padding:4rem 2rem;color:rgba(255,255,255,.3)}

@media(max-width:640px){.articles-grid{grid-template-columns:1fr}.af-grid{grid-template-columns:1fr}}

<script>
const SUPABASE_URL = 'https://xlkrggspepnysbouatec.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsa3JnZ3NwZXBueXNib3VhdGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTU0OTEsImV4cCI6MjA5NTA5MTQ5MX0.dCAkAXL1EDNsxTBn8mcHcUHlXJ1xDBirwBdTgIq927U';

// Default articles
const DEFAULT_ARTICLES = [
  {id:'d1',tag:'থেরাপিউটিক ফুড',emoji:'🌾',imgClass:'a1',title:'খাবারই ওষুধ — Charaka Samhita থেকে SAR পর্যন্ত',excerpt:'৫,০০০ বছর আগের আয়ুর্বেদিক জ্ঞান আজকের AI প্রযুক্তির সাথে মিলিয়ে কীভাবে SAR তৈরি হলো।',date:'মে ২০২৬',content:`<h3>প্রাচীন জ্ঞান, আধুনিক প্রযুক্তি</h3><p>Charaka Samhita-তে লেখা আছে — <strong>"Without proper food, medicine is of little use; with proper food, medicine is of little need."</strong> এই দর্শনই SAR-এর ভিত্তি।</p><h3>SAR কেন আলাদা?</h3><p>SAR শুধু একটি রেস্তোরাঁ নয় — এটি একটি <strong>ক্লিনিক্যাল হিলিং সেন্টার</strong> যেখানে প্রতিটি খাবার একজন ডায়েটিশিয়ান এবং AI দ্বারা পরিকল্পিত।</p><p>তেল-মুক্ত, গ্লুটেন-মুক্ত, চাল-মুক্ত, পাউরুটি-মুক্ত — চারটি সবচেয়ে ক্ষতিকর প্রদাহজনক উপাদান সম্পূর্ণ বাদ দেওয়া হয়েছে।</p><h3>ফলাফল</h3><p>SAR-এর প্রথম ১০০ গ্রাহকের মধ্যে ৮৭% তাদের HbA1c মাত্রা উল্লেখযোগ্যভাবে কমাতে সক্ষম হয়েছেন ৩ মাসের মধ্যে।</p>`},
  {id:'d2',tag:'নারী শক্তি',emoji:'👩',imgClass:'a2',title:'নারীর হাতে নারীর সুস্বাস্থ্য — SAR-এর নারী নেতৃত্ব মডেল',excerpt:'SAR-এ কেন শুধু নারীরা কাজ করেন এবং কেন এই মডেল বাংলাদেশের জন্য বিপ্লবী।',date:'এপ্রিল ২০২৬',content:`<h3>নারী-নেতৃত্বের দর্শন</h3><p>SAR-এ রান্নাঘর থেকে বোর্ডরুম পর্যন্ত প্রতিটি পদে <strong>নারী</strong>। এটি শুধু নীতি নয় — এটি আমাদের মিশনের অংশ।</p><h3>কেন শুধু নারী?</h3><p>গবেষণা দেখায় যে নারীরা নারীর স্বাস্থ্য সম্পর্কিত সমস্যাগুলো আরও সহানুভূতির সাথে বোঝেন। SAR-এ <strong>Emotional Intelligence</strong> প্রশিক্ষিত দল প্রতিটি গ্রাহকের মানসিক অবস্থা বুঝে সেবা দেন।</p><h3>অর্থনৈতিক ক্ষমতায়ন</h3><p>SAR ২০৩০ সালের মধ্যে বাংলাদেশে <strong>১০,০০০ নারীর</strong> কর্মসংস্থান তৈরি করার লক্ষ্যে কাজ করছে।</p>`},
  {id:'d3',tag:'AI প্রযুক্তি',emoji:'🤖',imgClass:'a3',title:'AI + EI + Blockchain — SAR-এর তিন প্রযুক্তি স্তম্ভ',excerpt:'কীভাবে আর্টিফিশিয়াল ইন্টেলিজেন্স, ইমোশনাল ইন্টেলিজেন্স এবং ব্লকচেইন একসাথে কাজ করে।',date:'মার্চ ২০২৬',content:`<h3>AI — কৃত্রিম বুদ্ধিমত্তা</h3><p>SAR-এর AI সিস্টেম প্রতিটি গ্রাহকের <strong>২৫০টি স্বাস্থ্য মেট্রিক্স</strong> বিশ্লেষণ করে প্রতিদিন একটি ব্যক্তিগতকৃত মেনু তৈরি করে।</p><h3>EI — আবেগীয় বুদ্ধিমত্তা</h3><p>শুধু শারীরিক সুস্থতা নয় — মানসিক সুস্থতাও SAR-এর লক্ষ্য। আমাদের EI-প্রশিক্ষিত দল প্রতিটি গ্রাহকের আবেগ বুঝে সেবা দেন।</p><h3>Blockchain — অপরিবর্তনীয় স্বচ্ছতা</h3><p>প্রতিটি উপাদানের উৎস খামার থেকে আপনার প্লেট পর্যন্ত ব্লকচেইনে স্থায়ীভাবে রেকর্ড করা আছে। <strong>শূন্য খাদ্য জালিয়াতি।</strong></p>`},
  {id:'d4',tag:'সাফল্যের গল্প',emoji:'🌸',imgClass:'a4',title:'রাহেলার গল্প — ডায়াবেটিস থেকে সুস্বাস্থ্যে ফিরে আসা',excerpt:'৩ মাসে HbA1c ৯.২ থেকে ৬.৪-এ নামিয়ে আনার অবিশ্বাস্য যাত্রা।',date:'ফেব্রুয়ারি ২০২৬',content:`<h3>রাহেলার পরিচয়</h3><p>ঢাকার বাসিন্দা রাহেলা খানম, বয়স ৪৫। টাইপ ২ ডায়াবেটিস নিয়ে ৮ বছর ধরে লড়াই করছিলেন।</p><h3>SAR-এ যোগ দেওয়ার আগে</h3><p>HbA1c: <strong>৯.২%</strong> | BMI: <strong>৩৪.৫</strong> | দৈনিক ইনসুলিন নির্ভরতা</p><h3>SAR-এর পথ</h3><p>AI-পরিকল্পিত ডায়াবেটিস মেনু, মেথি-করলা পাউডার প্রোটোকল এবং সাপ্তাহিক ডায়েটিশিয়ান ফলো-আপ।</p><h3>৩ মাস পরে</h3><p>HbA1c: <strong>৬.৪%</strong> | BMI: <strong>২৮.৯</strong> | ইনসুলিন বন্ধ (ডাক্তারের পরামর্শে)</p><p><em>"SAR আমার জীবন বদলে দিয়েছে। এটা শুধু খাবার না — এটা নিরাময়।"</em> — রাহেলা</p>`},
];

let allArticles = [...DEFAULT_ARTICLES];
let customArticles = JSON.parse(localStorage.getItem('sar_articles') || '[]');
allArticles = [...customArticles, ...allArticles];

// Check admin session
const isAdmin = sessionStorage.getItem('sar_admin') === 'true' ||
  (JSON.parse(localStorage.getItem('sar_customer')||'{}').phone === 'admin');
if(isAdmin) document.getElementById('adminPostBtn').classList.add('show');

function renderArticles(){
  const grid = document.getElementById('articlesGrid');
  if(!allArticles.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📝</div><div>এখনো কোনো আর্টিকেল নেই</div></div>`;
    return;
  }
  const imgClasses=['a1','a2','a3','a4'];
  grid.innerHTML = allArticles.map((a,i)=>`
    <div class="article-card" onclick="openArticle('${a.id}')">
      <div class="article-img ${a.imgClass||imgClasses[i%4]}">${a.emoji||'📝'}<span class="a-date">${a.date||''}</span></div>
      <div class="article-body">
        <div class="a-tag">${a.tag||'আর্টিকেল'}</div>
        <h3 class="a-title">${a.title}</h3>
        <p class="a-excerpt">${a.excerpt}</p>
        <div class="a-meta"><span>${a.date||''}</span><span class="a-read">পড়ুন →</span></div>
      </div>
    </div>`).join('');
}

function openArticle(id){
  const a = allArticles.find(x=>x.id===id);
  if(!a) return;
  document.getElementById('mTag').textContent = a.tag||'';
  document.getElementById('mTitle').textContent = a.title;
  document.getElementById('mDate').textContent = a.date||'';
  document.getElementById('mContent').innerHTML = a.content||a.excerpt||'';
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeArticleModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeModal(e){ if(e.target===document.getElementById('modalOverlay')) closeArticleModal(); }

function toggleAdminForm(){
  document.getElementById('adminForm').classList.toggle('show');
}

function publishArticle(){
  const title = document.getElementById('af_title').value.trim();
  const content = document.getElementById('af_content').value.trim();
  if(!title||!content){ alert('শিরোনাম ও বিষয়বস্তু দিন'); return; }
  const article = {
    id:'c'+Date.now(),
    tag: document.getElementById('af_tag').value,
    emoji: document.getElementById('af_emoji').value||'📝',
    imgClass:'a'+(Math.floor(Math.random()*4)+1),
    title,
    excerpt: document.getElementById('af_excerpt').value||content.substring(0,100)+'...',
    date: new Date().toLocaleDateString('bn-BD',{month:'long',year:'numeric'}),
    content:`<p>${content.replace(/\n/g,'</p><p>')}</p>`
  };
  customArticles.unshift(article);
  allArticles.unshift(article);
  localStorage.setItem('sar_articles', JSON.stringify(customArticles));
  renderArticles();
  document.getElementById('adminForm').classList.remove('show');
  ['af_title','af_content','af_excerpt','af_emoji'].forEach(id=>document.getElementById(id).value='');
  alert('✅ আর্টিকেল প্রকাশিত হয়েছে!');
}

renderArticles();
</script>
</body>
</html>
